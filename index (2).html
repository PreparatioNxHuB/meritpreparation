ed with Sindh, is known for his revolutionary and mystical Sufi poetry, often considered second to Shah Abdul Latif Bhittai in regional influence?","o":["Sachal Sarmast","Lal Shahbaz Qalandar","Baba Farid","Bulleh Shah"],"a":0,"e":"Sachal Sarmast, a Sindhi Sufi poet, is renowned for his mystical and philosophically rich poetry, composed in multiple languages including Sindhi, Persian, and Urdu.","section":"Islamiyat & Pakistan Affairs","id":989},{"q":"Which Punjabi Sufi poet, known for his rebellious and mystic verses, is associated with the shrine in Kasur, Punjab?","o":["Sachal Sarmast","Shah Hussain","Baba Farid","Bulleh Shah"],"a":3,"e":"Bulleh Shah, a celebrated Punjabi Sufi poet, is buried in Kasur and is renowned for his profound and often unconventional mystical poetry.","section":"Islamiyat & Pakistan Affairs","id":990},{"q":"Which Sufi poet, closely associated with Lahore, composed Punjabi Kafis and is known for his unorthodox lifestyle blending mysticism with social critique?","o":["Baba Farid","Bulleh Shah","Shah Hussain","Sachal Sarmast"],"a":2,"e":"Shah Hussain, a 16th-century Sufi poet associated with Lahore, is known for his Punjabi Kafis and his distinctive, unconventional approach to mysticism.","section":"Islamiyat & Pakistan Affairs","id":991},{"q":"Which Pakistani shrine, located in Islamabad, is dedicated to a revered Sufi saint and remains a significant pilgrimage site in the capital region?","o":["Data Darbar","Shah Rukn-e-Alam Shrine","Lal Shahbaz Qalandar Shrine","Bari Imam Shrine"],"a":3,"e":"The Bari Imam Shrine in Islamabad is dedicated to Hazrat Shah Abdul Latif Kazmi, popularly known as Bari Imam, and remains an important local pilgrimage site.","section":"Islamiyat & Pakistan Affairs","id":992},{"q":"Which Sufi shrine, located in Multan, is dedicated to the 14th-century saint Shah Rukn-e-Alam and is celebrated for its distinctive octagonal architecture?","o":["Shah Rukn-e-Alam Shrine","Lal Shahbaz Qalandar Shrine","Bari Imam Shrine","Data Darbar"],"a":0,"e":"The shrine of Shah Rukn-e-Alam in Multan is renowned for its impressive octagonal architectural design and its significance as a major Sufi pilgrimage site.","section":"Islamiyat & Pakistan Affairs","id":993},{"q":"Which of the following best describes the Islamic concept of 'Khatm-e-Nubuwwat' (Finality of Prophethood)?","o":["The belief that prophets continue to be sent periodically even today","The belief that Prophet Muhammad (PBUH) is the final and last prophet sent by Allah","A specific ritual performed during Hajj","A term relating to the compilation of Hadith"],"a":1,"e":"'Khatm-e-Nubuwwat' refers to the fundamental Islamic belief that Prophet Muhammad (PBUH) is the final prophet, and no prophet will come after him.","section":"Islamiyat & Pakistan Affairs","id":994},{"q":"Which term describes the Islamic legal concept of mutual consultation, often cited as a basis for participatory governance and decision-making?","o":["Shura","Ijma","Ijtihad","Qiyas"],"a":0,"e":"'Shura' refers to the principle of mutual consultation, mentioned in the Quran as a value to be upheld in communal and governance matters.","section":"Islamiyat & Pakistan Affairs","id":995},{"q":"Which Surah of the Quran explicitly discusses the principle of 'Shura' (mutual consultation) as a virtue among believers?","o":["Al-Ma'idah","An-Nisa","Ash-Shura","Al-Baqarah"],"a":2,"e":"Surah Ash-Shura (Chapter 42) is named after and discusses the principle of mutual consultation among believers as a valued communal practice.","section":"Islamiyat & Pakistan Affairs","id":996},{"q":"Which of the following describes the term 'Wahy' in Islamic terminology?","o":["A category of Hadith narrators","A type of Islamic legal ruling","A specific form of charity","Divine revelation communicated to prophets"],"a":3,"e":"'Wahy' refers to divine revelation communicated by Allah to His prophets, forming the basis of the Quran's revelation to Prophet Muhammad (PBUH).","section":"Islamiyat & Pakistan Affairs","id":997},{"q":"Which of the following describes the term 'Risalah' in Islamic belief?","o":["The pilgrimage to Makkah","The institution and concept of Prophethood/Messengership","The compilation of Hadith literature","The practice of charitable giving"],"a":1,"e":"'Risalah' refers to the concept and institution of Prophethood, encompassing the belief in messengers sent by Allah to guide humanity.","section":"Islamiyat & Pakistan Affairs","id":998},{"q":"Which of the following describes the Islamic concept of 'Qadar' (or Taqdeer)?","o":["The practice of fasting during Ramadan","Divine predestination and decree over all events","A specific school of Islamic jurisprudence","The pilgrimage rites performed during Hajj"],"a":1,"e":"'Qadar' refers to the Islamic belief in divine predestination, wherein Allah has decreed and has full knowledge of all that occurs.","section":"Islamiyat & Pakistan Affairs","id":999}]</script>

}

function App() {
  const [screen, setScreen] = useState('home'); // home, setup, quiz, results, review
  const [progress, setProgress] = useState({ attempts: {}, history: [] });
  const [loaded, setLoaded] = useState(false);

  const [config, setConfig] = useState({ section: 'All Sections (weighted)', count: 30, timedMode: true, secondsPerQ: 60 });
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // qid -> selected option index or null
  const [revealed, setRevealed] = useState({});
  const [flagged, setFlagged] = useState({});
  const [timeLeft, setTimeLeft] = useState(0);
  const [quizStartTime, setQuizStartTime] = useState(null);
  const timerRef = useRef(null);

  // Load progress from storage on mount
  useEffect(() => {
    (async () => {
      try {
        if (window.storage && typeof window.storage.get === 'function') {
          const result = await window.storage.get('mcq_progress', false);
          if (result && result.value) {
            setProgress(JSON.parse(result.value));
          }
        } else {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setProgress(JSON.parse(raw));
        }
      } catch (e) {
        // no existing data, that's fine
      }
      setLoaded(true);
    })();
  }, []);

  const saveProgress = async (newProgress) => {
    setProgress(newProgress);
    try {
      if (window.storage && typeof window.storage.set === 'function') {
        await window.storage.set('mcq_progress', JSON.stringify(newProgress), false);
      } else {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(newProgress));
      }
    } catch (e) {
      console.error('Could not save progress', e);
    }
  };

  // Timer effect
  useEffect(() => {
    if (screen !== 'quiz' || !config.timedMode) return;
    if (timeLeft <= 0) {
      handleNext(true);
      return;
    }
    timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(timerRef.current);
  }, [timeLeft, screen]);

  function buildQuiz() {
    let pool = [];
    if (config.section === 'All Sections (weighted)') {
      // weighted sampling per section proportion
      const total = config.count;
      SECTIONS.forEach(sec => {
        const w = WEIGHTS[sec] || (100 / SECTIONS.length);
        const n = Math.max(1, Math.round((w / 100) * total));
        const secQs = shuffleArray(ALL_QUESTIONS.filter(q => q.section === sec)).slice(0, n);
        pool = pool.concat(secQs);
      });
      pool = shuffleArray(pool).slice(0, total);
    } else {
      pool = shuffleArray(ALL_QUESTIONS.filter(q => q.section === config.section)).slice(0, config.count);
    }
    setQuizQuestions(pool);
    setCurrentIdx(0);
    setAnswers({});
    setRevealed({});
    setFlagged({});
    setQuizStartTime(Date.now());
    if (config.timedMode) setTimeLeft(config.secondsPerQ);
    setScreen('quiz');
  }

  function selectOption(qid, optIdx) {
    if (revealed[qid]) return;
    setAnswers(a => ({ ...a, [qid]: optIdx }));
    setRevealed(r => ({ ...r, [qid]: true }));
    if (timerRef.current) clearTimeout(timerRef.current);
  }

  function handleNext(autoSkip) {
    if (timerRef.current) clearTimeout(timerRef.current);
    const q = quizQuestions[currentIdx];
    if (autoSkip && !revealed[q.id]) {
      setRevealed(r => ({ ...r, [q.id]: true }));
      setAnswers(a => ({ ...a, [q.id]: -1 }));
    }
    if (currentIdx + 1 >= quizQuestions.length) {
      finishQuiz();
    } else {
      setCurrentIdx(i => i + 1);
      if (config.timedMode) setTimeLeft(config.secondsPerQ);
    }
  }

  function handlePrev() {
    if (currentIdx > 0) setCurrentIdx(i => i - 1);
  }

  async function finishQuiz() {
    const timeTakenSec = Math.round((Date.now() - quizStartTime) / 1000);
    let correct = 0, wrong = 0, skipped = 0;
    const sectionBreakdown = {};
    quizQuestions.forEach(q => {
      const ans = answers[q.id];
      if (!sectionBreakdown[q.section]) sectionBreakdown[q.section] = { correct: 0, total: 0 };
      sectionBreakdown[q.section].total += 1;
      if (ans === undefined || ans === -1) { skipped++; }
      else if (ans === q.a) { correct++; sectionBreakdown[q.section].correct += 1; }
      else { wrong++; }
    });
    const attemptRecord = {
      date: new Date().toISOString(),
      section: config.section,
      total: quizQuestions.length,
      correct, wrong, skipped,
      timeTakenSec,
      sectionBreakdown
    };
    const newAttempts = { ...progress.attempts };
    quizQuestions.forEach(q => {
      const ans = answers[q.id];
      if (!newAttempts[q.id]) newAttempts[q.id] = { seen: 0, correct: 0 };
      newAttempts[q.id].seen += 1;
      if (ans === q.a) newAttempts[q.id].correct += 1;
    });
    const newHistory = [...progress.history, attemptRecord].slice(-50);
    await saveProgress({ attempts: newAttempts, history: newHistory });
    setScreen('results');
  }

  function resetToHome() {
    setScreen('home');
  }

  if (!loaded) {
    return <div className="empty-note">Loading your progress…</div>;
  }

  return (
    <div>
      <header className="app-header">
        <h1>MeritPrep</h1>
        <p>Free practice for PPSC, FPSC &amp; NTS · Current Affairs &amp; G.K · English · Reasoning · Computer Knowledge · Islamiyat &amp; Pakistan Affairs</p>
        <div className="badge-row">
          <span className="badge">{ALL_QUESTIONS.length} questions loaded</span>
          <span className="badge">5 sections, weighted to syllabus</span>
        </div>
      </header>

      {screen === 'home' && <HomeScreen progress={progress} onStart={() => setScreen('setup')} onReview={() => setScreen('weak')} onAbout={() => setScreen('about')} onPrivacy={() => setScreen('privacy')} />}
      {screen === 'about' && <AboutScreen onHome={resetToHome} />}
      {screen === 'privacy' && <PrivacyScreen onHome={resetToHome} />}
      {screen === 'setup' && (
        <SetupScreen
          config={config}
          setConfig={setConfig}
          onBuild={buildQuiz}
          onBack={resetToHome}
        />
      )}
      {screen === 'quiz' && quizQuestions.length > 0 && (
        <QuizScreen
          questions={quizQuestions}
          currentIdx={currentIdx}
          answers={answers}
          revealed={revealed}
          flagged={flagged}
          setFlagged={setFlagged}
          timeLeft={timeLeft}
          timedMode={config.timedMode}
          onSelect={selectOption}
          onNext={() => handleNext(false)}
          onPrev={handlePrev}
          onQuit={resetToHome}
        />
      )}
      {screen === 'results' && (
        <ResultsScreen
          questions={quizQuestions}
          answers={answers}
          onReview={() => setScreen('review')}
          onHome={resetToHome}
          onRetry={() => buildQuiz()}
        />
      )}
      {screen === 'review' && (
        <ReviewScreen
          questions={quizQuestions}
          answers={answers}
          onHome={resetToHome}
        />
      )}
      {screen === 'weak' && (
        <WeakAreasScreen progress={progress} onHome={resetToHome} />
      )}
    </div>
  );
}

function HomeScreen({ progress, onStart, onReview, onAbout, onPrivacy }) {
  const history = progress.history || [];
  const lastFive = [...history].reverse().slice(0, 5);
  const totalAttempted = history.reduce((s, h) => s + h.total, 0);
  const totalCorrect = history.reduce((s, h) => s + h.correct, 0);
  const overallPct = totalAttempted > 0 ? Math.round((totalCorrect / totalAttempted) * 100) : null;

  return (
    <div>
      <div className="card">
        <h2 className="section-title">Start a practice session</h2>
        <p className="muted">Build a custom test from the full question bank, weighted to match the official syllabus, or focus on one section at a time.</p>
        <button className="btn" onClick={onStart}>Set up a new test ↗</button>
      </div>

      {history.length > 0 && (
        <div className="card">
          <h2 className="section-title">Your progress so far</h2>
          <div className="stat-grid">
            <div className="stat-box">
              <div className="num">{history.length}</div>
              <div className="lbl">Tests taken</div>
            </div>
            <div className="stat-box">
              <div className="num">{overallPct !== null ? overallPct + '%' : '—'}</div>
              <div className="lbl">Overall accuracy</div>
            </div>
            <div className="stat-box">
              <div className="num">{totalAttempted}</div>
              <div className="lbl">Questions answered</div>
            </div>
          </div>
          <table className="score-table">
            <thead>
              <tr><th>Date</th><th>Section</th><th>Score</th><th>Time</th></tr>
            </thead>
            <tbody>
              {lastFive.map((h, i) => (
                <tr key={i}>
                  <td>{new Date(h.date).toLocaleDateString()}</td>
                  <td>{h.section.replace(' (weighted)', '')}</td>
                  <td>{h.correct}/{h.total}</td>
                  <td>{Math.floor(h.timeTakenSec / 60)}m {h.timeTakenSec % 60}s</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="btn-row">
            <button className="btn-secondary btn" onClick={onReview}>View weak areas ↗</button>
          </div>
        </div>
      )}

      <div className="card">
        <h2 className="section-title">Syllabus weightage</h2>
        <p className="muted">Subject-wise breakdown across the full question bank.</p>
        <div className="section-grid">
          {Object.entries(WEIGHTS).map(([sec, w]) => (
            <div key={sec} className="section-pill" style={{cursor: 'default'}}>
              <div className="name">{sec}</div>
              <div className="pct">{w}% of paper</div>
            </div>
          ))}
        </div>
      </div>

      <footer className="app-footer">
        <span>MeritPrep — built for Pakistani competitive exam candidates.</span>
        <span className="footer-links">
          <button className="link-btn" onClick={onAbout}>About</button>
          <span aria-hidden="true">·</span>
          <button className="link-btn" onClick={onPrivacy}>Privacy Policy</button>
        </span>
      </footer>
    </div>
  );
}

function AboutScreen({ onHome }) {
  return (
    <div className="card">
      <div className="top-nav">
        <h2 className="section-title" style={{margin: 0}}>About MeritPrep</h2>
        <button className="btn-secondary btn" onClick={onHome}>Back to home</button>
      </div>
      <p className="muted">
        MeritPrep is a free practice tool for candidates preparing for Pakistani public-service and
        competitive exams, including PPSC, FPSC, and NTS-based tests. It covers the five subject areas
        most commonly tested: Current Affairs &amp; General Knowledge, English Language, Arithmetical &amp;
        Analytical Reasoning, Computer Related Knowledge, and Islamiyat &amp; Pakistan Affairs.
      </p>
      <p className="muted">
        Every question includes a short explanation, so you learn the reasoning behind the correct
        answer rather than just memorizing it. Your results are saved on this device only, so you can
        track your accuracy by section over time and focus your revision on your weaker areas.
      </p>
      <p className="muted">
        MeritPrep is an independent study aid and is not affiliated with the Public Service Commissions,
        NTS, or any government body. Question content is written for practice purposes and should be
        used alongside official syllabi and past papers.
      </p>
    </div>
  );
}

function PrivacyScreen({ onHome }) {
  return (
    <div className="card">
      <div className="top-nav">
        <h2 className="section-title" style={{margin: 0}}>Privacy Policy</h2>
        <button className="btn-secondary btn" onClick={onHome}>Back to home</button>
      </div>
      <p className="muted">Last updated: {new Date().toLocaleDateString()}</p>
      <p className="muted">
        MeritPrep does not require an account and does not collect personal information to operate.
        Your quiz history, scores, and section-wise progress are stored locally in your browser
        (using localStorage) and are never sent to a server. Clearing your browser data will remove
        this history.
      </p>
      <p className="muted">
        If this site displays advertising, third-party ad providers (such as Google AdSense) may use
        cookies or similar technologies to serve ads based on your visits to this and other sites. You
        can control ad personalization through your browser settings or the ad provider's own opt-out
        tools.
      </p>
      <p className="muted">
        We do not knowingly collect information from children. If you have questions about this policy,
        please reach out through the contact details provided on the site you accessed MeritPrep from.
      </p>
    </div>
  );
}

function SetupScreen({ config, setConfig, onBuild, onBack }) {
  const sectionOptions = ['All Sections (weighted)', ...SECTIONS];
  const maxForSection = config.section === 'All Sections (weighted)'
    ? ALL_QUESTIONS.length
    : ALL_QUESTIONS.filter(q => q.section === config.section).length;

  return (
    <div className="card">
      <div className="top-nav">
        <h2 className="section-title" style={{margin: 0}}>Set up your test</h2>
        <button className="btn-secondary btn" onClick={onBack}>Cancel</button>
      </div>

      <label className="field-label">Section</label>
      <select value={config.section} onChange={e => setConfig(c => ({ ...c, section: e.target.value, count: Math.min(c.count, 9999) }))}>
        {sectionOptions.map(s => <option key={s} value={s}>{s}</option>)}
      </select>

      <div style={{height: '14px'}}></div>

      <label className="field-label">Number of questions (max {maxForSection})</label>
      <input
        type="number"
        min="5"
        max={maxForSection}
        value={config.count}
        onChange={e => setConfig(c => ({ ...c, count: Math.max(5, Math.min(maxForSection, parseInt(e.target.value) || 5)) }))}
      />

      <div className="checkbox-row">
        <input
          type="checkbox"
          id="timed"
          checked={config.timedMode}
          onChange={e => setConfig(c => ({ ...c, timedMode: e.target.checked }))}
        />
        <label htmlFor="timed">Timed mode (per-question countdown, like the real test)</label>
      </div>

      {config.timedMode && (
        <div>
          <label className="field-label">Seconds per question</label>
          <input
            type="number"
            min="15"
            max="180"
            value={config.secondsPerQ}
            onChange={e => setConfig(c => ({ ...c, secondsPerQ: Math.max(15, parseInt(e.target.value) || 60) }))}
          />
        </div>
      )}

      <div className="btn-row">
        <button className="btn" onClick={onBuild}>Begin test ↗</button>
      </div>
    </div>
  );
}

function QuizScreen({ questions, currentIdx, answers, revealed, flagged, setFlagged, timeLeft, timedMode, onSelect, onNext, onPrev, onQuit }) {
  const q = questions[currentIdx];
  const isRevealed = !!revealed[q.id];
  const selected = answers[q.id];
  const pct = Math.round(((currentIdx) / questions.length) * 100);
  const letters = ['A', 'B', 'C', 'D'];

  return (
    <div>
      <div className="top-nav">
        <span className="badge">{q.section}</span>
        <button className="btn-secondary btn" onClick={onQuit}>End test</button>
      </div>

      <div className="progress-track"><div className="progress-fill" style={{width: pct + '%'}}></div></div>

      <div className="card">
        <div className="q-meta">
          <span>Question {currentIdx + 1} of {questions.length}</span>
          <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
            {timedMode && <span className="timer">{timeLeft}s</span>}
            <button
              className={"flag-btn" + (flagged[q.id] ? " flagged" : "")}
              onClick={() => setFlagged(f => ({ ...f, [q.id]: !f[q.id] }))}
              title="Flag for review"
            >{flagged[q.id] ? "★" : "☆"}</button>
          </div>
        </div>

        <div className="q-text">{q.q}</div>

        <div className="options">
          {q.o.map((opt, idx) => {
            let cls = "option";
            if (isRevealed) {
              if (idx === q.a) cls += " correct";
              else if (idx === selected) cls += " wrong";
              cls += " locked";
            }
            return (
              <button key={idx} className={cls} onClick={() => onSelect(q.id, idx)} disabled={isRevealed}>
                <span className="opt-letter">{letters[idx]}</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>

        {isRevealed && (
          <div className="explain">
            <b>{selected === q.a ? "Correct. " : selected === -1 ? "Time's up. " : "Not quite. "}</b>
            {q.e}
          </div>
        )}

        <div className="btn-row">
          <button className="btn-secondary btn" onClick={onPrev} disabled={currentIdx === 0}>Previous</button>
          <button className="btn" onClick={onNext} disabled={!isRevealed}>
            {currentIdx + 1 >= questions.length ? "Finish test ↗" : "Next question"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ResultsScreen({ questions, answers, onReview, onHome, onRetry }) {
  let correct = 0, wrong = 0, skipped = 0;
  const sectionStats = {};
  questions.forEach(q => {
    const ans = answers[q.id];
    if (!sectionStats[q.section]) sectionStats[q.section] = { correct: 0, total: 0 };
    sectionStats[q.section].total += 1;
    if (ans === undefined || ans === -1) skipped++;
    else if (ans === q.a) { correct++; sectionStats[q.section].correct += 1; }
    else wrong++;
  });
  const pct = Math.round((correct / questions.length) * 100);

  let verdict = "Keep practicing — review the explanations below.";
  if (pct >= 85) verdict = "Strong performance. You're well prepared for this section.";
  else if (pct >= 65) verdict = "Solid foundation. A bit more practice will close the gap.";
  else if (pct >= 45) verdict = "You're getting there. Focus on your weaker sections.";

  return (
    <div className="card">
      <h2 className="section-title">Test complete</h2>
      <div className="stat-grid">
        <div className="stat-box"><div className="num">{correct}/{questions.length}</div><div className="lbl">Score</div></div>
        <div className="stat-box"><div className="num">{pct}%</div><div className="lbl">Accuracy</div></div>
        <div className="stat-box"><div className="num">{skipped}</div><div className="lbl">Skipped</div></div>
      </div>
      <p className="muted">{verdict}</p>

      <h2 className="section-title" style={{marginTop: '1.2rem'}}>Section breakdown</h2>
      <table className="score-table">
        <thead><tr><th>Section</th><th>Correct</th><th>Accuracy</th></tr></thead>
        <tbody>
          {Object.entries(sectionStats).map(([sec, s]) => (
            <tr key={sec}>
              <td>{sec}</td>
              <td>{s.correct}/{s.total}</td>
              <td>{Math.round((s.correct / s.total) * 100)}%</td>
            </tr>
          ))}
        </tbody>
      </table>

      <div className="btn-row">
        <button className="btn" onClick={onReview}>Review answers ↗</button>
        <button className="btn-secondary btn" onClick={onRetry}>New test, same settings</button>
        <button className="btn-secondary btn" onClick={onHome}>Back to home</button>
      </div>
    </div>
  );
}

function ReviewScreen({ questions, answers, onHome }) {
  const letters = ['A', 'B', 'C', 'D'];
  return (
    <div className="card">
      <div className="top-nav">
        <h2 className="section-title" style={{margin: 0}}>Answer review</h2>
        <button className="btn-secondary btn" onClick={onHome}>Back to home</button>
      </div>
      {questions.map((q, i) => {
        const ans = answers[q.id];
        const isCorrect = ans === q.a;
        const isSkipped = ans === undefined || ans === -1;
        return (
          <div key={q.id} className="review-row" style={{display: 'block', paddingBottom: '14px'}}>
            <div style={{display: 'flex', gap: '8px'}}>
              <span className={"review-icon " + (isSkipped ? "skip" : isCorrect ? "ok" : "bad")}>
                {isSkipped ? "○" : isCorrect ? "✓" : "✗"}
              </span>
              <div style={{flex: 1}}>
                <div style={{fontWeight: 600, marginBottom: '4px'}}>{i + 1}. {q.q}</div>
                <div style={{fontSize: '13px', color: 'var(--ink-soft)'}}>
                  Correct answer: <b>{letters[q.a]}. {q.o[q.a]}</b>
                  {!isCorrect && !isSkipped && <span> — you chose {letters[ans]}. {q.o[ans]}</span>}
                </div>
                <div className="explain" style={{marginTop: '8px'}}>{q.e}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function WeakAreasScreen({ progress, onHome }) {
  const attempts = progress.attempts || {};
  const bySection = {};
  Object.entries(attempts).forEach(([qid, stat]) => {
    const q = ALL_QUESTIONS.find(x => String(x.id) === String(qid));
    if (!q) return;
    if (!bySection[q.section]) bySection[q.section] = { correct: 0, seen: 0 };
    bySection[q.section].correct += stat.correct;
    bySection[q.section].seen += stat.seen;
  });
  const rows = Object.entries(bySection).map(([sec, s]) => ({
    section: sec,
    accuracy: s.seen > 0 ? Math.round((s.correct / s.seen) * 100) : 0,
    seen: s.seen
  })).sort((a, b) => a.accuracy - b.accuracy);

  return (
    <div className="card">
      <div className="top-nav">
        <h2 className="section-title" style={{margin: 0}}>Weak areas</h2>
        <button className="btn-secondary btn" onClick={onHome}>Back to home</button>
      </div>
      {rows.length === 0 && <div className="empty-note">Take a test first to see your weak areas here.</div>}
      {rows.length > 0 && (
        <table className="score-table">
          <thead><tr><th>Section</th><th>Accuracy</th><th>Questions seen</th></tr></thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.section}>
                <td>{r.section}</td>
                <td>{r.accuracy}%</td>
                <td>{r.seen}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
