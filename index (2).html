<style>
  :root {
    --bg: #f6f5f1;
    --panel: #ffffff;
    --ink: #1c1f26;
    --ink-soft: #5a5f6b;
    --line: #e1ddd2;
    --line-strong: #c9c3b3;
    --accent: #0f4c5c;
    --accent-soft: #e3eef0;
    --correct: #1e6b3f;
    --correct-bg: #e6f3ea;
    --wrong: #a23b2e;
    --wrong-bg: #faeae7;
    --gold: #9c7a2e;
    --gold-bg: #f7f0dc;
    --radius: 10px;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
  header.app-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
  }
  header.app-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }
  header.app-header p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 13px;
  }
  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .badge {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent);
    font-weight: 600;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin: 1rem 0;
  }
  .section-pill {
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: var(--panel);
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .section-pill:hover { border-color: var(--accent); background: var(--accent-soft); }
  .section-pill.active { border-color: var(--accent); background: var(--accent-soft); }
  .section-pill .name { font-weight: 600; font-size: 14px; color: var(--ink); }
  .section-pill .count { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .section-pill .pct { font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 4px; }
  .btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--ink);
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line-strong);
  }
  .btn-secondary:hover { background: var(--accent-soft); border-color: var(--accent); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }
  label.field-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  select, input[type=number] {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: #fff;
    color: var(--ink);
    width: 100%;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 1rem 0;
  }
  .stat-box {
    background: var(--accent-soft);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-box .num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
    margin: 10px 0 4px;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.2s; }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .q-meta .timer { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .q-text { font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 1.1rem; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    text-align: left;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: #fff;
    font-family: inherit;
    font-size: 14.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.12s, background 0.12s;
  }
  .option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-soft); }
  .option .opt-letter {
    width: 24px; height: 24px; min-width: 24px;
    border-radius: 50%;
    border: 1px solid var(--line-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
  }
  .option.correct { border-color: var(--correct); background: var(--correct-bg); }
  .option.correct .opt-letter { border-color: var(--correct); background: var(--correct); color: #fff; }
  .option.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .option.wrong .opt-letter { border-color: var(--wrong); background: var(--wrong); color: #fff; }
  .explain {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--gold-bg);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    font-size: 13.5px;
    color: #4a3c14;
  }
  .explain b { color: var(--gold); }
  .flag-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 18px;
    padding: 2px 6px;
  }
  .flag-btn.flagged { color: var(--gold); }
  h2.section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  p.muted { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 1rem; }
  .review-row {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
    align-items: flex-start;
  }
  .review-row:last-child { border-bottom: none; }
  .review-icon { width: 18px; min-width: 18px; font-weight: 700; }
  .review-icon.ok { color: var(--correct); }
  .review-icon.bad { color: var(--wrong); }
  .review-icon.skip { color: var(--ink-soft); }
  table.score-table { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 0.5rem; }
  table.score-table th, table.score-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
  table.score-table th { color: var(--ink-soft); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.4px; }
  .empty-note { text-align: center; padding: 2rem 1rem; color: var(--ink-soft); font-size: 14px; }
  .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .top-nav button.btn-secondary { padding: 8px 14px; font-size: 13px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 13.5px; color: var(--ink-soft); }
  .checkbox-row input { width: 16px; height: 16px; }
  ::selection { background: var(--accent-soft); }
  .app-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .footer-links { display: flex; align-items: center; gap: 8px; }
  .link-btn {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }
  .link-btn:hover { opacity: 0.75; }
</style>
</head>

<script id="question-data" type="application/json">
[{"q":"Which Pakistani city became the first in the country to host a Formal G20-adjacent multilateral SCO event, the SCO Council of Foreign Ministers, in 2024?","o":["Karachi","Lahore","Peshawar","Islamabad"],"a":3,"e":"Islamabad hosted the SCO Council of Heads of Government meeting in October 2024, a major diplomatic milestone for Pakistan.","section":"Current Affairs & General Knowledge","id":0},{"q":"The 'Living Indus Initiative', launched by Pakistan in 2021, is primarily aimed at which of the following?","o":["Mapping mineral deposits along the Indus","Privatizing irrigation canals","Restoring the ecological health of the Indus River basin","Building new dams on the Indus"],"a":2,"e":"The Living Indus Initiative is a nationwide programme to restore the ecological integrity of the Indus River ecosystem, endorsed by the UN as one of the World Restoration Flagships.","section":"Current Affairs & General Knowledge","id":1},{"q":"Which Pakistani region formally became a province-like entity through its merger with Khyber Pakhtunkhwa in 2018, ending its special status?","o":["Gilgit-Baltistan","Islamabad Capital Territory","FATA (Federally Administered Tribal Areas)","Azad Jammu and Kashmir"],"a":2,"e":"FATA was merged with Khyber Pakhtunkhwa through the 25th Constitutional Amendment in May 2018, ending its separate administrative status.","section":"Current Affairs & General Knowledge","id":2},{"q":"The 'Ravi Riverfront Urban Development Project' is a major planned city development associated with which Pakistani city?","o":["Lahore","Faisalabad","Multan","Sialkot"],"a":0,"e":"The Ravi Urban Development Authority (RUDA) project is centered on Lahore, aiming to develop a new city along the River Ravi.","section":"Current Affairs & General Knowledge","id":3},{"q":"Which global index ranks Pakistan's cities, and in recent years has repeatedly placed Lahore among the world's most polluted cities by air quality?","o":["Global Peace Index","Human Development Index","Ease of Doing Business Index","IQAir World Air Quality Index"],"a":3,"e":"IQAir's World Air Quality Index has repeatedly ranked Lahore among the most polluted major cities globally, particularly during winter smog season.","section":"Current Affairs & General Knowledge","id":4},{"q":"Pakistan's 'Single National Curriculum' policy, implemented in phases from 2021, primarily aims to standardize which of the following across the country?","o":["University admission tests","Civil service examinations","Provincial tax codes","School curricula across public, private and madrassa systems"],"a":3,"e":"The Single National Curriculum was introduced to bring public, private, and religious seminary schools onto one standardized curriculum framework.","section":"Current Affairs & General Knowledge","id":5},{"q":"The Diamer-Bhasha Dam, a major hydropower project under construction in Pakistan, is being built on which river?","o":["Indus","Chenab","Jhelum","Kabul"],"a":0,"e":"Diamer-Bhasha Dam is under construction on the Indus River in Gilgit-Baltistan, near the boundary with Khyber Pakhtunkhwa.","section":"Current Affairs & General Knowledge","id":6},{"q":"Which Pakistani economist served as Finance Minister and was closely associated with negotiating IMF Extended Fund Facility programmes in the 2023-2024 period?","o":["Ishaq Dar","Hafeez Sheikh","Miftah Ismail","Shaukat Tarin"],"a":0,"e":"Senator Ishaq Dar served as Finance Minister during key phases of Pakistan's IMF negotiations in 2023, before Muhammad Aurangzeb took over the finance portfolio in 2024.","section":"Current Affairs & General Knowledge","id":7},{"q":"The term 'Fourth Industrial Revolution', frequently referenced in Pakistan's digital policy discussions, was popularized by which organization's founder?","o":["United Nations","World Bank","World Economic Forum","OECD"],"a":2,"e":"The term was popularized by Klaus Schwab, founder of the World Economic Forum, in his 2016 book of the same name.","section":"Current Affairs & General Knowledge","id":8},{"q":"Which Pakistani city is home to the Trade Development Authority of Pakistan's head office?","o":["Lahore","Faisalabad","Islamabad","Karachi"],"a":0,"e":"TDAP's head office is located in Karachi, though it operates under the Ministry of Commerce in Islamabad.","section":"Current Affairs & General Knowledge","id":9},{"q":"Pakistan's Ehsaas Programme, later continued under a different name, was primarily designed to address which issue?","o":["Urban traffic congestion","Export promotion","Foreign direct investment","Poverty alleviation and social safety nets"],"a":3,"e":"Ehsaas was Pakistan's flagship social protection and poverty alleviation programme, later rebranded as the Benazir Income Support Programme umbrella continued its cash transfer functions.","section":"Current Affairs & General Knowledge","id":10},{"q":"Which Pakistani dam, located in Khyber Pakhtunkhwa, was completed with Chinese assistance and is notable for reservoir capacity affecting Tarbela's siltation?","o":["Khanpur Dam","Warsak Dam","Gomal Zam Dam","Mohmand Dam"],"a":3,"e":"Mohmand Dam, under construction on the Swat River, is a multipurpose dam intended to supply water, power and flood control for Peshawar and surrounding areas.","section":"Current Affairs & General Knowledge","id":11},{"q":"The 'Green Pakistan Initiative' and 'Ten Billion Tree Tsunami' programmes are primarily associated with which policy area?","o":["Housing finance","Industrial exports","Afforestation and climate change mitigation","Digital literacy"],"a":2,"e":"The Ten Billion Tree Tsunami was a major afforestation programme launched to combat deforestation and climate change in Pakistan, initially in KP and later nationwide.","section":"Current Affairs & General Knowledge","id":12},{"q":"Which multilateral development bank approved significant financing for Pakistan's Resilient Institutions for Sustainable Economy (RISE-II) programme after the 2022 floods?","o":["Islamic Development Bank","New Development Bank","World Bank","Asian Development Bank"],"a":2,"e":"The World Bank approved the RISE-II programme to support Pakistan's fiscal and economic resilience following the devastating 2022 floods.","section":"Current Affairs & General Knowledge","id":13},{"q":"Pakistan's benchmark stock exchange index is officially known as which of the following?","o":["KSE-100 Index","PSX-50 Index","SBP Composite Index","NSE-100 Index"],"a":0,"e":"The KSE-100 Index, maintained by the Pakistan Stock Exchange (formerly Karachi Stock Exchange), is Pakistan's principal equity benchmark.","section":"Current Affairs & General Knowledge","id":14},{"q":"Which Pakistani city hosts the country's largest dry port, facilitating inland customs clearance for northern Punjab and KP?","o":["Multan","Sialkot","Faisalabad","Lahore"],"a":3,"e":"Lahore's dry port is among the largest, though Sialkot also hosts a significant dry port serving its export-heavy industrial base.","section":"Current Affairs & General Knowledge","id":15},{"q":"The National Electric Power Regulatory Authority (NEPRA) in Pakistan is primarily responsible for regulating which sector?","o":["Telecommunications","Aviation","Banking","Electricity generation, transmission and distribution"],"a":3,"e":"NEPRA regulates the power sector, including tariff determination, licensing of generation and distribution companies.","section":"Current Affairs & General Knowledge","id":16},{"q":"Pakistan's 'Roshan Digital Account' initiative, launched by the State Bank of Pakistan, primarily targets which group?","o":["Small farmers","Government employees","Overseas Pakistanis wishing to invest remotely","University students"],"a":2,"e":"The Roshan Digital Account scheme allows non-resident Pakistanis to open bank accounts and invest in Pakistan remotely without visiting in person.","section":"Current Affairs & General Knowledge","id":17},{"q":"Which international credit rating agency upgraded Pakistan's sovereign credit rating outlook following the 2024 IMF programme approval?","o":["Standard & Poor's only","Both Moody's and Fitch upgraded ratings/outlooks in this period","Fitch Ratings","Moody's"],"a":1,"e":"In 2024, both Moody's and Fitch upgraded Pakistan's ratings or outlook, citing improved macroeconomic stability following the IMF Stand-By Arrangement and subsequent EFF.","section":"Current Affairs & General Knowledge","id":18},{"q":"The Thar Coal Block II power project, a major energy initiative under CPEC, is located in which province?","o":["Punjab","Sindh","Balochistan","Khyber Pakhtunkhwa"],"a":1,"e":"Thar coal reserves and associated power projects are located in the Tharparkar district of Sindh.","section":"Current Affairs & General Knowledge","id":19},{"q":"Which Pakistani official currently holds the position of Governor of the State Bank of Pakistan (as of the 2025-2026 period)?","o":["Jameel Ahmad","Tariq Bajwa","Ishrat Husain","Reza Baqir"],"a":0,"e":"Jameel Ahmad has served as Governor of the State Bank of Pakistan since 2022.","section":"Current Affairs & General Knowledge","id":20},{"q":"Gwadar Port, a centerpiece of CPEC, is located in which administrative division of Balochistan?","o":["Makran Division","Sibi Division","Kalat Division","Quetta Division"],"a":0,"e":"Gwadar is a coastal city situated within the Makran Division of Balochistan.","section":"Current Affairs & General Knowledge","id":21},{"q":"The 'Panjgur' and 'Turbat' districts, frequently mentioned in security and development contexts, are located in which province?","o":["Balochistan","Punjab","Khyber Pakhtunkhwa","Sindh"],"a":0,"e":"Both Panjgur and Turbat are districts of the Makran region in Balochistan.","section":"Current Affairs & General Knowledge","id":22},{"q":"Which Pakistani telecom regulator issued licenses for 5G spectrum auctions being planned in the mid-2020s?","o":["SECP","FBR","PTA (Pakistan Telecommunication Authority)","NEPRA"],"a":2,"e":"The Pakistan Telecommunication Authority regulates telecom licensing, including spectrum allocation for mobile broadband technologies like 5G.","section":"Current Affairs & General Knowledge","id":23},{"q":"The Karakoram Highway, linking Pakistan and China, crosses which high-altitude pass at the border?","o":["Bolan Pass","Khunjerab Pass","Khyber Pass","Babusar Pass"],"a":1,"e":"The Khunjerab Pass, at over 4,700 metres, is the border crossing point between Pakistan's Gilgit-Baltistan and China's Xinjiang region.","section":"Current Affairs & General Knowledge","id":24},{"q":"Which organization compiles and publishes the annual 'Economic Survey of Pakistan' released before the federal budget?","o":["State Bank of Pakistan","Planning Commission","Ministry of Finance","Pakistan Bureau of Statistics"],"a":2,"e":"The Ministry of Finance's Finance Division prepares and releases the Economic Survey of Pakistan annually, typically a day before the budget.","section":"Current Affairs & General Knowledge","id":25},{"q":"The 'Benazir Nashonuma Programme' is a conditional cash transfer initiative in Pakistan aimed at addressing which issue?","o":["Girls' higher education","Rural electrification","Youth unemployment","Stunting and malnutrition in children under two"],"a":3,"e":"Benazir Nashonuma provides conditional cash transfers linked to nutrition and health check-ups for pregnant women and children under two to combat stunting.","section":"Current Affairs & General Knowledge","id":26},{"q":"Which Pakistani province was most severely affected by the catastrophic floods of 2022, in terms of proportion of land inundated?","o":["Sindh","Balochistan","Punjab","Khyber Pakhtunkhwa"],"a":0,"e":"Sindh bore the brunt of the 2022 floods, with a very large share of its agricultural land submerged for extended periods.","section":"Current Affairs & General Knowledge","id":27},{"q":"The 'National Flood Protection Plan-IV' in Pakistan primarily falls under the responsibility of which body?","o":["IRSA","NDMA","Federal Flood Commission","WAPDA"],"a":2,"e":"The Federal Flood Commission formulates and oversees National Flood Protection Plans in Pakistan.","section":"Current Affairs & General Knowledge","id":28},{"q":"Which Pakistani city was declared to have the worst air quality in the world by IQAir on multiple occasions during winter 2024-2025?","o":["Lahore","Multan","Faisalabad","Gujranwala"],"a":0,"e":"Lahore has repeatedly topped global smog rankings during winter months in recent years due to crop burning, vehicular emissions, and industrial pollution.","section":"Current Affairs & General Knowledge","id":29},{"q":"The Indus Waters Treaty, signed in 1960 between Pakistan and India, was brokered with the mediation of which institution?","o":["International Monetary Fund","United Nations","Commonwealth","World Bank"],"a":3,"e":"The World Bank facilitated and helped broker the Indus Waters Treaty between Pakistan and India in 1960.","section":"Current Affairs & General Knowledge","id":30},{"q":"Which Pakistani city hosts the headquarters of the Water and Power Development Authority (WAPDA)?","o":["Islamabad","Faisalabad","Peshawar","Lahore"],"a":3,"e":"WAPDA's headquarters, WAPDA House, is located in Lahore.","section":"Current Affairs & General Knowledge","id":31},{"q":"The 'Uraan Pakistan' economic transformation framework, unveiled around 2024-2025, primarily targets which long-term goal?","o":["Achieving upper-middle-income status through export-led growth","Complete energy self-sufficiency by 2030","Zero foreign debt by 2035","Universal free higher education"],"a":0,"e":"Uraan Pakistan is a five-year economic transformation plan focused on export-led, sustainable growth aiming for upper-middle-income country status.","section":"Current Affairs & General Knowledge","id":32},{"q":"Which international organization periodically reviews Pakistan's compliance on anti-money laundering and counter-terror financing, historically placing it on a 'grey list'?","o":["World Trade Organization","Basel Committee","Financial Action Task Force (FATF)","International Monetary Fund"],"a":2,"e":"FATF monitors countries for money laundering and terror financing risks; Pakistan was on FATF's grey list from 2018 to 2022 before being removed.","section":"Current Affairs & General Knowledge","id":33},{"q":"Pakistan was removed from the FATF grey list in which year?","o":["2021","2022","2020","2023"],"a":1,"e":"Pakistan was formally removed from the FATF grey list in October 2022 after completing its action plans.","section":"Current Affairs & General Knowledge","id":34},{"q":"Which Pakistani city is often referred to as the industrial hub of Punjab and is known for its textile exports?","o":["Multan","Sialkot","Gujranwala","Faisalabad"],"a":3,"e":"Faisalabad, sometimes called the 'Manchester of Pakistan', is a major textile and industrial hub.","section":"Current Affairs & General Knowledge","id":35},{"q":"Sialkot, a Pakistani city, is globally recognized for manufacturing and exporting which specific product category?","o":["Automobiles","Surgical instruments and sports goods","Petrochemicals","Cement"],"a":1,"e":"Sialkot is world-renowned for manufacturing footballs, surgical instruments, and sports equipment for export.","section":"Current Affairs & General Knowledge","id":36},{"q":"The Neelum-Jhelum Hydropower Project, which faced major setbacks including a tunnel collapse, is located in which region?","o":["Azad Jammu and Kashmir","Khyber Pakhtunkhwa","Gilgit-Baltistan","Punjab"],"a":0,"e":"The Neelum-Jhelum Hydropower Plant is situated in Azad Jammu and Kashmir, on the Neelum River.","section":"Current Affairs & General Knowledge","id":37},{"q":"Which Pakistani province recently underwent significant renaming and boundary discussions related to a proposed South Punjab province?","o":["Punjab","Sindh","Balochistan","Khyber Pakhtunkhwa"],"a":0,"e":"There have been longstanding political demands for a separate South Punjab (Seraiki) province carved out of southern Punjab districts.","section":"Current Affairs & General Knowledge","id":38},{"q":"Pakistan's Public Sector Development Programme (PSDP) is primarily used to fund which type of expenditure?","o":["Civil service pensions","Defence salaries","Debt servicing","Development and infrastructure projects"],"a":3,"e":"The PSDP allocates federal funds specifically toward development projects such as infrastructure, energy, and social sector schemes.","section":"Current Affairs & General Knowledge","id":39},{"q":"Which Pakistani agency is responsible for regulating and licensing securities markets, brokers, and corporate entities?","o":["NEPRA","SBP","SECP (Securities and Exchange Commission of Pakistan)","FBR"],"a":2,"e":"SECP regulates the corporate sector and capital markets in Pakistan, including company registration and securities trading.","section":"Current Affairs & General Knowledge","id":40},{"q":"The 'One Window' digital initiative for business registration in Pakistan is most closely associated with which body?","o":["FBR alone","NADRA","SECP eServices / Board of Investment's Pakistan Regulatory Modernization Initiative","PTA"],"a":2,"e":"Pakistan has pursued 'ease of doing business' reforms through SECP's digital company registration and the Board of Investment's regulatory modernization efforts.","section":"Current Affairs & General Knowledge","id":41},{"q":"Which Pakistani city is home to the country's main deep-sea port handling the majority of import/export container traffic?","o":["Pasni","Gwadar","Ormara","Karachi (Port Qasim and Karachi Port)"],"a":3,"e":"Karachi, through Karachi Port and Port Qasim, handles the vast majority of Pakistan's seaborne trade.","section":"Current Affairs & General Knowledge","id":42},{"q":"The Pakistan Single Window (PSW) system, launched to streamline trade, primarily digitizes which process?","o":["Property registration","Cross-border trade documentation and customs clearance","Voter registration","Passport issuance"],"a":1,"e":"The Pakistan Single Window is a digital platform that consolidates and automates cross-border trade regulatory processes.","section":"Current Affairs & General Knowledge","id":43},{"q":"Which Pakistani stock market index crossed the 100,000-point milestone for the first time during 2024?","o":["KSE-30 Index","KSE-100 Index","KMI-30 Index","All Share Index"],"a":1,"e":"The KSE-100 Index crossed the historic 100,000-point mark in 2024, reflecting a strong bull run in Pakistan's equity market.","section":"Current Affairs & General Knowledge","id":44},{"q":"Pakistan's census conducted in 2023 (the 7th population census) recorded the country's population at approximately how many million?","o":["260 million","220 million","195 million","241 million"],"a":3,"e":"The 2023 digital census recorded Pakistan's population at approximately 241.5 million.","section":"Current Affairs & General Knowledge","id":45},{"q":"Which body conducts Pakistan's national population census?","o":["Ministry of Interior","NADRA","Election Commission of Pakistan","Pakistan Bureau of Statistics"],"a":3,"e":"The Pakistan Bureau of Statistics is constitutionally mandated to conduct the national census.","section":"Current Affairs & General Knowledge","id":46},{"q":"The Karachi-Peshawar Main Line-1 (ML-1) railway upgradation project is a flagship initiative under which broader framework?","o":["SAARC connectivity plan","World Bank transport initiative","China-Pakistan Economic Corridor (CPEC)","ADB Silk Road programme"],"a":2,"e":"ML-1 is one of the largest and most significant CPEC infrastructure projects, aiming to upgrade Pakistan Railways' main line.","section":"Current Affairs & General Knowledge","id":47},{"q":"Which of the following best describes the primary function of Pakistan's Council of Common Interests (CCI)?","o":["Managing foreign affairs","Resolving policy conflicts between federal and provincial governments","Appointing judges to the Supreme Court","Conducting elections"],"a":1,"e":"The CCI, established under the Constitution, resolves inter-provincial and federal-provincial disputes over matters listed in the Federal Legislative List.","section":"Current Affairs & General Knowledge","id":48},{"q":"Which Pakistani city was the venue for the 2025 Champions Trophy cricket matches hosted by Pakistan (alongside Dubai as a hybrid venue)?","o":["Only Lahore","Only Karachi","Multan and Faisalabad","Lahore, Karachi and Rawalpindi"],"a":3,"e":"Pakistan hosted the 2025 ICC Champions Trophy across Lahore, Karachi, and Rawalpindi (Rawalpindi Cricket Stadium), under a hybrid model with some matches in Dubai.","section":"Current Affairs & General Knowledge","id":49},{"q":"Which Pakistani institution is responsible for setting the country's key policy (interest) rate?","o":["Planning Commission","Ministry of Finance","Federal Board of Revenue","State Bank of Pakistan's Monetary Policy Committee"],"a":3,"e":"The SBP's Monetary Policy Committee sets the policy rate to manage inflation and monetary conditions.","section":"Current Affairs & General Knowledge","id":50},{"q":"Which of the following best describes Pakistan's 'Uraan Pakistan' plan's stance on the 5E framework it promotes?","o":["Education, Employment, Energy, Environment, Economy","Export, Equity, E-Pakistan, Energy, Environment","Exports, Equity, E-governance, Energy, Environment","Export, E-Pakistan, Environment, Energy, and Equity"],"a":3,"e":"Uraan Pakistan's 5E framework centers on Exports, E-Pakistan (digitalization), Environment, Energy, and Equity as pillars of transformation.","section":"Current Affairs & General Knowledge","id":51},{"q":"Which international body's 'Sustainable Development Goals' (SDGs) framework, adopted in 2015, sets 17 global targets for 2030?","o":["United Nations","G7","World Trade Organization","World Bank"],"a":0,"e":"The UN General Assembly adopted the 2030 Agenda for Sustainable Development, comprising 17 SDGs, in September 2015.","section":"Current Affairs & General Knowledge","id":52},{"q":"Which country currently holds the largest number of permanent seats' worth of influence as a P5 member alongside the USA, Russia, China, and France?","o":["Germany","Japan","India","United Kingdom"],"a":3,"e":"The UK is one of the five permanent members of the UN Security Council, alongside the USA, Russia, China, and France.","section":"Current Affairs & General Knowledge","id":53},{"q":"The BRICS grouping expanded in 2024 to include several new members; which of the following joined as a new member that year?","o":["Morocco","Egypt","Kenya","Nigeria"],"a":1,"e":"Egypt, along with Ethiopia, Iran, and the UAE, formally joined BRICS as new members starting January 2024 (Saudi Arabia's accession remained under consideration).","section":"Current Affairs & General Knowledge","id":54},{"q":"Which organization publishes the annual 'Human Development Index' ranking countries by health, education, and income?","o":["United Nations Development Programme (UNDP)","World Bank","World Health Organization","UNESCO"],"a":0,"e":"UNDP publishes the Human Development Report, which includes the Human Development Index.","section":"Current Affairs & General Knowledge","id":55},{"q":"The 2024 Summer Olympics were hosted in which city?","o":["Paris","Los Angeles","Tokyo","London"],"a":0,"e":"Paris hosted the 2024 Summer Olympic Games.","section":"Current Affairs & General Knowledge","id":56},{"q":"Which country is scheduled to host the 2026 FIFA World Cup, in a first-of-its-kind tri-national arrangement?","o":["Qatar and Saudi Arabia jointly","Only the United States","Brazil and Argentina jointly","USA, Canada and Mexico jointly"],"a":3,"e":"The 2026 FIFA World Cup will be jointly hosted by the United States, Canada, and Mexico, the first World Cup hosted by three nations.","section":"Current Affairs & General Knowledge","id":57},{"q":"Which international agency is primarily responsible for monitoring global nuclear non-proliferation and inspecting nuclear facilities?","o":["NATO","World Health Organization","United Nations Security Council","International Atomic Energy Agency (IAEA)"],"a":3,"e":"The IAEA, headquartered in Vienna, monitors nuclear programmes worldwide and verifies compliance with non-proliferation agreements.","section":"Current Affairs & General Knowledge","id":58},{"q":"Which African country changed its official name from 'Swaziland' to reflect its historical and cultural identity?","o":["Malawi","Eswatini","Botswana","Lesotho"],"a":1,"e":"Swaziland officially renamed itself Eswatini in 2018 under King Mswati III.","section":"Current Affairs & General Knowledge","id":59},{"q":"Which international climate agreement, adopted in 2015, set the goal of limiting global warming to well below 2°C above pre-industrial levels?","o":["Paris Agreement","Montreal Protocol","Copenhagen Accord","Kyoto Protocol"],"a":0,"e":"The Paris Agreement, adopted at COP21 in 2015, set the framework for limiting global temperature rise.","section":"Current Affairs & General Knowledge","id":60},{"q":"Which country hosted COP29, the UN Climate Change Conference held in late 2024?","o":["United Kingdom","Egypt","United Arab Emirates","Azerbaijan"],"a":3,"e":"COP29 was held in Baku, Azerbaijan, in November 2024.","section":"Current Affairs & General Knowledge","id":61},{"q":"The 'Artemis Accords', related to lunar exploration cooperation, were primarily led by which space agency?","o":["Roscosmos","ISRO","NASA","ESA"],"a":2,"e":"The Artemis Accords are a set of principles led by NASA for international cooperation in lunar and space exploration.","section":"Current Affairs & General Knowledge","id":62},{"q":"Which country became the fourth nation to successfully land a spacecraft on the Moon, with its Chandrayaan-3 mission in 2023?","o":["China","India","South Korea","Japan"],"a":1,"e":"India's Chandrayaan-3 mission achieved a successful soft landing near the Moon's south pole in August 2023, making India the fourth country to achieve a lunar landing.","section":"Current Affairs & General Knowledge","id":63},{"q":"Which organization awards the annual Nobel Peace Prize?","o":["Royal Swedish Academy of Sciences","Norwegian Nobel Committee","United Nations","Swedish Academy"],"a":1,"e":"The Norwegian Nobel Committee, based in Oslo, is responsible for awarding the Nobel Peace Prize, distinct from other Nobel prizes awarded in Sweden.","section":"Current Affairs & General Knowledge","id":64},{"q":"Which international organization's headquarters, located in Basel, Switzerland, sets global banking regulatory standards including capital requirements?","o":["World Bank","International Monetary Fund","Bank for International Settlements / Basel Committee on Banking Supervision","Financial Stability Board"],"a":2,"e":"The Basel Committee on Banking Supervision, hosted by the Bank for International Settlements in Basel, sets international banking regulatory frameworks like Basel III.","section":"Current Affairs & General Knowledge","id":65},{"q":"Which South Asian country underwent a significant political crisis in 2022 involving mass protests and the resignation of its president amid an economic collapse?","o":["Nepal","Bangladesh","Sri Lanka","Myanmar"],"a":2,"e":"Sri Lanka experienced a severe economic and political crisis in 2022, leading to President Gotabaya Rajapaksa's resignation.","section":"Current Affairs & General Knowledge","id":66},{"q":"Which country's Prime Minister Sheikh Hasina resigned and fled the country amid mass protests in August 2024?","o":["Myanmar","Sri Lanka","Nepal","Bangladesh"],"a":3,"e":"Sheikh Hasina resigned as Bangladesh's Prime Minister and left the country in August 2024 following widespread student-led protests.","section":"Current Affairs & General Knowledge","id":67},{"q":"Which international organization is primarily tasked with combating global hunger and improving agricultural productivity?","o":["Food and Agriculture Organization (FAO)","WHO","World Food Programme only","UNICEF"],"a":0,"e":"The FAO, a UN specialized agency, leads international efforts to defeat hunger and improve agriculture and food security.","section":"Current Affairs & General Knowledge","id":68},{"q":"Which of the following is the newest permanent member candidate frequently discussed for UN Security Council reform alongside India, Germany, Japan, and Brazil (the G4 nations)?","o":["Nigeria","South Africa is sometimes discussed but is not part of the G4","Indonesia","Turkey"],"a":1,"e":"The G4 nations seeking permanent UNSC seats are India, Germany, Japan, and Brazil; other nations like South Africa are discussed in broader reform contexts but are not part of the G4.","section":"Current Affairs & General Knowledge","id":69},{"q":"The World Economic Forum's annual meeting is traditionally held in which Swiss town?","o":["Zurich","Davos","Bern","Geneva"],"a":1,"e":"The WEF's flagship annual meeting takes place in Davos, Switzerland.","section":"Current Affairs & General Knowledge","id":70},{"q":"Which country's central bank, the Federal Reserve, plays the most significant role in setting global benchmark interest rate trends?","o":["United Kingdom","Japan","United States","European Union"],"a":2,"e":"The US Federal Reserve's monetary policy decisions have outsized global influence due to the dollar's role as the world's primary reserve currency.","section":"Current Affairs & General Knowledge","id":71},{"q":"Which international organization is responsible for setting global aviation safety standards?","o":["FAA","EASA","International Civil Aviation Organization (ICAO)","IATA"],"a":2,"e":"ICAO, a UN specialized agency, sets international standards and recommended practices for civil aviation.","section":"Current Affairs & General Knowledge","id":72},{"q":"Which of the following countries left the European Union following a 2016 referendum, an event commonly known as 'Brexit'?","o":["Norway","United Kingdom","Switzerland","Ireland"],"a":1,"e":"The United Kingdom formally left the European Union in January 2020, following the 2016 Brexit referendum.","section":"Current Affairs & General Knowledge","id":73},{"q":"Which country is the current largest exporter of crude oil in the world?","o":["Iraq","Saudi Arabia","United States","Russia"],"a":1,"e":"Saudi Arabia remains among the world's largest crude oil exporters, alongside the United States as a leading producer.","section":"Current Affairs & General Knowledge","id":74},{"q":"Which organization, headquartered in Vienna, coordinates petroleum export policies among major oil-producing nations?","o":["World Bank","G20","IEA","OPEC"],"a":3,"e":"OPEC (Organization of the Petroleum Exporting Countries) coordinates oil production policy among member states.","section":"Current Affairs & General Knowledge","id":75},{"q":"Which country hosted the G20 Summit in 2023?","o":["India","Italy","Brazil","Indonesia"],"a":0,"e":"India hosted the G20 Summit in New Delhi in September 2023.","section":"Current Affairs & General Knowledge","id":76},{"q":"Which country is set to host the G20 Summit in 2025?","o":["United States","France","Japan","South Africa"],"a":3,"e":"South Africa held the G20 presidency and hosted the summit in 2025, the first African nation to do so.","section":"Current Affairs & General Knowledge","id":77},{"q":"The 'Quad' security dialogue includes the United States, Japan, Australia, and which other country?","o":["India","Indonesia","South Korea","Philippines"],"a":0,"e":"The Quadrilateral Security Dialogue comprises the United States, Japan, India, and Australia.","section":"Current Affairs & General Knowledge","id":78},{"q":"Which organization's flagship publication, the 'World Economic Outlook', provides biannual global growth forecasts?","o":["OECD","International Monetary Fund","United Nations","World Bank"],"a":1,"e":"The IMF publishes the World Economic Outlook report twice a year with global and regional growth projections.","section":"Current Affairs & General Knowledge","id":79},{"q":"Which country's currency is known as the 'Renminbi' or 'Yuan'?","o":["South Korea","Japan","Vietnam","China"],"a":3,"e":"China's official currency is the Renminbi, with the Yuan as its primary unit.","section":"Current Affairs & General Knowledge","id":80},{"q":"Which international humanitarian organization was founded by Henry Dunant and is known for its Geneva Conventions-related mandate?","o":["International Committee of the Red Cross (ICRC)","Médecins Sans Frontières","Amnesty International","Oxfam"],"a":0,"e":"Henry Dunant founded the ICRC, which plays a central role in implementing international humanitarian law under the Geneva Conventions.","section":"Current Affairs & General Knowledge","id":81},{"q":"Which of these is the primary UN body responsible for addressing threats to international peace and security, with binding decision-making power?","o":["UN Security Council","International Court of Justice","UN General Assembly","UN Human Rights Council"],"a":0,"e":"The UN Security Council has primary responsibility for maintaining international peace and security, and its resolutions are binding on member states.","section":"Current Affairs & General Knowledge","id":82},{"q":"Which of the following countries is NOT a permanent member of the UN Security Council?","o":["France","Russia","Germany","China"],"a":2,"e":"Germany is not a permanent UNSC member; the five permanent members are the USA, UK, France, Russia, and China.","section":"Current Affairs & General Knowledge","id":83},{"q":"The 'Doha Agreement' of 2020 was primarily related to the withdrawal of foreign troops from which country?","o":["Yemen","Syria","Afghanistan","Iraq"],"a":2,"e":"The Doha Agreement, signed between the US and the Taliban in February 2020, set terms for US troop withdrawal from Afghanistan.","section":"Current Affairs & General Knowledge","id":84},{"q":"Which international court, based in The Hague, adjudicates disputes between states under international law?","o":["International Criminal Court (ICC)","Permanent Court of Arbitration only","International Court of Justice (ICJ)","European Court of Human Rights"],"a":2,"e":"The ICJ, the principal judicial organ of the UN, settles legal disputes between states.","section":"Current Affairs & General Knowledge","id":85},{"q":"Which international court, distinct from the ICJ, prosecutes individuals for war crimes, genocide, and crimes against humanity?","o":["International Court of Justice","International Criminal Court (ICC)","European Court of Justice","WTO Dispute Settlement Body"],"a":1,"e":"The ICC prosecutes individuals for the most serious international crimes, unlike the ICJ which handles state-to-state disputes.","section":"Current Affairs & General Knowledge","id":86},{"q":"Which East Asian country is widely recognized as a global leader in semiconductor chip manufacturing, home to TSMC?","o":["South Korea","Singapore","Japan","Taiwan"],"a":3,"e":"Taiwan, home to TSMC (Taiwan Semiconductor Manufacturing Company), dominates the global advanced semiconductor foundry market.","section":"Current Affairs & General Knowledge","id":87},{"q":"Which of the following is the world's most populous Muslim-majority country?","o":["Egypt","Bangladesh","Indonesia","Pakistan"],"a":2,"e":"Indonesia has the largest Muslim population of any country in the world.","section":"Current Affairs & General Knowledge","id":88},{"q":"Which African nation is the most populous country on the continent?","o":["Egypt","Nigeria","South Africa","Ethiopia"],"a":1,"e":"Nigeria is Africa's most populous country, with over 200 million people.","section":"Current Affairs & General Knowledge","id":89},{"q":"Which international organization's 'World Press Freedom Index' ranks countries annually on press freedom conditions?","o":["Amnesty International","Reporters Without Borders","Freedom House","UNESCO"],"a":1,"e":"Reporters Without Borders (RSF) compiles and publishes the annual World Press Freedom Index.","section":"Current Affairs & General Knowledge","id":90},{"q":"Which country's central bank is known as the 'Bank of England', and what year was it founded?","o":["England, founded in 1900","England, founded in 1800","England, founded in 1750","England, founded in 1694"],"a":3,"e":"The Bank of England was founded in 1694 and is one of the oldest central banks in the world.","section":"Current Affairs & General Knowledge","id":91},{"q":"Which of the following international agreements primarily governs the protection of the ozone layer by phasing out ozone-depleting substances?","o":["Basel Convention","Kyoto Protocol","Montreal Protocol","Paris Agreement"],"a":2,"e":"The Montreal Protocol (1987) specifically targets substances that deplete the ozone layer, such as CFCs.","section":"Current Affairs & General Knowledge","id":92},{"q":"Which country was the first to fully legalize recreational cannabis use at the national level?","o":["Uruguay","Canada","Portugal","Netherlands"],"a":0,"e":"Uruguay became the first country to fully legalize recreational cannabis nationwide in 2013.","section":"Current Affairs & General Knowledge","id":93},{"q":"Which technology company's chatbot, released in November 2022, is widely credited with accelerating mainstream public interest in generative AI?","o":["OpenAI's ChatGPT","Microsoft's Copilot","Meta's LLaMA","Google's Bard"],"a":0,"e":"OpenAI's ChatGPT, launched in November 2022, is widely credited as a turning point in public awareness of generative AI.","section":"Current Affairs & General Knowledge","id":94},{"q":"Which country is currently the largest holder of foreign exchange reserves in the world?","o":["Switzerland","China","Japan","India"],"a":1,"e":"China holds the largest foreign exchange reserves of any country, historically exceeding $3 trillion.","section":"Current Affairs & General Knowledge","id":95},{"q":"Which international treaty organization is Pakistan NOT currently a member of, despite historically being aligned with it during the Cold War?","o":["SAARC","OIC","United Nations","SEATO (dissolved) / CENTO (dissolved)"],"a":3,"e":"Pakistan was formerly a member of SEATO and CENTO, both of which were dissolved; it remains active in the UN, SAARC, and OIC.","section":"Current Affairs & General Knowledge","id":96},{"q":"Which organization is the Muslim world's largest intergovernmental body after the UN, headquartered in Jeddah, Saudi Arabia?","o":["Arab League","Muslim World League","Gulf Cooperation Council","Organisation of Islamic Cooperation (OIC)"],"a":3,"e":"The OIC, headquartered in Jeddah, is the second-largest intergovernmental organization after the UN, representing Muslim-majority states.","section":"Current Affairs & General Knowledge","id":97},{"q":"Which of the following best describes the primary mission of the World Bank's International Development Association (IDA)?","o":["Issuing global currency reserves","Regulating global trade tariffs","Providing concessional loans and grants to the world's poorest countries","Setting global interest rates"],"a":2,"e":"IDA, part of the World Bank Group, provides low- or no-interest loans and grants to the world's poorest developing countries.","section":"Current Affairs & General Knowledge","id":98},{"q":"Which Gulf country hosted the 2022 FIFA World Cup, the first in the Middle East?","o":["Saudi Arabia","United Arab Emirates","Bahrain","Qatar"],"a":3,"e":"Qatar hosted the 2022 FIFA World Cup, becoming the first Middle Eastern nation to do so.","section":"Current Affairs & General Knowledge","id":99},{"q":"Saudi Arabia is scheduled to host the FIFA World Cup in which year?","o":["2028","2034","2030","2038"],"a":1,"e":"Saudi Arabia was confirmed as the host of the 2034 FIFA World Cup.","section":"Current Affairs & General Knowledge","id":100},{"q":"Which international body oversees the World Anti-Doping Code applied across Olympic and major sports?","o":["International Olympic Committee alone","World Anti-Doping Agency (WADA)","IOC Medical Commission","FIFA"],"a":1,"e":"WADA is the independent international agency responsible for promoting, coordinating, and monitoring the fight against doping in sport.","section":"Current Affairs & General Knowledge","id":101},{"q":"Which layer of the Earth's atmosphere contains the ozone layer that absorbs most of the sun's harmful ultraviolet radiation?","o":["Stratosphere","Troposphere","Thermosphere","Mesosphere"],"a":0,"e":"The ozone layer is located primarily in the stratosphere, roughly 15 to 35 kilometres above Earth's surface.","section":"Current Affairs & General Knowledge","id":102},{"q":"Which planet in the solar system is known as the 'Red Planet' due to iron oxide on its surface?","o":["Jupiter","Venus","Mercury","Mars"],"a":3,"e":"Mars appears red due to iron oxide (rust) covering much of its surface.","section":"Current Affairs & General Knowledge","id":103},{"q":"Which gas makes up the largest percentage of Earth's atmosphere by volume?","o":["Nitrogen","Argon","Carbon dioxide","Oxygen"],"a":0,"e":"Nitrogen constitutes about 78% of Earth's atmosphere, far more than oxygen's approximately 21%.","section":"Current Affairs & General Knowledge","id":104},{"q":"Which of the following countries has coastlines on both the Atlantic and Pacific Oceans?","o":["Chile","Panama","Argentina","Brazil"],"a":1,"e":"Panama, due to its narrow isthmus geography, has coastlines on both the Atlantic (Caribbean) and Pacific Oceans.","section":"Current Affairs & General Knowledge","id":105},{"q":"Mount Kilimanjaro, Africa's highest peak, is located in which country?","o":["Ethiopia","Tanzania","Kenya","Uganda"],"a":1,"e":"Mount Kilimanjaro is located in Tanzania, near the border with Kenya.","section":"Current Affairs & General Knowledge","id":106},{"q":"Which desert is the largest hot desert in the world?","o":["Gobi Desert","Sahara Desert","Arabian Desert","Kalahari Desert"],"a":1,"e":"The Sahara, spanning much of North Africa, is the largest hot desert in the world.","section":"Current Affairs & General Knowledge","id":107},{"q":"The Amazon Rainforest, the world's largest tropical rainforest, is primarily located in which country?","o":["Venezuela","Peru","Colombia","Brazil"],"a":3,"e":"The majority of the Amazon Rainforest lies within Brazil, though it extends into several other South American countries.","section":"Current Affairs & General Knowledge","id":108},{"q":"Which strait separates the continents of Asia and Africa, connecting the Mediterranean Sea and the Red Sea via the Suez Canal region?","o":["The Isthmus of Suez (land bridge, not strait) connects them; Bab-el-Mandeb separates Asia from Africa via the Red Sea","Bosphorus Strait","Strait of Gibraltar","Strait of Hormuz"],"a":0,"e":"The Bab-el-Mandeb strait separates the Arabian Peninsula (Asia) from the Horn of Africa, controlling access to the Red Sea.","section":"Current Affairs & General Knowledge","id":109},{"q":"Which is the smallest country in the world by land area?","o":["Liechtenstein","Vatican City","Monaco","San Marino"],"a":1,"e":"Vatican City, at approximately 0.44 square kilometres, is the smallest sovereign state in the world.","section":"Current Affairs & General Knowledge","id":110},{"q":"Which African country was formerly known as 'Rhodesia' before gaining independence and adopting a new name?","o":["Zimbabwe","Botswana","Malawi","Zambia"],"a":0,"e":"Southern Rhodesia became independent Zimbabwe in 1980.","section":"Current Affairs & General Knowledge","id":111},{"q":"Which sea is the saltiest large body of water in the world, located between Israel/Jordan and known for extreme buoyancy?","o":["Dead Sea","Red Sea","Caspian Sea","Black Sea"],"a":0,"e":"The Dead Sea, bordered by Jordan and Israel, is one of the saltiest bodies of water on Earth, allowing swimmers to float easily.","section":"Current Affairs & General Knowledge","id":112},{"q":"Which of the following rivers flows through the largest number of countries in the world?","o":["Nile River","Amazon River","Congo River","Danube River"],"a":3,"e":"The Danube River flows through more countries (about 10) than any other river in the world.","section":"Current Affairs & General Knowledge","id":113},{"q":"Which country is both the largest by land area in the world and spans two continents, Europe and Asia?","o":["Turkey","China","Kazakhstan","Russia"],"a":3,"e":"Russia is the largest country in the world by land area and straddles both Europe and Asia.","section":"Current Affairs & General Knowledge","id":114},{"q":"Which chemical element has the atomic symbol 'Au'?","o":["Gold","Aluminium","Silver","Argon"],"a":0,"e":"Gold's chemical symbol 'Au' derives from the Latin word 'aurum'.","section":"Current Affairs & General Knowledge","id":115},{"q":"Which chemical element has the atomic symbol 'Fe'?","o":["Fermium","Fluorine","Iron","Francium"],"a":2,"e":"Iron's symbol 'Fe' comes from the Latin word 'ferrum'.","section":"Current Affairs & General Knowledge","id":116},{"q":"The theory of general relativity, describing gravity as the curvature of spacetime, was developed by which physicist?","o":["Albert Einstein","Max Planck","Isaac Newton","Niels Bohr"],"a":0,"e":"Albert Einstein published his theory of general relativity in 1915.","section":"Current Affairs & General Knowledge","id":117},{"q":"Which scientist is credited with formulating the three laws of motion and the law of universal gravitation?","o":["Albert Einstein","Johannes Kepler","Isaac Newton","Galileo Galilei"],"a":2,"e":"Sir Isaac Newton formulated the laws of motion and universal gravitation, published in his 1687 work 'Principia Mathematica'.","section":"Current Affairs & General Knowledge","id":118},{"q":"Which vitamin is primarily synthesized in human skin upon exposure to sunlight?","o":["Vitamin K","Vitamin D","Vitamin A","Vitamin C"],"a":1,"e":"Vitamin D is synthesized in the skin through a reaction triggered by ultraviolet B (UVB) sunlight exposure.","section":"Current Affairs & General Knowledge","id":119},{"q":"Which organ in the human body is primarily responsible for filtering blood and producing urine?","o":["Pancreas","Liver","Spleen","Kidney"],"a":3,"e":"The kidneys filter waste products from the blood and regulate fluid balance, producing urine as a byproduct.","section":"Current Affairs & General Knowledge","id":120},{"q":"Which blood type is considered the 'universal donor' for red blood cell transfusions?","o":["Type A","Type O negative","Type AB","Type B"],"a":1,"e":"O negative blood lacks A, B, and Rh antigens, making it broadly compatible for emergency transfusions to most recipients.","section":"Current Affairs & General Knowledge","id":121},{"q":"Which scientist is credited with discovering penicillin, the first widely used antibiotic?","o":["Louis Pasteur","Alexander Fleming","Robert Koch","Jonas Salk"],"a":1,"e":"Alexander Fleming discovered penicillin in 1928 after observing mould inhibiting bacterial growth in a petri dish.","section":"Current Affairs & General Knowledge","id":122},{"q":"Which gas is most commonly associated with the greenhouse effect and global warming, released primarily through fossil fuel combustion?","o":["Carbon dioxide","Neon","Nitrogen","Helium"],"a":0,"e":"Carbon dioxide (CO2) is the primary greenhouse gas driving anthropogenic climate change, largely from burning fossil fuels.","section":"Current Affairs & General Knowledge","id":123},{"q":"The 'Great Barrier Reef', the world's largest coral reef system, is located off the coast of which country?","o":["Philippines","Indonesia","Australia","Thailand"],"a":2,"e":"The Great Barrier Reef lies off the northeastern coast of Queensland, Australia.","section":"Current Affairs & General Knowledge","id":124},{"q":"Which of the following is the fastest land animal, capable of reaching speeds over 100 km/h?","o":["Gazelle","Horse","Lion","Cheetah"],"a":3,"e":"The cheetah is the fastest land animal, capable of short bursts of speed exceeding 100 km/h.","section":"Current Affairs & General Knowledge","id":125},{"q":"Which planet has the most extensive and visually prominent ring system in the solar system?","o":["Neptune","Jupiter","Saturn","Uranus"],"a":2,"e":"Saturn is famous for its extensive and highly visible ring system composed mainly of ice particles.","section":"Current Affairs & General Knowledge","id":126},{"q":"The Great Wall of China was primarily built to serve which defensive purpose historically?","o":["Serve as an aqueduct","Mark trade route boundaries only","Protect against invasions from northern nomadic groups","Control river flooding"],"a":2,"e":"The Great Wall was constructed over centuries primarily to defend Chinese states and empires against invasions and raids from northern nomadic groups.","section":"Current Affairs & General Knowledge","id":127},{"q":"Which ancient civilization built the pyramids of Giza, including the Great Pyramid?","o":["Ancient Egyptians","Indus Valley Civilization","Mesopotamians","Ancient Greeks"],"a":0,"e":"The pyramids of Giza were built by the ancient Egyptians, primarily during the Old Kingdom period.","section":"Current Affairs & General Knowledge","id":128},{"q":"The Renaissance, a major cultural and intellectual movement, originated in which country before spreading across Europe?","o":["Germany","Spain","Italy","France"],"a":2,"e":"The Renaissance began in Italy, particularly in cities like Florence, in the 14th century.","section":"Current Affairs & General Knowledge","id":129},{"q":"Which empire, at its peak, was the largest contiguous land empire in history, spanning much of Eurasia?","o":["Roman Empire","Mongol Empire","British Empire","Ottoman Empire"],"a":1,"e":"The Mongol Empire, under Genghis Khan and his successors, became the largest contiguous land empire in history.","section":"Current Affairs & General Knowledge","id":130},{"q":"World War I began in which year following the assassination of Archduke Franz Ferdinand?","o":["1916","1914","1918","1912"],"a":1,"e":"World War I began in 1914, triggered by the assassination of Archduke Franz Ferdinand of Austria-Hungary.","section":"Current Affairs & General Knowledge","id":131},{"q":"World War II ended in which year with the surrender of Japan?","o":["1943","1946","1945","1944"],"a":2,"e":"World War II ended in 1945, with Japan's formal surrender in September following the atomic bombings.","section":"Current Affairs & General Knowledge","id":132},{"q":"Which country was divided into East and West regions during the Cold War, symbolized by the Berlin Wall?","o":["Vietnam","Korea","Yemen","Germany"],"a":3,"e":"Germany was divided into East and West Germany during the Cold War, with the Berlin Wall symbolizing this division until 1989.","section":"Current Affairs & General Knowledge","id":133},{"q":"Which historical event in 1989 symbolized the end of Cold War division in Europe?","o":["Fall of the Berlin Wall","Collapse of the Soviet Union","Signing of NATO charter","Formation of the European Union"],"a":0,"e":"The fall of the Berlin Wall in November 1989 symbolized the end of Cold War-era division in Europe.","section":"Current Affairs & General Knowledge","id":134},{"q":"The Industrial Revolution, characterized by mechanized manufacturing, began in which country during the 18th century?","o":["Germany","France","United Kingdom","United States"],"a":2,"e":"The Industrial Revolution began in Britain in the late 18th century before spreading to other parts of Europe and North America.","section":"Current Affairs & General Knowledge","id":135},{"q":"Which explorer is credited with completing the first successful circumnavigation of the globe, though he died during the voyage?","o":["Ferdinand Magellan","Christopher Columbus","Vasco da Gama","James Cook"],"a":0,"e":"Ferdinand Magellan's expedition completed the first circumnavigation of the globe, although Magellan himself died in the Philippines before its completion.","section":"Current Affairs & General Knowledge","id":136},{"q":"Which country was the first to grant women the right to vote in national elections?","o":["France","New Zealand","United States","United Kingdom"],"a":1,"e":"New Zealand became the first self-governing country to grant women the right to vote, in 1893.","section":"Current Affairs & General Knowledge","id":137},{"q":"The French Revolution, a major turning point in European history, began in which year?","o":["1799","1776","1804","1789"],"a":3,"e":"The French Revolution began in 1789, marked by events such as the storming of the Bastille.","section":"Current Affairs & General Knowledge","id":138},{"q":"Which international organization was established after World War II to replace the failed League of Nations?","o":["World Bank","United Nations","NATO","European Union"],"a":1,"e":"The United Nations was established in 1945, succeeding the League of Nations, to promote international peace and cooperation.","section":"Current Affairs & General Knowledge","id":139},{"q":"Which country is credited as the origin of the printing press with movable type, as developed by Johannes Gutenberg?","o":["Germany","Italy","England","France"],"a":0,"e":"Johannes Gutenberg developed the movable-type printing press in Germany around 1440.","section":"Current Affairs & General Knowledge","id":140},{"q":"Which scientist proposed the heliocentric model of the solar system, placing the Sun rather than Earth at the centre?","o":["Johannes Kepler","Nicolaus Copernicus","Galileo Galilei","Ptolemy"],"a":1,"e":"Nicolaus Copernicus proposed the heliocentric model in the 16th century, challenging the long-held geocentric view.","section":"Current Affairs & General Knowledge","id":141},{"q":"Which of the following best describes the 'Silk Road'?","o":["An ancient network of trade routes connecting East and West Asia with Europe","A modern Chinese highway system","A 19th-century railway network","A World War II supply line"],"a":0,"e":"The Silk Road was an ancient network of trade routes linking China, Central Asia, the Middle East, and Europe, facilitating exchange of goods and ideas.","section":"Current Affairs & General Knowledge","id":142},{"q":"Which document, signed in 1215 in England, is considered a foundational text limiting the power of the monarchy and establishing legal principles?","o":["Magna Carta","Treaty of Westphalia","Bill of Rights","Declaration of Independence"],"a":0,"e":"The Magna Carta, signed by King John of England in 1215, established that the monarch was subject to the law.","section":"Current Affairs & General Knowledge","id":143},{"q":"Which conflict is commonly referred to as the 'War to End All Wars' in early 20th-century rhetoric, though it was followed by an even larger conflict two decades later?","o":["The Crimean War","The Boer War","World War I","The Napoleonic Wars"],"a":2,"e":"World War I was popularly termed the 'War to End All Wars', a label proven tragically premature with the outbreak of World War II.","section":"Current Affairs & General Knowledge","id":144},{"q":"Which of the following historical empires is most closely associated with constructing the Taj Mahal in India?","o":["Maratha Empire","Mughal Empire","Delhi Sultanate","Gupta Empire"],"a":1,"e":"The Taj Mahal was commissioned by Mughal Emperor Shah Jahan in memory of his wife Mumtaz Mahal, completed around 1653.","section":"Current Affairs & General Knowledge","id":145},{"q":"Which agreement, signed in 1648, is generally credited with establishing the modern concept of state sovereignty in international relations?","o":["Treaty of Utrecht","Treaty of Versailles","Peace of Westphalia","Congress of Vienna"],"a":2,"e":"The Peace of Westphalia (1648) is widely regarded as the origin of the modern state system based on sovereignty and non-interference.","section":"Current Affairs & General Knowledge","id":146},{"q":"Which mountain range forms a natural boundary between Europe and Asia within Russia?","o":["Alps","Ural Mountains","Caucasus Mountains","Carpathian Mountains"],"a":1,"e":"The Ural Mountains are traditionally considered the geographical boundary dividing European and Asian Russia.","section":"Current Affairs & General Knowledge","id":147},{"q":"Which of the following seas is entirely landlocked and is technically the largest lake in the world?","o":["Caspian Sea","Black Sea","Aral Sea","Red Sea"],"a":0,"e":"The Caspian Sea, bordered by five countries, is the largest enclosed inland body of water and is classified as the world's largest lake.","section":"Current Affairs & General Knowledge","id":148},{"q":"Which country has the longest coastline in the world?","o":["Canada","Russia","Indonesia","Australia"],"a":0,"e":"Canada has the longest coastline of any country in the world, owing to its extensive Arctic archipelago and mainland coasts.","section":"Current Affairs & General Knowledge","id":149},{"q":"Which of the following elements is the most abundant in the Earth's crust by mass?","o":["Iron","Aluminium","Silicon","Oxygen"],"a":3,"e":"Oxygen is the most abundant element in the Earth's crust by mass, primarily bound in silicate minerals.","section":"Current Affairs & General Knowledge","id":150},{"q":"Which Pakistani cricketer became the youngest to score a double century in Test cricket, achieving the feat in 2016?","o":["Misbah-ul-Haq","Babar Azam","Younis Khan","Azhar Ali"],"a":3,"e":"Azhar Ali scored a double century, though the youngest double-centurion record for Pakistan is often cited differently; Azhar Ali's 302* against West Indies in 2016 was a career-defining innings.","section":"Current Affairs & General Knowledge","id":151},{"q":"Which Pakistani squash legend won a record 555 consecutive matches and multiple World Open titles in the 1980s?","o":["Jahangir Khan","Jansher Khan","Qamar Zaman","Hashim Khan"],"a":0,"e":"Jahangir Khan is regarded as one of the greatest squash players ever, with an unbeaten streak of over five years and 555 matches.","section":"Current Affairs & General Knowledge","id":152},{"q":"Pakistan won the Cricket World Cup in which year, led by captain Imran Khan?","o":["1996","1992","1999","1987"],"a":1,"e":"Pakistan won its only Cricket World Cup title in 1992 in Australia, under the captaincy of Imran Khan.","section":"Current Affairs & General Knowledge","id":153},{"q":"Which Pakistani city hosted the 2004 SAF Games (South Asian Federation Games)?","o":["Peshawar","Karachi","Islamabad","Lahore"],"a":3,"e":"Lahore hosted the 2004 South Asian Federation Games, a major regional multi-sport event.","section":"Current Affairs & General Knowledge","id":154},{"q":"Pakistan's hockey team has won the Hockey World Cup a record number of times among all nations; how many titles has it won?","o":["Four","Five","Six","Three"],"a":0,"e":"Pakistan has won the Men's Hockey World Cup a record four times (1971, 1978, 1982, 1994).","section":"Current Affairs & General Knowledge","id":155},{"q":"Which Pakistani mountaineer became the first Pakistani woman to summit K2?","o":["Naila Kiani","Samina Baig","Uzma Yousaf","Amina Sardar"],"a":0,"e":"Naila Kiani became one of the notable Pakistani women mountaineers to summit K2 and multiple 8,000-metre peaks in recent years.","section":"Current Affairs & General Knowledge","id":156},{"q":"Which Pakistani mountaineer, Samina Baig, is widely recognized for being the first Pakistani woman to summit which peak?","o":["Nanga Parbat","K2","Mount Everest","Broad Peak"],"a":2,"e":"Samina Baig became the first Pakistani woman to summit Mount Everest, in 2013.","section":"Current Affairs & General Knowledge","id":157},{"q":"Which Pakistani city is home to the National Stadium that has hosted major international cricket matches, including World Cup fixtures?","o":["Karachi","Rawalpindi","Lahore","Multan"],"a":0,"e":"The National Stadium in Karachi is one of Pakistan's premier cricket venues, hosting numerous international matches.","section":"Current Affairs & General Knowledge","id":158},{"q":"Which trophy is contested annually (traditionally) between Pakistan and India in field hockey, though matches have been infrequent in recent years due to bilateral tensions?","o":["World Series Hockey","Asia Cup","Champions Trophy","There is no fixed annual bilateral hockey trophy; historic rivalry exists without a dedicated named trophy"],"a":3,"e":"Pakistan-India hockey matches occur mainly within multilateral tournaments like the Asia Cup or Champions Trophy rather than a dedicated bilateral series in recent years.","section":"Current Affairs & General Knowledge","id":159},{"q":"Arfa Karim, a young Pakistani prodigy remembered for her achievements in technology, became notable for which accomplishment?","o":["First Pakistani Nobel laureate","Youngest Pakistani mountaineer","First Pakistani astronaut","Youngest Microsoft Certified Professional in the world"],"a":3,"e":"Arfa Karim became the youngest Microsoft Certified Professional in the world in 2004, at age nine.","section":"Current Affairs & General Knowledge","id":160},{"q":"Which Pakistani feature film became the country's official submission for the Academy Award for Best International Feature Film in the 2020s?","o":["Joyland","Laal Kabootar","Cake","Zindagi Tamasha"],"a":0,"e":"'Joyland' was selected as Pakistan's official entry for the Academy Awards and received international critical acclaim, including a Cannes award.","section":"Current Affairs & General Knowledge","id":161},{"q":"Which Pakistani filmmaker won two Academy Awards (Oscars) for documentary films, becoming the first Pakistani to do so?","o":["Asim Abbasi","Jamshed Mahmood","Sarmad Khoosat","Sharmeen Obaid-Chinoy"],"a":3,"e":"Sharmeen Obaid-Chinoy won Academy Awards for Best Documentary Short Subject in 2012 and 2016.","section":"Current Affairs & General Knowledge","id":162},{"q":"Which Pakistani social worker, known for ambulance services and welfare work, passed away in 2016 and is commemorated widely across Pakistan?","o":["Ansar Burney","Ruth Pfau","Imran Khan","Abdul Sattar Edhi"],"a":3,"e":"Abdul Sattar Edhi, founder of the Edhi Foundation, is one of Pakistan's most revered humanitarians, known for founding the country's largest volunteer ambulance network.","section":"Current Affairs & General Knowledge","id":163},{"q":"Dr. Ruth Pfau, a German-born humanitarian who spent much of her life in Pakistan, was renowned for her work in which field?","o":["Leprosy treatment and eradication","Cardiology","Educational reform","Water conservation"],"a":0,"e":"Dr. Ruth Pfau dedicated her life to combating leprosy in Pakistan and was honoured with a state funeral upon her death in 2017.","section":"Current Affairs & General Knowledge","id":164},{"q":"Which Pakistani scientist was awarded the Nobel Prize in Physics in 1979, shared with two other physicists, for work on electroweak unification?","o":["Dr. Abdus Salam","Dr. A.Q. Khan","Dr. Atta-ur-Rahman","Dr. Samar Mubarakmand"],"a":0,"e":"Dr. Abdus Salam shared the 1979 Nobel Prize in Physics with Sheldon Glashow and Steven Weinberg for their contributions to electroweak theory.","section":"Current Affairs & General Knowledge","id":165},{"q":"Which Pakistani athlete won a gold medal in the javelin throw at the 2022 Commonwealth Games, later also achieving success at Olympic level?","o":["Sajjad Hussain","Muhammad Yousuf","Arshad Nadeem","Naseem Hameed"],"a":2,"e":"Arshad Nadeem won gold in javelin throw at the 2022 Commonwealth Games and went on to achieve historic Olympic success.","section":"Current Affairs & General Knowledge","id":166},{"q":"Arshad Nadeem won Pakistan's first individual Olympic gold medal in athletics at which Olympic Games?","o":["Rio 2016","Tokyo 2020","Paris 2024","London 2012"],"a":2,"e":"Arshad Nadeem won gold in the javelin throw at the Paris 2024 Olympics, setting an Olympic record and securing Pakistan's first individual Olympic gold in athletics.","section":"Current Affairs & General Knowledge","id":167},{"q":"Which Pakistani sprinter is known as the fastest woman in South Asia after her performance at the South Asian Games?","o":["Naseem Hameed","Sadaf Siddiqui","Sana Mir","Faiza Sultana"],"a":0,"e":"Naseem Hameed won gold in the 100m sprint at the 2010 South Asian Games, earning her recognition as one of South Asia's fastest women.","section":"Current Affairs & General Knowledge","id":168},{"q":"Which Pakistani cricketer holds the record for the fastest century in ODI cricket history (as of recent records), achieving it in just 35 balls?","o":["Shahid Afridi","Fakhar Zaman","Mohammad Rizwan","Babar Azam"],"a":0,"e":"Shahid Afridi scored an ODI century off just 37 balls in 1996, a record that stood for nearly two decades before being surpassed by other players.","section":"Current Affairs & General Knowledge","id":169},{"q":"Which Pakistani boxer became the first from the country to win a medal at the Commonwealth Games in boxing in recent years?","o":["Haroon Khan","Nasir Ali","Suleman Baloch","Muhammad Waseem"],"a":3,"e":"Muhammad Waseem has represented Pakistan prominently in boxing at various international levels including the Commonwealth Games.","section":"Current Affairs & General Knowledge","id":170},{"q":"Which Pakistani squash player, besides Jahangir Khan, also dominated the sport in the late 1980s and early 1990s with multiple World Open titles?","o":["Jansher Khan","Roshan Khan","Mo Khan","Azam Khan"],"a":0,"e":"Jansher Khan won a record eight World Open titles, dominating squash through the late 1980s and 1990s.","section":"Current Affairs & General Knowledge","id":171},{"q":"Malala Yousafzai, the Pakistani Nobel Peace Prize laureate, is primarily known for her advocacy on which issue?","o":["Environmental protection","Girls' education","Refugee rights","Press freedom"],"a":1,"e":"Malala Yousafzai became a global advocate for girls' education after surviving an assassination attempt by the Taliban in 2012.","section":"Current Affairs & General Knowledge","id":172},{"q":"Which Pakistani author won the Booker Prize (International) or was shortlisted for major literary honors for works addressing Pakistani society?","o":["Both Mohsin Hamid and Kamila Shamsie have been shortlisted for the Booker Prize","Kamila Shamsie","Mohsin Hamid","Bapsi Sidhwa"],"a":0,"e":"Both Mohsin Hamid ('The Reluctant Fundamentalist') and Kamila Shamsie ('Home Fire') have been shortlisted for the Booker Prize.","section":"Current Affairs & General Knowledge","id":173},{"q":"Which Pakistani mountaineer became the first person from Pakistan to summit all 14 of the world's 8,000-metre peaks without supplemental oxygen on several?","o":["Sirbaz Khan","Ali Sadpara","Hassan Sadpara","Fazal Ali"],"a":0,"e":"Sirbaz Khan achieved the feat of summiting all fourteen 8,000-metre peaks, becoming a national mountaineering icon.","section":"Current Affairs & General Knowledge","id":174},{"q":"Muhammad Ali Sadpara, a renowned Pakistani mountaineer, tragically died attempting to summit which peak in winter 2021?","o":["Broad Peak","Gasherbrum","K2","Nanga Parbat"],"a":2,"e":"Ali Sadpara died in February 2021 during an attempt to summit K2 in winter conditions.","section":"Current Affairs & General Knowledge","id":175},{"q":"Which award is considered Pakistan's highest civilian honour?","o":["Nishan-e-Imtiaz","Sitara-e-Imtiaz","Hilal-e-Imtiaz","Tamgha-e-Imtiaz"],"a":0,"e":"Nishan-e-Imtiaz (Order of Excellence) is Pakistan's highest civilian award.","section":"Current Affairs & General Knowledge","id":176},{"q":"Which award is Pakistan's highest military gallantry decoration, equivalent to the Victoria Cross?","o":["Hilal-e-Jurat","Sitara-e-Jurat","Nishan-e-Haider","Tamgha-e-Jurat"],"a":2,"e":"Nishan-e-Haider is Pakistan's highest military award for gallantry, awarded posthumously in most cases.","section":"Current Affairs & General Knowledge","id":177},{"q":"Which Pakistani armed forces officer was the first recipient of the Nishan-e-Haider award?","o":["Major Aziz Bhatti Shaheed","Major Muhammad Akram Shaheed","Captain Muhammad Sarwar Shaheed","Rashid Minhas Shaheed"],"a":2,"e":"Captain Muhammad Sarwar Shaheed was the first recipient of the Nishan-e-Haider, awarded posthumously for actions in the 1948 Kashmir conflict.","section":"Current Affairs & General Knowledge","id":178},{"q":"Which Pakistani pilot became the youngest recipient of the Nishan-e-Haider for his actions during the 1971 war?","o":["Sarwar Shaheed","Rashid Minhas Shaheed","Aziz Bhatti Shaheed","Karnal Sher Khan Shaheed"],"a":1,"e":"Pilot Officer Rashid Minhas Shaheed, aged just 20, received the Nishan-e-Haider posthumously for preventing a hijacked aircraft in 1971.","section":"Current Affairs & General Knowledge","id":179},{"q":"Which Pakistani writer and poet, celebrated for progressive and revolutionary poetry, was awarded the Lenin Peace Prize?","o":["Faiz Ahmed Faiz","Allama Iqbal","Ahmed Faraz","Habib Jalib"],"a":0,"e":"Faiz Ahmed Faiz, a renowned Urdu poet, was awarded the Lenin Peace Prize by the Soviet Union in 1962.","section":"Current Affairs & General Knowledge","id":180},{"q":"Which Pakistani singer, known as the 'Queen of Melody' and famous for ghazals and film songs, remains one of the most celebrated voices in South Asian music history?","o":["Abida Parveen","Noor Jehan","Iqbal Bano","Nayyara Noor"],"a":1,"e":"Noor Jehan, often called Malika-e-Tarannum (Queen of Melody), was a legendary singer and actress in Pakistani cinema and music.","section":"Current Affairs & General Knowledge","id":181},{"q":"Which Pakistani Sufi/classical vocalist is internationally celebrated for popularizing Qawwali music on the global stage?","o":["Rahat Fateh Ali Khan","Abida Parveen","Nusrat Fateh Ali Khan","Sabri Brothers"],"a":2,"e":"Nusrat Fateh Ali Khan is widely regarded as one of the greatest Qawwali singers, achieving major international recognition.","section":"Current Affairs & General Knowledge","id":182},{"q":"Which Pakistani classical/folk vocalist is known
