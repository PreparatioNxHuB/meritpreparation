tee' can take either a singular or plural verb depending on British versus American convention and emphasis.","'Committee' cannot function as the subject of a sentence.","'Committee' must always take a plural verb in every English-speaking context."],"a":1,"e":"Collective nouns like 'committee' can take either singular or plural verbs depending on whether British or American conventions are followed, and whether the emphasis is on the group as a whole or its individual members.","section":"English (Language, Grammar & Comprehension)","id":387},{"q":"Choose the sentence that correctly uses the third conditional.","o":["If they left earlier, they would have caught the flight.","If they leave earlier, they would have caught the flight.","If they had left earlier, they will catch the flight.","If they had left earlier, they would have caught the flight."],"a":3,"e":"The third conditional describes a hypothetical past situation using 'if + past perfect, would have + past participle'.","section":"English (Language, Grammar & Comprehension)","id":388},{"q":"Choose the correctly punctuated sentence using quotation marks and a comma.","o":["\"I will be there,\" she said, \"by six o'clock.\"","\"I will be there,\" she said \"by six o'clock.\"","\"I will be there\" she said, \"by six o'clock\".","I will be there, she said, \"by six o'clock.\""],"a":0,"e":"Quoted speech interrupted by a dialogue tag requires commas both before and after the tag, with quotation marks correctly enclosing each part of the spoken sentence.","section":"English (Language, Grammar & Comprehension)","id":389},{"q":"Choose the correct one-word substitute for: 'One who studies and is an expert on the origin and history of mankind'.","o":["Ethnologist","Sociologist","Archaeologist","Anthropologist"],"a":3,"e":"An 'anthropologist' studies human societies, cultures, and their development, distinct from an 'archaeologist' who studies material remains.","section":"English (Language, Grammar & Comprehension)","id":390},{"q":"Choose the correct one-word substitute for: 'A statement or piece of writing that criticizes something or someone in a scathing manner'.","o":["Elegy","Eulogy","Panegyric","Diatribe"],"a":3,"e":"A 'diatribe' is a forceful and bitter verbal attack against someone or something, unlike a 'eulogy' or 'panegyric' which praise.","section":"English (Language, Grammar & Comprehension)","id":391},{"q":"Choose the correct meaning of the idiom 'To take something with a pinch of salt'.","o":["To regard something as exaggerated and not fully true","To season food appropriately","To accept something without question","To reject something outright"],"a":0,"e":"'To take something with a pinch of salt' means to view a claim or statement with skepticism, not accepting it as entirely true.","section":"English (Language, Grammar & Comprehension)","id":392},{"q":"Choose the correct meaning of the idiom 'To be at loggerheads'.","o":["To ignore someone completely","To work together harmoniously","To be in strong disagreement or dispute with someone","To be in complete agreement"],"a":2,"e":"'To be at loggerheads' means to be in fierce disagreement or dispute with another person or group.","section":"English (Language, Grammar & Comprehension)","id":393},{"q":"Choose the correct meaning of the idiom 'To leave no stone unturned'.","o":["To give up on a task quickly","To make every possible effort to achieve something","To search only in obvious places","To complete a task carelessly"],"a":1,"e":"'To leave no stone unturned' means to try every possible means or make an exhaustive effort to achieve a goal.","section":"English (Language, Grammar & Comprehension)","id":394},{"q":"Choose the option nearest in meaning to the word 'Assiduous'.","o":["Lazy","Showing great care and perseverance","Careless","Indifferent"],"a":1,"e":"'Assiduous' describes someone who works with great care, attention, and perseverance.","section":"English (Language, Grammar & Comprehension)","id":395},{"q":"Choose the option nearest in meaning to the word 'Circumspect'.","o":["Careless","Wary and cautious about consequences","Impulsive","Reckless"],"a":1,"e":"'Circumspect' means being cautious and considering all circumstances before acting or speaking.","section":"English (Language, Grammar & Comprehension)","id":396},{"q":"Choose the option nearest in meaning to the word 'Dogmatic'.","o":["Uncertain","Flexible","Open-minded","Asserting opinions in an arrogant, authoritative manner"],"a":3,"e":"'Dogmatic' describes someone who asserts opinions as absolute truths without allowing room for debate.","section":"English (Language, Grammar & Comprehension)","id":397},{"q":"Choose the option nearest in meaning to the word 'Empirical'.","o":["Based on theory alone","Based on observation or experience rather than theory","Based on tradition only","Purely hypothetical"],"a":1,"e":"'Empirical' refers to knowledge or evidence based on observation and experience rather than pure theory.","section":"English (Language, Grammar & Comprehension)","id":398},{"q":"Choose the option opposite in meaning to the word 'Pragmatic'.","o":["Practical","Idealistic and impractical","Sensible","Realistic"],"a":1,"e":"'Pragmatic' means dealing with things practically; its antonym relates to being idealistic or impractical.","section":"English (Language, Grammar & Comprehension)","id":399},{"q":"Fill in the blank with the correct preposition: The final decision rests ___ the board of directors.","o":["with","on","at","for"],"a":0,"e":"'Rests with' is the correct idiomatic phrase indicating who holds responsibility for a decision.","section":"English (Language, Grammar & Comprehension)","id":400},{"q":"Identify the sentence with correct subject-verb agreement.","o":["Neither the students nor the teacher was aware of the change.","Neither the student nor the teachers was aware of the change.","Neither the students nor the teacher have been aware of the change.","Neither the students nor the teacher were aware of the change."],"a":0,"e":"With 'neither...nor', the verb agrees with the subject closest to it; since 'teacher' is singular, 'was' is correct.","section":"English (Language, Grammar & Comprehension)","id":401},{"q":"Choose the correct meaning of the idiom 'To keep one's fingers crossed'.","o":["To hope for a favorable outcome","To count something carefully","To make a promise","To lie deliberately"],"a":0,"e":"'To keep one's fingers crossed' means to hope that something will happen as desired, often used superstitiously.","section":"English (Language, Grammar & Comprehension)","id":402},{"q":"Choose the option nearest in meaning to the word 'Laconic'.","o":["Wordy and elaborate","Loud and boastful","Confusing and unclear","Using very few words; concise"],"a":3,"e":"'Laconic' describes speech or writing that uses very few words, being concise and terse.","section":"English (Language, Grammar & Comprehension)","id":403},{"q":"Choose the option opposite in meaning to the word 'Ephemeral'.","o":["Transient","Momentary","Perennial or enduring","Short-lived"],"a":2,"e":"'Ephemeral' means short-lived; its antonym is 'perennial' or 'enduring', meaning lasting a long time.","section":"English (Language, Grammar & Comprehension)","id":404},{"q":"Fill in the blank with the correct preposition: The board is deliberating ___ the merger proposal.","o":["with","for","at","on"],"a":3,"e":"'Deliberating on' is the correct idiomatic phrase indicating the subject under consideration.","section":"English (Language, Grammar & Comprehension)","id":405},{"q":"Which networking protocol operates at the Transport layer of the OSI model and guarantees reliable, ordered delivery of data?","o":["UDP","TCP","ICMP","IP"],"a":1,"e":"TCP (Transmission Control Protocol) provides reliable, ordered, and error-checked delivery of data between applications.","section":"Computer Related Knowledge","id":406},{"q":"Which port number is conventionally used by the HTTPS protocol?","o":["25","21","80","443"],"a":3,"e":"HTTPS conventionally uses port 443, while HTTP uses port 80.","section":"Computer Related Knowledge","id":407},{"q":"In the OSI model, which layer is primarily responsible for routing data packets between different networks?","o":["Network Layer","Transport Layer","Session Layer","Data Link Layer"],"a":0,"e":"The Network Layer (Layer 3) handles logical addressing and routing of packets between networks, primarily via IP.","section":"Computer Related Knowledge","id":408},{"q":"Which of the following best describes the function of a DNS (Domain Name System) server?","o":["Assigning IP addresses dynamically to devices","Filtering malicious network traffic","Encrypting network traffic","Translating human-readable domain names into IP addresses"],"a":3,"e":"DNS servers resolve human-readable domain names (like example.com) into machine-readable IP addresses.","section":"Computer Related Knowledge","id":409},{"q":"Which protocol is responsible for automatically assigning IP addresses to devices on a network?","o":["DNS","SMTP","DHCP","FTP"],"a":2,"e":"DHCP (Dynamic Host Configuration Protocol) automatically assigns IP addresses and network configuration to devices.","section":"Computer Related Knowledge","id":410},{"q":"What is the primary difference between a switch and a hub in networking?","o":["A switch intelligently forwards data to specific devices, while a hub broadcasts to all connected devices","A switch operates at the network layer, a hub at the transport layer","There is no functional difference","A hub is faster than a switch"],"a":0,"e":"A switch examines MAC addresses and forwards data only to the intended recipient, while a hub broadcasts data to all connected devices, causing more collisions.","section":"Computer Related Knowledge","id":411},{"q":"Which type of memory is volatile, losing its contents when power is removed?","o":["ROM","Flash storage","RAM","Hard disk"],"a":2,"e":"RAM (Random Access Memory) is volatile memory that loses stored data when the power supply is interrupted.","section":"Computer Related Knowledge","id":412},{"q":"Which of the following best describes 'cache memory' in a computer system?","o":["A type of network memory","An external storage device","A small, high-speed memory located close to the CPU for frequently accessed data","A type of permanent storage"],"a":2,"e":"Cache memory is small, fast memory located near or within the CPU that stores frequently accessed data to speed up processing.","section":"Computer Related Knowledge","id":413},{"q":"Which data structure operates on a Last-In-First-Out (LIFO) principle?","o":["Stack","Array","Queue","Linked List"],"a":0,"e":"A stack follows the LIFO principle, where the last element added is the first one removed.","section":"Computer Related Knowledge","id":414},{"q":"Which data structure operates on a First-In-First-Out (FIFO) principle?","o":["Stack","Graph","Tree","Queue"],"a":3,"e":"A queue follows the FIFO principle, where the first element added is the first one removed.","section":"Computer Related Knowledge","id":415},{"q":"In object-oriented programming, what does the term 'encapsulation' primarily refer to?","o":["Allowing a subclass to inherit from a parent class","Overloading functions with the same name","Combining functions and data into a single unit while restricting direct access to internal state","Creating multiple instances of a class"],"a":2,"e":"Encapsulation refers to bundling data and methods together and restricting direct access to some of an object's components.","section":"Computer Related Knowledge","id":416},{"q":"Which object-oriented programming concept allows a subclass to acquire properties and behaviors of a parent class?","o":["Encapsulation","Inheritance","Polymorphism","Abstraction"],"a":1,"e":"Inheritance allows a class (subclass) to inherit attributes and methods from another class (superclass).","section":"Computer Related Knowledge","id":417},{"q":"Which object-oriented concept allows objects of different classes to be treated as objects of a common superclass, often through method overriding?","o":["Abstraction","Polymorphism","Inheritance","Encapsulation"],"a":1,"e":"Polymorphism allows different classes to be used interchangeably through a common interface, typically via method overriding or overloading.","section":"Computer Related Knowledge","id":418},{"q":"What is the time complexity of binary search on a sorted array of n elements?","o":["O(log n)","O(1)","O(n)","O(n^2)"],"a":0,"e":"Binary search repeatedly halves the search space, giving it a time complexity of O(log n).","section":"Computer Related Knowledge","id":419},{"q":"What is the average time complexity of the QuickSort algorithm?","o":["O(n log n)","O(n^2)","O(log n)","O(n)"],"a":0,"e":"QuickSort has an average-case time complexity of O(n log n), though its worst case is O(n^2).","section":"Computer Related Knowledge","id":420},{"q":"Which SQL command is used to retrieve data from a database table?","o":["DELETE","SELECT","INSERT","UPDATE"],"a":1,"e":"The SELECT statement is used to query and retrieve data from one or more tables in SQL.","section":"Computer Related Knowledge","id":421},{"q":"Which SQL clause is used to filter records based on a specified condition?","o":["WHERE","HAVING","ORDER BY","GROUP BY"],"a":0,"e":"The WHERE clause filters rows based on specified conditions before any grouping occurs.","section":"Computer Related Knowledge","id":422},{"q":"In a relational database, what is the purpose of a 'primary key'?","o":["To sort records alphabetically","To encrypt sensitive data","To link a table to an external file","To uniquely identify each record in a table"],"a":3,"e":"A primary key uniquely identifies each record within a database table, ensuring no duplicate or null values in that column.","section":"Computer Related Knowledge","id":423},{"q":"What is the purpose of a 'foreign key' in a relational database?","o":["To establish a link between two tables","To index a table for faster search","To encrypt table data","To uniquely identify records within the same table"],"a":0,"e":"A foreign key is a field in one table that references the primary key in another table, establishing a relationship between them.","section":"Computer Related Knowledge","id":424},{"q":"Which normal form in database design eliminates transitive dependency?","o":["First Normal Form (1NF)","Third Normal Form (3NF)","Second Normal Form (2NF)","Boyce-Codd Normal Form (BCNF)"],"a":1,"e":"Third Normal Form (3NF) removes transitive dependencies, ensuring non-key attributes depend only on the primary key.","section":"Computer Related Knowledge","id":425},{"q":"What does the acronym 'API' stand for in software development?","o":["Advanced Programming Instruction","Automated Program Installation","Application Programming Interface","Application Process Integration"],"a":2,"e":"API stands for Application Programming Interface, a set of protocols allowing different software applications to communicate.","section":"Computer Related Knowledge","id":426},{"q":"Which of the following best describes 'RESTful API' architecture?","o":["An architectural style using stateless HTTP requests to access and manipulate resources","A database management system","A type of firewall configuration","A programming language for web development"],"a":0,"e":"REST (Representational State Transfer) is an architectural style for designing networked applications using stateless HTTP communication.","section":"Computer Related Knowledge","id":427},{"q":"What is the primary purpose of version control systems like Git?","o":["Compiling source code into executables","Encrypting sensitive source code","Automatically testing software for bugs","Tracking and managing changes to source code over time"],"a":3,"e":"Git and similar version control systems track changes to code, enabling collaboration and history management.","section":"Computer Related Knowledge","id":428},{"q":"In Git, what does the command 'git commit' primarily do?","o":["Deletes uncommitted changes","Pushes changes to a remote repository","Creates a new branch","Records a snapshot of staged changes to the local repository"],"a":3,"e":"'git commit' saves a snapshot of the staged changes to the local repository's history.","section":"Computer Related Knowledge","id":429},{"q":"What does the term 'algorithm' refer to in computer science?","o":["A database management system","A type of hardware component","A step-by-step procedure or set of rules to solve a problem","A programming language"],"a":2,"e":"An algorithm is a well-defined, step-by-step procedure or set of instructions for solving a problem or performing a task.","section":"Computer Related Knowledge","id":430},{"q":"Which of the following best defines 'Big O notation'?","o":["A method to express the time or space complexity of an algorithm in terms of input size","A type of database indexing","A programming language syntax rule","A network security protocol"],"a":0,"e":"Big O notation describes the upper bound of an algorithm's growth rate (time or space) as the input size increases.","section":"Computer Related Knowledge","id":431},{"q":"What is the primary function of an operating system's 'kernel'?","o":["Compiling application source code","Managing system resources and communication between hardware and software","Displaying the graphical user interface","Managing internet browser settings"],"a":1,"e":"The kernel is the core component of an operating system, managing hardware resources and facilitating communication between hardware and software.","section":"Computer Related Knowledge","id":432},{"q":"Which of the following is an example of a 'compiled' programming language?","o":["PHP","C++","JavaScript","Python"],"a":1,"e":"C++ is a compiled language, translated entirely into machine code before execution, unlike interpreted languages like Python or JavaScript.","section":"Computer Related Knowledge","id":433},{"q":"Which of the following is an example of an 'interpreted' programming language?","o":["Python","Java (partially, via JVM bytecode)","C++","C"],"a":0,"e":"Python is a classic interpreted language, executed line-by-line by an interpreter at runtime, unlike compiled languages like C.","section":"Computer Related Knowledge","id":434},{"q":"What does 'IDE' stand for in software development contexts?","o":["Internet Data Exchange","Integrated Data Encryption","Integrated Development Environment","Interface Design Engine"],"a":2,"e":"IDE stands for Integrated Development Environment, a software application providing comprehensive tools for software development.","section":"Computer Related Knowledge","id":435},{"q":"Which of the following best describes 'cloud computing' deployment model known as 'IaaS' (Infrastructure as a Service)?","o":["Providing complete software applications over the internet","Providing virtualized computing resources like servers and storage over the internet","Providing only development platforms and tools","Providing only data storage without compute resources"],"a":1,"e":"IaaS provides virtualized computing infrastructure—servers, storage, and networking—over the internet, without requiring users to manage physical hardware.","section":"Computer Related Knowledge","id":436},{"q":"Which cloud service model provides a complete development and deployment environment, commonly abbreviated as 'PaaS'?","o":["Software as a Service","Platform as a Service","Data as a Service","Infrastructure as a Service"],"a":1,"e":"PaaS (Platform as a Service) provides a platform allowing developers to build, deploy, and manage applications without managing underlying infrastructure.","section":"Computer Related Knowledge","id":437},{"q":"Which of the following best describes 'SaaS' (Software as a Service)?","o":["Providing only programming languages and compilers","A type of hardware virtualization","Delivering software applications over the internet on a subscription basis","Providing raw computing infrastructure"],"a":2,"e":"SaaS delivers fully functional software applications to users over the internet, typically via subscription, without requiring local installation.","section":"Computer Related Knowledge","id":438},{"q":"What is 'phishing' in the context of cybersecurity?","o":["A network optimization technique","A technique to fraudulently obtain sensitive information by impersonating a trustworthy entity","A method of encrypting data","A type of firewall configuration"],"a":1,"e":"Phishing is a cyberattack technique where attackers impersonate legitimate entities to trick victims into revealing sensitive information.","section":"Computer Related Knowledge","id":439},{"q":"What is a 'DDoS attack' in cybersecurity?","o":["A technique for securing wireless networks","A type of antivirus software","A method of encrypting stolen data","An attack that overwhelms a system with traffic from multiple sources to disrupt service"],"a":3,"e":"A Distributed Denial of Service (DDoS) attack floods a target system with traffic from multiple compromised sources, disrupting normal service.","section":"Computer Related Knowledge","id":440},{"q":"What does 'SSL/TLS' primarily provide in web communications?","o":["Search engine optimization","Domain name registration","Encrypted and secure communication between a client and server","Faster page loading speeds"],"a":2,"e":"SSL/TLS protocols encrypt data transmitted between a client (browser) and server, ensuring secure communication.","section":"Computer Related Knowledge","id":441},{"q":"Which of the following best describes 'two-factor authentication' (2FA)?","o":["A security process requiring two different forms of verification to confirm identity","A type of firewall configuration","Using two different passwords for the same account","Encrypting data with two separate keys"],"a":0,"e":"2FA requires users to provide two distinct forms of identification, such as a password and a one-time code, enhancing account security.","section":"Computer Related Knowledge","id":442},{"q":"What is the primary purpose of a 'VPN' (Virtual Private Network)?","o":["Blocking all internet access","Managing local area network hardware","Increasing internet browsing speed","Creating a secure, encrypted connection over a public network"],"a":3,"e":"A VPN establishes a secure, encrypted tunnel over a public network, protecting data and often masking the user's IP address.","section":"Computer Related Knowledge","id":443},{"q":"Which term describes malicious software that encrypts a victim's files and demands payment for decryption?","o":["Adware","Ransomware","Spyware","Trojan horse"],"a":1,"e":"Ransomware encrypts a victim's data and demands a ransom payment, usually in cryptocurrency, for the decryption key.","section":"Computer Related Knowledge","id":444},{"q":"What distinguishes a 'Trojan horse' from other types of malware?","o":["It is always harmless","It only affects mobile devices","It self-replicates without any host program","It disguises itself as legitimate software to trick users into installing it"],"a":3,"e":"A Trojan horse disguises itself as legitimate or desirable software to deceive users into installation, unlike self-replicating viruses or worms.","section":"Computer Related Knowledge","id":445},{"q":"What is the primary difference between a computer 'virus' and a 'worm'?","o":["A virus requires a host program to spread, while a worm can self-replicate and spread independently","A worm requires a host program, while a virus spreads independently","Both spread in exactly the same way","Neither can cause damage to files"],"a":0,"e":"A virus attaches itself to a host program and needs user action to spread, while a worm can self-replicate and spread across networks without user intervention.","section":"Computer Related Knowledge","id":446},{"q":"Which of the following best describes 'machine learning' as a subfield of artificial intelligence?","o":["A database query language","A method of manually coding every possible decision rule","Systems that improve their performance on a task through experience/data without being explicitly programmed for every scenario","A type of computer hardware architecture"],"a":2,"e":"Machine learning enables systems to learn patterns from data and improve performance over time without being explicitly programmed for every case.","section":"Computer Related Knowledge","id":447},{"q":"Which of the following best describes 'neural networks' in the context of deep learning?","o":["A database indexing technique","A type of encryption algorithm","A type of physical computer network cabling","Computing systems loosely inspired by the structure of biological brains, composed of interconnected nodes/layers"],"a":3,"e":"Neural networks are computational models inspired by biological neural systems, consisting of layers of interconnected nodes that process data.","section":"Computer Related Knowledge","id":448},{"q":"In MS Excel, which function returns a value based on a condition, such as marking pass/fail based on scores?","o":["VLOOKUP","IF","SUMIF","COUNTIF"],"a":1,"e":"The IF function evaluates a logical condition and returns one value if true and another if false.","section":"Computer Related Knowledge","id":449},{"q":"In MS Excel, which function searches for a value in the leftmost column of a range and returns a value in the same row from a specified column?","o":["INDEX","MATCH","VLOOKUP","HLOOKUP"],"a":2,"e":"VLOOKUP searches vertically for a value in the first column of a table and returns a corresponding value from a specified column.","section":"Computer Related Knowledge","id":450},{"q":"In MS Excel, which combination of functions is generally considered more flexible than VLOOKUP for two-way lookups?","o":["SUM and AVERAGE","IF and COUNTIF","CONCATENATE and TEXT","INDEX and MATCH"],"a":3,"e":"INDEX and MATCH used together offer more flexibility than VLOOKUP, allowing lookups in any direction and column order.","section":"Computer Related Knowledge","id":451},{"q":"In MS Excel, what does the function COUNTIF primarily do?","o":["Counts all cells regardless of content","Averages values in a range","Sums values that meet a specified condition","Counts the number of cells that meet a specified condition"],"a":3,"e":"COUNTIF counts the number of cells within a range that meet a given criterion.","section":"Computer Related Knowledge","id":452},{"q":"In MS Excel, which keyboard shortcut is used to insert the current date into a cell?","o":["Ctrl+Shift+D","Ctrl+D","Ctrl+;","Ctrl+T"],"a":2,"e":"Ctrl+; (semicolon) inserts the current date as a static value into the active cell in Excel.","section":"Computer Related Knowledge","id":453},{"q":"In MS Excel, which feature allows you to summarize and analyze large datasets interactively, such as grouping and aggregating data?","o":["Freeze Panes","Data Validation","PivotTable","Conditional Formatting"],"a":2,"e":"PivotTables allow interactive summarization, grouping, and analysis of large datasets in Excel.","section":"Computer Related Knowledge","id":454},{"q":"In MS Excel, what does 'Conditional Formatting' allow a user to do?","o":["Automatically apply formatting to cells based on specified conditions","Merge multiple worksheets into one","Convert formulas into static values","Protect a worksheet with a password"],"a":0,"e":"Conditional Formatting applies visual formatting (such as color) to cells automatically based on defined rules or conditions.","section":"Computer Related Knowledge","id":455},{"q":"In MS Excel, what is the purpose of 'Data Validation'?","o":["Creating charts from selected data","Sorting data alphabetically","Restricting the type or range of data that can be entered into a cell","Automatically correcting spelling errors"],"a":2,"e":"Data Validation restricts what values users can enter into specific cells, helping maintain data accuracy and consistency.","section":"Computer Related Knowledge","id":456},{"q":"In MS Word, which feature automatically generates a list of headings and their page numbers for navigation?","o":["Track Changes","Table of Contents","Watermark","Mail Merge"],"a":1,"e":"The Table of Contents feature automatically compiles headings (using heading styles) into a navigable summary with page numbers.","section":"Computer Related Knowledge","id":457},{"q":"In MS Word, which feature allows a single letter template to be personalized and sent to multiple recipients using a data source?","o":["Cross-referencing","Mail Merge","Table of Contents","Track Changes"],"a":1,"e":"Mail Merge combines a document template with a data source (like an Excel sheet) to generate personalized copies for multiple recipients.","section":"Computer Related Knowledge","id":458},{"q":"In MS Word, which feature is used to track edits made by multiple reviewers, showing insertions and deletions?","o":["AutoCorrect","Mail Merge","Style Pane","Track Changes"],"a":3,"e":"Track Changes records and displays edits made to a document, allowing authors to review, accept, or reject changes made by collaborators.","section":"Computer Related Knowledge","id":459},{"q":"In MS PowerPoint, which view allows a presenter to see notes and upcoming slides while the audience sees only the current slide?","o":["Slide Sorter View","Presenter View","Normal View","Reading View"],"a":1,"e":"Presenter View displays speaker notes and a preview of upcoming slides to the presenter, while the audience screen shows only the current slide.","section":"Computer Related Knowledge","id":460},{"q":"In MS PowerPoint, what is the purpose of the 'Slide Master'?","o":["To define the overall layout, fonts, and formatting applied consistently across all slides","To add animations to individual slides only","To convert a presentation into a PDF","To record narration for a presentation"],"a":0,"e":"The Slide Master controls the overall design template, including fonts, colors, and layout, applied uniformly across the presentation.","section":"Computer Related Knowledge","id":461},{"q":"Which number system uses only the digits 0 and 1?","o":["Octal","Decimal","Hexadecimal","Binary"],"a":3,"e":"The binary number system uses only two digits, 0 and 1, forming the foundation of digital computing.","section":"Computer Related Knowledge","id":462},{"q":"Which number system uses 16 symbols, including digits 0-9 and letters A-F?","o":["Binary","Decimal","Octal","Hexadecimal"],"a":3,"e":"The hexadecimal system uses sixteen symbols: 0-9 and A-F, commonly used in computing for representing binary data compactly.","section":"Computer Related Knowledge","id":463},{"q":"Convert the binary number 1010 to its decimal equivalent.","o":["10","8","14","12"],"a":0,"e":"1010 in binary equals (1x8)+(0x4)+(1x2)+(0x1) = 10 in decimal.","section":"Computer Related Knowledge","id":464},{"q":"Convert the decimal number 25 to its binary equivalent.","o":["11011","11001","11100","10101"],"a":1,"e":"25 in decimal converts to 11001 in binary: (1x16)+(1x8)+(0x4)+(0x2)+(1x1) = 25.","section":"Computer Related Knowledge","id":465},{"q":"What is the octal equivalent of the decimal number 8?","o":["10","7","8","11"],"a":0,"e":"8 in decimal equals 10 in octal, since octal is base-8 and 8 = 1x8 + 0.","section":"Computer Related Knowledge","id":466},{"q":"What does 'ASCII' stand for, referring to a character encoding standard?","o":["Automated Standard Code for Internet Interchange","Advanced System for Computer Information Interchange","American System for Computing Information Interface","American Standard Code for Information Interchange"],"a":3,"e":"ASCII stands for American Standard Code for Information Interchange, a character encoding standard for electronic communication.","section":"Computer Related Knowledge","id":467},{"q":"Which character encoding standard supports a much wider range of characters, including symbols from many world languages, compared to ASCII?","o":["EBCDIC","MIME","Unicode","Base64"],"a":2,"e":"Unicode is a comprehensive character encoding standard supporting virtually all writing systems, unlike the limited ASCII standard.","section":"Computer Related Knowledge","id":468},{"q":"Which of the following best describes 'firmware'?","o":["A programming language for web development","Software permanently programmed into a hardware device's read-only memory","A type of antivirus program","A cloud storage service"],"a":1,"e":"Firmware is low-level software embedded directly into hardware devices, typically stored in ROM or flash memory, controlling basic device operations.","section":"Computer Related Knowledge","id":469},{"q":"What is the primary function of a 'BIOS' or 'UEFI' in a computer system?","o":["Managing internet browser cache","Initializing hardware and starting the operating system boot process","Encrypting files on the hard disk","Compiling application source code"],"a":1,"e":"BIOS/UEFI firmware initializes hardware components and manages the boot process before handing control to the operating system.","section":"Computer Related Knowledge","id":470},{"q":"Which of the following best describes a 'file system' in computing, such as NTFS or ext4?","o":["A method used by an operating system to organize and store files on storage media","A programming language","A hardware component","A type of network protocol"],"a":0,"e":"A file system defines how data is organized, stored, and retrieved on storage devices like hard disks and SSDs.","section":"Computer Related Knowledge","id":471},{"q":"Which of the following file systems is commonly used by modern Windows operating systems?","o":["ext4","APFS","FAT32","NTFS"],"a":3,"e":"NTFS (New Technology File System) is the default file system used by modern Windows operating systems, offering better security and larger file support than FAT32.","section":"Computer Related Knowledge","id":472},{"q":"Which of the following file systems is commonly used by modern macOS systems?","o":["APFS","FAT16","ext4","NTFS"],"a":0,"e":"APFS (Apple File System) is the default file system used by modern macOS, iOS, and other Apple devices.","section":"Computer Related Knowledge","id":473},{"q":"What does 'RAID' stand for in the context of data storage?","o":["Reliable Automated Internal Database","Random Array of Interconnected Data","Redundant Array of Independent Disks","Rapid Access Internal Drive"],"a":2,"e":"RAID stands for Redundant Array of Independent Disks, a technology combining multiple physical disks for improved performance and/or redundancy.","section":"Computer Related Knowledge","id":474},{"q":"Which RAID level provides data mirroring, duplicating data across two disks for redundancy?","o":["RAID 5","RAID 0","RAID 1","RAID 10 only, not RAID 1"],"a":2,"e":"RAID 1 mirrors data across two disks, providing redundancy at the cost of usable storage capacity.","section":"Computer Related Knowledge","id":475},{"q":"Which RAID level stripes data across disks without redundancy, prioritizing performance over fault tolerance?","o":["RAID 0","RAID 6","RAID 1","RAID 5"],"a":0,"e":"RAID 0 stripes data across multiple disks for improved performance but offers no redundancy or fault tolerance.","section":"Computer Related Knowledge","id":476},{"q":"What is the primary function of a 'proxy server' in networking?","o":["Acting as an intermediary between a client and server, often for caching or filtering requests","Assigning static IP addresses only","Directly storing all user passwords","Managing printer queues"],"a":0,"e":"A proxy server acts as an intermediary, forwarding client requests to servers while providing benefits like caching, filtering, or anonymity.","section":"Computer Related Knowledge","id":477},{"q":"What does 'NAT' (Network Address Translation) primarily accomplish in networking?","o":["Blocking unauthorized network access entirely","Encrypting all network traffic","Assigning domain names to IP addresses","Allowing multiple devices on a private network to share a single public IP address"],"a":3,"e":"NAT allows multiple devices on a private network to access external networks using a single shared public IP address.","section":"Computer Related Knowledge","id":478},{"q":"Which of the following best describes a 'subnet mask' in IP networking?","o":["A device that connects two different networks","A method of encrypting IP addresses","A type of firewall rule","A value that divides an IP address into network and host portions"],"a":3,"e":"A subnet mask determines which portion of an IP address represents the network and which represents the host, enabling network segmentation.","section":"Computer Related Knowledge","id":479},{"q":"What is the maximum number of usable IP addresses in a standard /24 subnet (Class C-sized)?","o":["256","255","254","128"],"a":2,"e":"A /24 subnet has 256 total addresses, but 254 are usable for hosts after reserving the network and broadcast addresses.","section":"Computer Related Knowledge","id":480},{"q":"Which version of the Internet Protocol uses 128-bit addresses, designed to address the exhaustion of IPv4 addresses?","o":["IPv5","IPv4","IPv3","IPv6"],"a":3,"e":"IPv6 uses 128-bit addressing, vastly expanding the available address space compared to IPv4's 32-bit addresses.","section":"Computer Related Knowledge","id":481},{"q":"Which of the following best describes 'load balancing' in server infrastructure?","o":["Distributing network or application traffic across multiple servers to optimize resource use","Reducing the total number of servers needed","Backing up data to a secondary location","Encrypting data transmitted between servers"],"a":0,"e":"Load balancing distributes incoming traffic across multiple servers to prevent any single server from becoming overwhelmed, improving reliability and performance.","section":"Computer Related Knowledge","id":482},{"q":"What is the primary purpose of a 'Content Delivery Network' (CDN)?","o":["Encrypting website databases","Managing domain name registration","Distributing content across geographically dispersed servers to reduce latency for end users","Providing antivirus protection for websites"],"a":2,"e":"A CDN caches and delivers content from servers geographically closer to end users, reducing latency and improving load times.","section":"Computer Related Knowledge","id":483},{"q":"Which of the following best describes 'containerization' technologies like Docker?","o":["Packaging an application with its dependencies into a lightweight, portable unit that runs consistently across environments","A method of physically storing servers in shipping containers","A network security protocol","A type of database replication"],"a":0,"e":"Containerization packages applications with their dependencies into isolated, portable units, ensuring consistent operation across different computing environments.","section":"Computer Related Knowledge","id":484},{"q":"What is the primary distinction between a 'container' (like Docker) and a 'virtual machine'?","o":["Containers require more resources than VMs","There is no meaningful difference","Containers share the host operating system's kernel, while VMs run a full separate operating system","VMs share the host kernel, while containers run separate kernels"],"a":2,"e":"Containers share the host OS kernel and are more lightweight, while virtual machines each run a complete, separate guest operating system.","section":"Computer Related Knowledge","id":485},{"q":"Which programming paradigm treats computation as the evaluation of mathematical functions, avoiding changing state and mutable data?","o":["Object-oriented programming","Functional programming","Procedural programming","Event-driven programming"],"a":1,"e":"Functional programming emphasizes pure functions, immutability, and avoiding side effects or mutable state.","section":"Computer Related Knowledge","id":486},{"q":"Which of the following best describes 'recursion' in programming?","o":["A type of database query","A method of encrypting code","A loop that never terminates","A function calling itself to solve smaller instances of the same problem"],"a":3,"e":"Recursion is a programming technique where a function calls itself to break a problem into smaller, similar subproblems.","section":"Computer Related Knowledge","id":487},{"q":"Which sorting algorithm has a worst-case time complexity of O(n log n) and is commonly used due to its stability?","o":["Selection Sort","Insertion Sort","Merge Sort","Bubble Sort"],"a":2,"e":"Merge Sort consistently achieves O(n log n) time complexity in all cases and is a stable sorting algorithm.","section":"Computer Related Knowledge","id":488},{"q":"Which sorting algorithm repeatedly steps through a list, compares adjacent elements, and swaps them if they are in the wrong order?","o":["Bubble Sort","Quick Sort","Merge Sort","Heap Sort"],"a":0,"e":"Bubble Sort repeatedly compares and swaps adjacent elements, 'bubbling' the largest elements to the end of the list.","section":"Computer Related Knowledge","id":489},{"q":"Which data structure uses nodes connected via pointers, where each node contains data and a reference to the next node?","o":["Stack","Hash Table","Array","Linked List"],"a":3,"e":"A linked list consists of nodes, each containing data and a pointer/reference to the next node in the sequence.","section":"Computer Related Knowledge","id":490},{"q":"Which data structure is particularly efficient for fast lookups, insertions, and deletions using key-value pairs?","o":["Hash Table","Queue","Array","Stack"],"a":0,"e":"Hash tables use a hash function to map keys to indices, enabling average-case constant-time lookups, insertions, and deletions.","section":"Computer Related Knowledge","id":491},{"q":"Which tree data structure ensures that for any node, the left subtree contains only values less than the node and the right subtree only greater values?","o":["Heap","Binary Search Tree","AVL Tree only, not BST in general","Trie"],"a":1,"e":"A Binary Search Tree (BST) maintains the property that left subtree values are smaller and right subtree values are greater than the node.","section":"Computer Related Knowledge","id":492},{"q":"What is the primary advantage of a 'balanced' binary search tree, such as an AVL tree, over an unbalanced one?","o":["It uses less memory than any other data structure","It eliminates the need for comparison operations","It guarantees O(log n) time complexity for search, insert, and delete operations","It only works with integer data types"],"a":2,"e":"Balanced trees like AVL trees maintain height balance, ensuring operations remain O(log n) rather than degrading to O(n) in worst-case scenarios.","section":"Computer Related Knowledge","id":493},{"q":"Which of the following best describes 'Agile' methodology in software development?","o":["A database design methodology","An iterative approach emphasizing flexibility, collaboration, and incremental delivery","A method used only for hardware development","A strict, sequential development process with no room for changes"],"a":1,"e":"Agile methodology emphasizes iterative development, collaboration, customer feedback, and adaptability to changing requirements.","section":"Computer Related Knowledge","id":494},{"q":"Which of the following best describes the 'Waterfall' software development model?","o":["A model used exclusively for mobile app development","An iterative, flexible approach with continuous feedback loops","A linear, sequential approach where each phase must be completed before the next begins","A method focused only on testing"],"a":2,"e":"The Waterfall model follows a strict, linear sequence of phases (requirements, design, implementation, testing, deployment) with limited flexibility for changes.","section":"Computer Related Knowledge","id":495},{"q":"What does 'CI/CD' stand for in modern software development practices?","o":["Central Integration/Central Distribution","Continuous Integration/Continuous Deployment (or Delivery)","Client Interface/Client Design","Code Inspection/Code Debugging"],"a":1,"e":"CI/CD stands for Continuous Integration and Continuous Deployment (or Delivery), practices that automate code integration, testing, and release.","section":"Computer Related Knowledge","id":496},{"q":"Which of the following best describes 'technical debt' in software engineering?","o":["The implied cost of future rework caused by choosing an easy, short-term solution over a better, long-term approach","The financial cost of purchasing software licenses","A type of malware infection","The cost of hardware upgrades"],"a":0,"e":"Technical debt refers to the future cost of additional work created when developers take shortcuts in code quality or design for short-term speed.","section":"Computer Related Knowledge","id":497},{"q":"Which historical computer is widely regarded as one of the first general-purpose electronic digital computers, completed in 1945?","o":["UNIVAC","Colossus","ENIAC","Apple I"],"a":2,"e":"ENIAC (Electronic Numerical Integrator and Computer), completed in 1945, is widely regarded as one of the earliest general-purpose electronic digital computers.","section":"Computer Related Knowledge","id":498},{"q":"Who is widely credited as the founder of modern computer science and is known for his work on the theoretical Turing Machine?","o":["Ada Lovelace","Alan Turing","Charles Babbage","John von Neumann"],"a":1,"e":"Alan Turing's theoretical work on computation, including the Turing Machine concept, laid foundational principles for modern computer science.","section":"Computer Related Knowledge","id":499},{"q":"Which historical figure is often credited as the first computer programmer for her work on Charles Babbage's Analytical Engine?","o":["Ada Lovelace","Grace Hopper","Margaret Hamilton","Katherine Johnson"],"a":0,"e":"Ada Lovelace wrote what is considered the first algorithm intended for implementation on Babbage's Analytical Engine, earning her recognition as the first computer programmer.","section":"Computer Related Knowledge","id":500},{"q":"Which computer scientist is credited with developing the COBOL programming language and popularizing the term 'debugging'?","o":["Grace Hopper","Bjarne Stroustrup","Dennis Ritchie","James Gosling"],"a":0,"e":"Grace Hopper was instrumental in developing COBOL and is often credited with popularizing the term 'bug' and 'debugging' in computing.","section":"Computer Related Knowledge","id":501},{"q":"Which programming language, developed by Dennis Ritchie in the early 1970s, heavily influenced many modern languages including C++ and Java?","o":["C","COBOL","Python","FORTRAN"],"a":0,"e":"The C programming language, developed by Dennis Ritchie at Bell Labs, has profoundly influenced the design of many subsequent languages.","section":"Computer Related Knowledge","id":502},{"q":"Which company developed the Java programming language, first released in 1995?","o":["IBM","Microsoft","Apple","Sun Microsystems"],"a":3,"e":"Java was developed by Sun Microsystems (later acquired by Oracle), with James Gosling as its lead designer.","section":"Computer Related Knowledge","id":503},{"q":"Which company originally developed the Python programming language, first released by its creator Guido van Rossum in 1991?","o":["Microsoft","It was developed independently by Guido van Rossum, not by a company","Google","IBM"],"a":1,"e":"Python was created by Guido van Rossum as an independent project, first released in 1991, before later being supported by the Python Software Foundation.","section":"Computer Related Knowledge","id":504},{"q":"Which technology company developed the JavaScript programming language, originally called 'Mocha' and later 'LiveScript'?","o":["Google","Sun Microsystems","Microsoft","Netscape"],"a":3,"e":"JavaScript was created by Brendan Eich at Netscape in 1995, initially named Mocha, then LiveScript, before being renamed JavaScript.","section":"Computer Related Knowledge","id":505},{"q":"What is the primary function of a 'compiler' in software development?","o":["Translating source code written in a high-level language into machine code before execution","Managing version control history","Testing software for bugs automatically","Executing code line-by-line at runtime"],"a":0,"e":"A compiler translates an entire program's source code into machine code (or an intermediate form) before execution, as opposed to an interpreter which executes code directly.","section":"Computer Related Knowledge","id":506},{"q":"What is the primary function of an 'interpreter' in software execution, as distinct from a compiler?","o":["Managing database transactions","Executing source code directly, translating and running it line-by-line","Encrypting compiled binaries","Converting machine code back into source code"],"a":1,"e":"An interpreter executes source code directly, translating and running instructions one at a time without producing a separate compiled executable.","section":"Computer Related Knowledge","id":507},{"q":"Which of the following best describes 'middleware' in software architecture?","o":["Software that provides common services and capabilities between applications, outside of the operating system","The primary user interface of an application","A database indexing method","A type of hardware firewall"],"a":0,"e":"Middleware sits between applications and operating systems, providing common services like communication, authentication, and data management across distributed systems.","section":"Computer Related Knowledge","id":508},{"q":"What is the primary purpose of an 'ORM' (Object-Relational Mapping) tool in software development?","o":["Managing network traffic between servers","Encrypting database backups","Compiling source code into machine language","Allowing developers to interact with a relational database using object-oriented programming constructs"],"a":3,"e":"ORM tools translate data between incompatible type systems, allowing developers to work with databases using objects rather than raw SQL queries.","section":"Computer Related Knowledge","id":509},{"q":"Which of the following is a widely used version control hosting platform that also provides collaboration features like issue tracking and pull requests?","o":["GitHub","MySQL","Apache","Docker Hub"],"a":0,"e":"GitHub is a popular platform for hosting Git repositories, offering collaboration tools such as pull requests, issue tracking, and code review.","section":"Computer Related Knowledge","id":510},{"q":"What does 'UI/UX' commonly refer to in software and product design?","o":["User Identification and User Extraction","User Interface and User Experience","Unified Interface and Unified Execution","Universal Integration and Universal Exchange"],"a":1,"e":"UI (User Interface) refers to the visual elements users interact with, while UX (User Experience) refers to the overall experience and usability of a product.","section":"Computer Related Knowledge","id":511},{"q":"Which of the following best describes 'responsive web design'?","o":["A design technique that only works on desktop computers","A database optimization technique","A design approach ensuring websites render well across different devices and screen sizes","A method for encrypting website content"],"a":2,"e":"Responsive web design uses flexible layouts and media queries to ensure websites adapt appropriately to different devices and screen sizes.","section":"Computer Related Knowledge","id":512},{"q":"What is the primary function of 'cookies' in web browsing?","o":["A protocol for transferring large files","A type of malware that infects browsers","Small pieces of data stored by websites on a user's browser to remember information across sessions","A method of encrypting website traffic"],"a":2,"e":"Cookies are small data files stored by websites on a user's device to remember preferences, login sessions, and other information across visits.","section":"Computer Related Knowledge","id":513},{"q":"Which of the following best describes 'API rate limiting'?","o":["A method of caching API results permanently","Compressing API data for faster transfer","Restricting the number of requests a client can make to an API within a given timeframe","Encrypting API responses"],"a":2,"e":"API rate limiting restricts how many requests a client can make within a specified period, protecting servers from overload or abuse.","section":"Computer Related Knowledge","id":514},{"q":"What does 'JSON' stand for, a widely used data interchange format in web APIs?","o":["JavaScript Oriented Network","JavaScript Object Notation","Java Standard Object Network","Joint Syntax Object Notation"],"a":1,"e":"JSON stands for JavaScript Object Notation, a lightweight, human-readable data interchange format widely used in web APIs.","section":"Computer Related Knowledge","id":515},{"q":"Which of the following best describes 'XML' as a markup language, compared to JSON?","o":["A type of database management system","A more verbose markup language using tags, often used for structured document representation","A programming language for mobile app development","A network security protocol"],"a":1,"e":"XML (Extensible Markup Language) uses tags to structure data, and while more verbose than JSON, it remains widely used for documents and certain data interchange formats.","section":"Computer Related Knowledge","id":516},{"q":"Which cryptographic concept uses a pair of mathematically linked keys—one public and one private—for secure communication?","o":["Hash functions","Asymmetric (public-key) encryption","Steganography","Symmetric encryption"],"a":1,"e":"Asymmetric encryption uses a public key for encryption and a corresponding private key for decryption, unlike symmetric encryption which uses a single shared key.","section":"Computer Related Knowledge","id":517},{"q":"Which of the following best describes a 'hash function' in computing?","o":["A function used solely for compressing files","A function used to generate random passwords only","A function that converts input data into a fixed-size string of characters, typically for verification purposes","A function used to encrypt data reversibly"],"a":2,"e":"A hash function transforms input data into a fixed-length output (hash), commonly used for data integrity verification, and is generally not designed to be reversible.","section":"Computer Related Knowledge","id":518},{"q":"Which widely used symmetric encryption standard replaced the older DES (Data Encryption Standard) due to security concerns?","o":["MD5","SHA-256","RSA","AES (Advanced Encryption Standard)"],"a":3,"e":"AES (Advanced Encryption Standard) replaced DES as the standard symmetric encryption algorithm due to its improved security and efficiency.","section":"Computer Related Knowledge","id":519},{"q":"Which of the following is a widely used asymmetric encryption algorithm named after its three inventors?","o":["AES","Blowfish","RSA (Rivest-Shamir-Adleman)","DES"],"a":2,"e":"RSA, named after Ron Rivest, Adi Shamir, and Leonard Adleman, is a foundational asymmetric encryption algorithm widely used for secure data transmission.","section":"Computer Related Knowledge","id":520},{"q":"What is the primary purpose of a 'digital signature' in electronic communications?","o":["Verifying the authenticity and integrity of a digital message or document","Encrypting an entire hard drive","Blocking unauthorized network access","Compressing large files for storage"],"a":0,"e":"A digital signature uses cryptographic techniques to verify that a message or document is authentic and has not been altered.","section":"Computer Related Knowledge","id":521},{"q":"Which of the following best describes a 'firewall' in network security?","o":["A device used to boost Wi-Fi signal strength","A type of malware","A tool for compressing network data","A system that monitors and controls incoming and outgoing network traffic based on security rules"],"a":3,"e":"A firewall monitors and filters network traffic based on predetermined security rules, acting as a barrier between trusted and untrusted networks.","section":"Computer Related Knowledge","id":522},{"q":"Which term describes a security vulnerability that is exploited before the software vendor becomes aware of it or releases a fix?","o":["Legacy vulnerability","Known vulnerability","Patched vulnerability","Zero-day vulnerability"],"a":3,"e":"A 'zero-day vulnerability' is a flaw exploited by attackers before developers have had any time (zero days) to address it.","section":"Computer Related Knowledge","id":523},{"q":"What is 'social engineering' in the context of cybersecurity?","o":["Manipulating individuals into divulging confidential information through psychological tactics","A technique for optimizing network architecture","A programming paradigm","A method of designing user-friendly software interfaces"],"a":0,"e":"Social engineering involves psychologically manipulating people into revealing sensitive information or performing actions that compromise security.","section":"Computer Related Knowledge","id":524},{"q":"Which of the following best describes 'penetration testing' in cybersecurity?","o":["A type of malware removal tool","An illegal hacking attempt","A method of encrypting network traffic","An authorized simulated cyberattack conducted to identify security vulnerabilities"],"a":3,"e":"Penetration testing involves authorized, simulated attacks on a system to identify exploitable vulnerabilities before malicious actors can find them.","section":"Computer Related Knowledge","id":525},{"q":"What is the primary function of an 'Intrusion Detection System' (IDS)?","o":["Monitoring network or system activities for malicious actions or policy violations","Compressing network packets for faster transmission","Encrypting stored data at rest","Automatically blocking all incoming internet traffic"],"a":0,"e":"An IDS monitors network or system activity to detect potential security threats or policy violations, often generating alerts for further action.","section":"Computer Related Knowledge","id":526},{"q":"Which term describes malicious software that appears legitimate but secretly performs harmful actions, often without self-replication?","o":["Spyware only","Worm","Adware only","Trojan horse"],"a":3,"e":"A Trojan horse disguises itself as legitimate software while secretly performing malicious actions, distinct from self-replicating worms.","section":"Computer Related Knowledge","id":527},{"q":"What is the purpose of 'sandboxing' in software security?","o":["Compressing files before transmission","Backing up critical system files","Running untrusted code in an isolated environment to prevent it from affecting the host system","Encrypting network traffic between two systems"],"a":2,"e":"Sandboxing isolates untrusted programs or code in a restricted environment, preventing potential harm to the broader system.","section":"Computer Related Knowledge","id":528},{"q":"Which of the following best describes 'multi-factor authentication' beyond simple 2FA?","o":["Encrypting a password multiple times","Combining two or more independent credentials—such as a password, a physical token, and biometric verification—for authentication","Using multiple passwords for the same single login step","Requiring users to log in from multiple devices simultaneously"],"a":1,"e":"Multi-factor authentication combines multiple independent verification methods (something you know, have, and are) to strengthen security beyond a single password.","section":"Computer Related Knowledge","id":529},{"q":"Which software development practice involves writing automated tests before writing the actual implementation code?","o":["Test-Driven Development (TDD)","Pair Programming","Waterfall Development","Continuous Deployment"],"a":0,"e":"Test-Driven Development (TDD) requires developers to write tests before implementing the corresponding functionality, guiding development through test cases.","section":"Computer Related Knowledge","id":530},{"q":"Which of the following best describes 'pair programming' as an Agile software development practice?","o":["A method of automatically pairing bugs with their fixes","A technique for pairing software licenses with hardware","Two separate teams work on the same project without communication","Two programmers work together at one workstation, with one writing code and the other reviewing it in real time"],"a":3,"e":"Pair programming involves two developers working together at a single workstation, collaboratively writing and reviewing code in real time.","section":"Computer Related Knowledge","id":531},{"q":"Which software architecture pattern separates an application into three interconnected components: Model, View, and Controller?","o":["Microservices architecture","Event-driven architecture","MVC (Model-View-Controller)","Monolithic architecture"],"a":2,"e":"MVC separates an application's data (Model), user interface (View), and control logic (Controller) into distinct, interconnected components.","section":"Computer Related Knowledge","id":532},{"q":"Which architectural style structures an application as a collection of small, independently deployable services?","o":["Monolithic architecture","Client-server architecture only, in its basic form","Microservices architecture","MVC architecture"],"a":2,"e":"Microservices architecture breaks an application into small, independently deployable services that communicate over well-defined APIs.","section":"Computer Related Knowledge","id":533},{"q":"What is the primary advantage of a 'monolithic' software architecture over microservices for smaller applications?","o":["Simpler development, deployment, and debugging due to a single unified codebase","Better scalability for very large applications","Inherently more secure than microservices","Easier to maintain for large distributed teams"],"a":0,"e":"Monolithic architecture, being a single unified codebase, is often simpler to develop, test, and deploy for smaller applications, though it can become harder to scale as complexity grows.","section":"Computer Related Knowledge","id":534},{"q":"What does the term 'scalability' refer to in software and systems design?","o":["A system's ability to handle increasing workloads by adding resources","A method of encrypting user data","The process of debugging software","The visual appearance of a user interface"],"a":0,"e":"Scalability refers to a system's capacity to handle growing amounts of work or its potential to accommodate growth by adding resources.","section":"Computer Related Knowledge","id":535},{"q":"Which of the following best distinguishes 'vertical scaling' from 'horizontal scaling'?","o":["Vertical scaling adds more servers, while horizontal scaling adds resources to an existing server","Vertical scaling adds resources (CPU/RAM) to an existing server, while horizontal scaling adds more servers","Both terms refer to the exact same scaling strategy","Neither term relates to server infrastructure"],"a":1,"e":"Vertical scaling ('scaling up') increases the capacity of an existing machine, while horizontal scaling ('scaling out') adds more machines to distribute the load.","section":"Computer Related Knowledge","id":536},{"q":"Which of the following is a widely used NoSQL database known for its document-oriented data model?","o":["PostgreSQL","Oracle Database","MongoDB","MySQL"],"a":2,"e":"MongoDB is a popular NoSQL database that stores data in flexible, JSON-like documents, rather than in traditional relational tables.","section":"Computer Related Knowledge","id":537},{"q":"Which of the following best describes the CAP theorem in distributed database systems?","o":["A theorem describing network latency calculations","A rule governing how many servers a database can use","A method for encrypting distributed databases","A distributed system can only guarantee two of the three properties: Consistency, Availability, and Partition tolerance, simultaneously"],"a":3,"e":"The CAP theorem states that a distributed data store can provide at most two of the three guarantees: Consistency, Availability, and Partition tolerance, at any given time.","section":"Computer Related Knowledge","id":538},{"q":"What is the primary purpose of 'database indexing'?","o":["Encrypting sensitive columns in a table","Automatically backing up database records","Compressing database storage size significantly","Improving the speed of data retrieval operations on a database table"],"a":3,"e":"Database indexing creates data structures that improve the speed of data retrieval operations, at the cost of additional storage and slower writes.","section":"Computer Related Knowledge","id":539},{"q":"Which of the following best describes an 'ACID' compliant transaction in database systems?","o":["A transaction that guarantees Atomicity, Consistency, Isolation, and Durability","A transaction that bypasses all database constraints","A transaction that guarantees fast query execution only","A transaction limited strictly to read operations"],"a":0,"e":"ACID stands for Atomicity, Consistency, Isolation, and Durability—properties that guarantee reliable processing of database transactions.","section":"Computer Related Knowledge","id":540},{"q":"Which of the following best describes 'eventual consistency' in distributed systems, often used in NoSQL databases?","o":["A model that never achieves consistency","A consistency model where, given enough time without new updates, all replicas will converge to the same value","A model guaranteeing immediate consistency across all nodes at all times","A model used exclusively in relational databases"],"a":1,"e":"Eventual consistency allows temporary inconsistencies across distributed replicas, with the guarantee that all nodes will converge to the same state given enough time without further updates.","section":"Computer Related Knowledge","id":541},{"q":"What is the primary function of a 'message queue' (such as RabbitMQ or Kafka) in distributed systems?","o":["Enabling asynchronous communication between different services or components by temporarily storing messages","Compressing large data files for storage","Replacing the need for databases entirely","Encrypting messages exchanged between services"],"a":0,"e":"Message queues facilitate asynchronous communication between distributed system components, allowing messages to be reliably passed and processed independently of sender and receiver timing.","section":"Computer Related Knowledge","id":542},{"q":"Which of the following best describes 'edge computing'?","o":["A type of database replication strategy","A technique for encrypting data at rest","A method of compressing video files","Processing data closer to its source (at the network edge) rather than relying solely on centralized cloud servers"],"a":3,"e":"Edge computing processes data near its source, reducing latency and bandwidth use compared to sending all data to distant centralized cloud servers.","section":"Computer Related Knowledge","id":543},{"q":"Which of the following best defines 'Internet of Things' (IoT)?","o":["A type of cybersecurity attack targeting smart devices","A single centralized database used by all internet-connected devices","A network of physical devices embedded with sensors and software that connect and exchange data over the internet","A programming language for embedded systems"],"a":2,"e":"IoT refers to the interconnected network of physical devices—sensors, appliances, vehicles—that collect and exchange data via the internet.","section":"Computer Related Knowledge","id":544},{"q":"Which of the following best describes 'bandwidth' in the context of networking?","o":["The maximum rate of data transfer across a given network path","The number of devices connected to a network","The physical length of network cabling","The encryption strength of a network protocol"],"a":0,"e":"Bandwidth refers to the maximum data transfer rate of a network or internet connection, typically measured in bits per second.","section":"Computer Related Knowledge","id":545},{"q":"Which of the following best describes 'latency' in networking?","o":["The number of active network connections","The delay before a transfer of data begins following an instruction","The total amount of data that can be transferred","The physical distance between two network devices"],"a":1,"e":"Latency refers to the time delay experienced in a system, particularly the time it takes for data to travel from source to destination.","section":"Computer Related Knowledge","id":546},{"q":"What is the primary function of the Transmission Control Protocol/Internet Protocol (TCP/IP) model's Application layer?","o":["Providing network services directly to end-user applications, such as web browsing and email","Routing packets between networks","Establishing physical connections between devices","Assigning MAC addresses to devices"],"a":0,"e":"The Application layer of the TCP/IP model provides protocols that support end-user applications, such as HTTP, FTP, and SMTP.","section":"Computer Related Knowledge","id":547},{"q":"Which protocol is used for sending email messages between mail servers?","o":["SMTP (Simple Mail Transfer Protocol)","POP3","FTP","IMAP"],"a":0,"e":"SMTP is the standard protocol used for sending email messages between servers, while POP3 and IMAP are used for retrieving messages.","section":"Computer Related Knowledge","id":548},{"q":"Which protocol allows a mail client to retrieve messages from a server while keeping them synchronized across multiple devices?","o":["FTP","SMTP","POP3","IMAP (Internet Message Access Protocol)"],"a":3,"e":"IMAP allows emails to remain on the server and be synchronized across multiple devices, unlike POP3 which typically downloads and often removes messages from the server.","section":"Computer Related Knowledge","id":549},{"q":"Which of the following best describes 'FTP' (File Transfer Protocol)?","o":["A protocol used for resolving domain names","A protocol used for real-time video conferencing","A protocol used exclusively for sending emails","A protocol used for transferring files between a client and server over a network"],"a":3,"e":"FTP is a standard network protocol used to transfer files between a client and a server over a computer network.","section":"Computer Related Knowledge","id":550},{"q":"Which wireless networking standard is commonly known as 'Wi-Fi 6'?","o":["802.11g","802.11ax","802.11n","802.11ac"],"a":1,"e":"Wi-Fi 6, officially known as 802.11ax, offers improved speed, capacity, and efficiency compared to earlier Wi-Fi standards.","section":"Computer Related Knowledge","id":551},{"q":"Which of the following best describes 'Bluetooth' technology?","o":["A protocol used exclusively for internet browsing","A type of wired Ethernet cabling standard","A long-range satellite communication protocol","A short-range wireless technology for exchanging data between fixed and mobile devices"],"a":3,"e":"Bluetooth is a wireless technology standard designed for short-range data exchange between devices, such as phones, headphones, and computers.","section":"Computer Related Knowledge","id":552},{"q":"What does the term 'GUI' stand for in computing?","o":["Graphical User Interface","Graphic Utility Index","General User Instruction","Global Unified Interface"],"a":0,"e":"GUI stands for Graphical User Interface, allowing users to interact with electronic devices through visual elements like icons and buttons rather than text commands only.","section":"Computer Related Knowledge","id":553},{"q":"What does the term 'CLI' stand for, referring to a text-based method of interacting with a computer?","o":["Command Line Interface","Control Level Instruction","Computer Language Input","Central Logic Interface"],"a":0,"e":"CLI stands for Command Line Interface, allowing users to interact with a computer system by typing text commands rather than using graphical elements.","section":"Computer Related Knowledge","id":554},{"q":"Which of the following is an example of an open-source operating system kernel widely used in servers and embedded systems?","o":["iOS","Linux","Windows","macOS"],"a":1,"e":"Linux is a widely used open-source operating system kernel, forming the basis for many server, embedded, and desktop operating system distributions.","section":"Computer Related Knowledge","id":555},{"q":"Which company originally developed the Windows operating system?","o":["Microsoft","Apple","Google","IBM"],"a":0,"e":"Microsoft developed the Windows operating system, first released in 1985.","section":"Computer Related Knowledge","id":556},{"q":"Which company developed the macOS operating system, used on Mac computers?","o":["Microsoft","Apple","IBM","Google"],"a":1,"e":"Apple developed macOS (formerly OS X), the operating system used on its Macintosh computers.","section":"Computer Related Knowledge","id":557},{"q":"Which mobile operating system is developed by Google and is widely used across various smartphone manufacturers?","o":["BlackBerry OS","iOS","Windows Phone","Android"],"a":3,"e":"Android, developed by Google, is an open-source mobile operating system used by numerous smartphone manufacturers worldwide.","section":"Computer Related Knowledge","id":558},{"q":"Which mobile operating system is developed exclusively by Apple for its own devices?","o":["Android","iOS","Symbian","Windows Phone"],"a":1,"e":"iOS is developed exclusively by Apple for use on its own devices, such as the iPhone and iPad.","section":"Computer Related Knowledge","id":559},{"q":"Which of the following best describes 'virtualization' in computing?","o":["Encrypting data for secure transmission","Compressing files to save storage space","A method of physically upgrading hardware components","Creating a virtual version of a resource, such as a server, storage device, or operating system"],"a":3,"e":"Virtualization allows the creation of virtual instances of computing resources—like servers or operating systems—enabling more efficient use of physical hardware.","section":"Computer Related Knowledge","id":560},{"q":"What is a 'hypervisor' in the context of virtualization technology?","o":["A type of network router","A tool for compressing large datasets","A programming language for embedded systems","Software that creates and manages virtual machines on physical hardware"],"a":3,"e":"A hypervisor is software that enables the creation, running, and management of virtual machines by abstracting the underlying physical hardware.","section":"Computer Related Knowledge","id":561},{"q":"Which of the following best describes the difference between a Type 1 (bare-metal) and Type 2 (hosted) hypervisor?","o":["Type 1 runs directly on the hardware, while Type 2 runs on top of an existing host operating system","Neither type interacts with physical hardware","Both types run identically without any structural difference","Type 2 runs directly on the hardware, while Type 1 runs on top of an existing operating system"],"a":0,"e":"A Type 1 hypervisor runs directly on the physical hardware ('bare-metal'), while a Type 2 hypervisor runs as an application on top of a conventional host operating system.","section":"Computer Related Knowledge","id":562},{"q":"Which of the following best describes a 'API gateway' in microservices architecture?","o":["A type of database management system","A server that acts as a single entry point for client requests, routing them to appropriate backend services","A physical networking device for connecting servers","A tool used exclusively for compressing API responses"],"a":1,"e":"An API gateway serves as a single entry point that routes client requests to the appropriate backend microservices, often handling authentication, rate limiting, and load balancing.","section":"Computer Related Knowledge","id":563},{"q":"Which term describes the practice of automatically provisioning and managing infrastructure through machine-readable configuration files rather than manual processes?","o":["Infrastructure as Code (IaC)","Database as a Service (DBaaS)","Platform as a Service (PaaS)","Software as a Service (SaaS)"],"a":0,"e":"Infrastructure as Code (IaC) involves managing and provisioning computing infrastructure through machine-readable definition files, rather than manual hardware configuration.","section":"Computer Related Knowledge","id":564},{"q":"Which widely used tool, developed by HashiCorp, is commonly associated with implementing Infrastructure as Code?","o":["Terraform","Jenkins","Kubernetes","Docker"],"a":0,"e":"Terraform, developed by HashiCorp, is a popular Infrastructure as Code tool used to define and provision infrastructure using declarative configuration files.","section":"Computer Related Knowledge","id":565},{"q":"Which widely used container orchestration platform, originally developed by Google, automates the deployment, scaling, and management of containerized applications?","o":["Docker","Jenkins","Terraform","Kubernetes"],"a":3,"e":"Kubernetes, originally developed by Google, is a leading open-source platform for automating the deployment, scaling, and management of containerized applications.","section":"Computer Related Knowledge","id":566},{"q":"Which widely used automation server facilitates continuous integration and continuous delivery (CI/CD) pipelines in software development?","o":["Jenkins","Docker","Kubernetes","Terraform"],"a":0,"e":"Jenkins is a popular open-source automation server used to implement CI/CD pipelines, automating the building, testing, and deployment of software.","section":"Computer Related Knowledge","id":567},{"q":"Which of the following best describes 'serverless computing'?","o":["A computing model that entirely eliminates the use of physical servers everywhere in the world","A programming language designed for embedded systems","A cloud computing model where the cloud provider dynamically manages server allocation, and users are charged based on actual usage","A type of on-premises data center architecture"],"a":2,"e":"Serverless computing allows developers to build applications without managing the underlying server infrastructure, with cloud providers dynamically allocating resources and billing based on actual usage.","section":"Computer Related Knowledge","id":568},{"q":"Which of the following best describes 'version control branching'?","o":["Merging two unrelated software projects into one","Compressing repository size automatically","Deleting old versions of a file permanently","Creating a divergent copy of code to work on features or fixes independently from the main codebase"],"a":3,"e":"Branching in version control allows developers to diverge from the main codebase to work on features, fixes, or experiments independently before merging back.","section":"Computer Related Knowledge","id":569},{"q":"In Git, what is the primary purpose of a 'pull request' (or 'merge request')?","o":["Proposing changes from one branch to be reviewed and merged into another","Permanently deleting a branch","Cloning a repository to a local machine","Compressing repository history"],"a":0,"e":"A pull request (or merge request) is a mechanism for proposing code changes, allowing team members to review and discuss before merging into the target branch.","section":"Computer Related Knowledge","id":570},{"q":"Which of the following best describes 'rebasing' in Git, as opposed to 'merging'?","o":["Compressing a repository's total file size","Automatically resolving all merge conflicts without review","Deleting all previous commits from a branch","Reapplying commits on top of another base branch to create a linear project history"],"a":3,"e":"Rebasing moves or combines a sequence of commits to a new base commit, often used to maintain a cleaner, linear project history compared to merging.","section":"Computer Related Kno
