days he was absent.","o":["5 days","3 days","6 days","4 days"],"a":3,"e":"Let absent days=x, working days=20-x. Earnings: 500(20-x)-100x=7600. 10000-500x-100x=7600 => 10000-600x=7600 => 600x=2400 => x=4.","section":"Arithmetical & Analytical Reasoning","id":801},{"q":"Which Surah of the Quran is named after a metal and discusses its use in construction, associated with Dhul-Qarnayn's story?","o":["Al-Hadid","Saba","Al-Kahf","An-Naml"],"a":0,"e":"Surah Al-Hadid (The Iron) is named after iron; the Dhul-Qarnayn narrative involving iron construction appears in Surah Al-Kahf, though Al-Hadid itself references the created strength in iron as a sign.","section":"Islamiyat & Pakistan Affairs","id":802},{"q":"Which Surah in the Quran is specifically named after bees and describes their role as a sign of divine creation?","o":["An-Naml","Al-Fil","Al-Ankabut","An-Nahl"],"a":3,"e":"Surah An-Nahl (The Bee) discusses the bee as an example of divine wisdom in creation, particularly regarding honey production.","section":"Islamiyat & Pakistan Affairs","id":803},{"q":"Which Surah is named after ants and includes the story of Prophet Sulaiman (Solomon) and the Queen of Sheba?","o":["Al-Ankabut","Al-Namal","An-Naml","An-Nahl"],"a":2,"e":"Surah An-Naml (The Ant) recounts the story of Prophet Sulaiman, including his communication with ants and his interaction with the Queen of Sheba.","section":"Islamiyat & Pakistan Affairs","id":804},{"q":"Which Surah of the Quran is dedicated to the story of Prophet Yusuf (Joseph) in its entirety?","o":["Surah Yusuf","Surah Hud","Surah Ibrahim","Surah Maryam"],"a":0,"e":"Surah Yusuf (Chapter 12) narrates the complete story of Prophet Yusuf, described in the Quran as 'the best of stories'.","section":"Islamiyat & Pakistan Affairs","id":805},{"q":"Which Surah is named after Prophet Isa's (Jesus) mother and discusses her story in detail?","o":["Surah Al-Imran","Surah Al-Ma'idah","Surah An-Nisa","Surah Maryam"],"a":3,"e":"Surah Maryam (Chapter 19) is named after and centers substantially on the story of Maryam (Mary), mother of Prophet Isa.","section":"Islamiyat & Pakistan Affairs","id":806},{"q":"Which of the following Surahs is known as 'Umm-ul-Quran' (Mother of the Quran)?","o":["Yasin","Al-Ikhlas","Al-Fatiha","Al-Baqarah"],"a":2,"e":"Surah Al-Fatiha is referred to as 'Umm-ul-Quran' due to its foundational status, recited in every unit of prayer.","section":"Islamiyat & Pakistan Affairs","id":807},{"q":"Which Surah is recited in the Quran and is often called 'the essence of Tawheed' due to its concise description of God's oneness?","o":["Al-Falaq","Al-Kausar","Al-Ikhlas","An-Nas"],"a":2,"e":"Surah Al-Ikhlas concisely and powerfully affirms the absolute oneness of Allah, and is often described as equivalent to one-third of the Quran in spiritual weight.","section":"Islamiyat & Pakistan Affairs","id":808},{"q":"According to Islamic teaching, how many major (Kabira) sins are traditionally emphasized as being among the gravest, based on various Hadith enumerations?","o":["Exactly 10","Scholars differ on an exact count; seven were highlighted in a well-known Hadith as 'destructive sins'","Exactly 3","Exactly 5"],"a":1,"e":"A well-known Hadith enumerates seven 'destructive sins' (al-Sab' al-Mubiqat), though scholars note other major sins exist beyond this specific list.","section":"Islamiyat & Pakistan Affairs","id":809},{"q":"What does the term 'Ijma' refer to in Islamic jurisprudence (Fiqh)?","o":["Personal opinion of a judge","Consensus of Islamic scholars on a legal matter","A specific type of prayer","Analogy-based reasoning"],"a":1,"e":"Ijma refers to the consensus of qualified Islamic scholars (mujtahids) on a particular point of Islamic law, one of the recognized sources of Fiqh.","section":"Islamiyat & Pakistan Affairs","id":810},{"q":"What does the term 'Qiyas' refer to in Islamic jurisprudence?","o":["A specific Hadith collection","Analogical reasoning to derive rulings for new situations based on existing texts","The literal text of the Quran","Consensus among scholars"],"a":1,"e":"Qiyas is the process of analogical reasoning, extending an existing ruling to a new case that shares a similar underlying cause or reason.","section":"Islamiyat & Pakistan Affairs","id":811},{"q":"Which of the following is considered one of the four canonical sources of Islamic law (Fiqh) alongside the Quran, Sunnah, and Ijma?","o":["Hadith Qudsi","Tafsir","Qiyas","Tajweed"],"a":2,"e":"The four primary sources of Islamic jurisprudence in mainstream Sunni thought are the Quran, Sunnah, Ijma (consensus), and Qiyas (analogical reasoning).","section":"Islamiyat & Pakistan Affairs","id":812},{"q":"Which of the following scholars founded the Hanafi school of Islamic jurisprudence, one of the four major Sunni schools?","o":["Imam Ahmad ibn Hanbal","Imam Abu Hanifa","Imam Shafi'i","Imam Malik"],"a":1,"e":"Imam Abu Hanifa (699-767 CE) founded the Hanafi school, the most widely followed Sunni school of jurisprudence in South Asia, including Pakistan.","section":"Islamiyat & Pakistan Affairs","id":813},{"q":"Which of the following scholars founded the Hanbali school of Islamic jurisprudence?","o":["Imam Ahmad ibn Hanbal","Imam Abu Hanifa","Imam Malik ibn Anas","Imam Shafi'i"],"a":0,"e":"Imam Ahmad ibn Hanbal (780-855 CE) founded the Hanbali school, one of the four major Sunni schools of jurisprudence.","section":"Islamiyat & Pakistan Affairs","id":814},{"q":"Which collection of Hadith, compiled by Imam Bukhari, is widely regarded by Sunni Muslims as the most authentic collection after the Quran?","o":["Sahih Muslim","Sahih al-Bukhari","Sunan Abu Dawood","Jami at-Tirmidhi"],"a":1,"e":"Sahih al-Bukhari, compiled by Imam Muhammad al-Bukhari, is considered by Sunni Muslims to be the most authentic Hadith collection.","section":"Islamiyat & Pakistan Affairs","id":815},{"q":"Along with Sahih al-Bukhari, which other Hadith collection is jointly referred to as one of the 'Sahihain' (the two most authentic collections)?","o":["Sunan an-Nasa'i","Sunan Ibn Majah","Muwatta Imam Malik","Sahih Muslim"],"a":3,"e":"Sahih Muslim, compiled by Imam Muslim ibn al-Hajjaj, together with Sahih al-Bukhari, forms the 'Sahihain', the two most authentic Hadith collections in Sunni Islam.","section":"Islamiyat & Pakistan Affairs","id":816},{"q":"How many Hadith collections are traditionally recognized as the 'Kutub al-Sittah' (the six authentic books) in Sunni Islam?","o":["Five","Four","Seven","Six"],"a":3,"e":"The Kutub al-Sittah comprises six major Hadith collections: Sahih al-Bukhari, Sahih Muslim, Sunan Abu Dawood, Jami at-Tirmidhi, Sunan an-Nasa'i, and Sunan Ibn Majah.","section":"Islamiyat & Pakistan Affairs","id":817},{"q":"What is the term for the specific chain of narrators through which a Hadith has been transmitted?","o":["Sanad only informally, formally called Isnad","Tafsir","Isnad","Matn"],"a":2,"e":"'Isnad' refers to the chain of narrators supporting a Hadith, essential for verifying its authenticity.","section":"Islamiyat & Pakistan Affairs","id":818},{"q":"What is the term for the actual textual content of a Hadith, as distinct from its chain of narration?","o":["Sanad","Matn","Isnad","Riwayah"],"a":1,"e":"'Matn' refers to the actual text or content of a Hadith, distinguished from the 'Isnad' or chain of transmission.","section":"Islamiyat & Pakistan Affairs","id":819},{"q":"Which term describes a Hadith with a continuous and reliable chain of narration, considered highly authentic?","o":["Sahih","Munkar","Da'if","Mawdu'"],"a":0,"e":"A 'Sahih' Hadith has an unbroken chain of trustworthy narrators and is free of significant defects, making it the highest grade of authenticity.","section":"Islamiyat & Pakistan Affairs","id":820},{"q":"Which term describes a fabricated or forged Hadith falsely attributed to the Prophet Muhammad (PBUH)?","o":["Mawdu'","Hasan","Da'if","Sahih"],"a":0,"e":"A 'Mawdu' Hadith is a fabricated narration falsely attributed to the Prophet, rejected by Hadith scholars as inauthentic.","section":"Islamiyat & Pakistan Affairs","id":821},{"q":"Which of the following describes the concept of 'Ijtihad' in Islamic scholarship?","o":["Memorization of the entire Quran","Blind following of a particular scholar's opinion","Independent reasoning by a qualified scholar to derive legal rulings when texts are silent or ambiguous","A specific form of ritual prayer"],"a":2,"e":"Ijtihad refers to the independent legal reasoning exercised by a qualified jurist (mujtahid) to derive rulings on matters not explicitly addressed in primary texts.","section":"Islamiyat & Pakistan Affairs","id":822},{"q":"Which term refers to Muslims following the rulings of a particular established school of jurisprudence without independently deriving legal rulings?","o":["Qiyas","Ijtihad","Ijma","Taqlid"],"a":3,"e":"Taqlid refers to the practice of following an established school of thought or a qualified scholar's rulings rather than performing independent legal reasoning.","section":"Islamiyat & Pakistan Affairs","id":823},{"q":"Which battle in early Islamic history is known as the 'Battle of the Trench', named for the defensive strategy used by the Muslims?","o":["Battle of Hunayn","Battle of Khandaq (Ahzab)","Battle of Badr","Battle of Uhud"],"a":1,"e":"The Battle of Khandaq (also called the Battle of the Trench or Ahzab) saw Muslims dig a trench around Madinah to defend against a coalition of enemy tribes.","section":"Islamiyat & Pakistan Affairs","id":824},{"q":"Who suggested the strategy of digging a trench during the Battle of Khandaq, a tactic previously unfamiliar to the Arabs?","o":["Umar (RA)","Ali (RA)","Abu Bakr (RA)","Salman al-Farsi (RA)"],"a":3,"e":"Salman al-Farsi (RA), a Persian companion, suggested the trench-digging strategy, which was unfamiliar in Arabian warfare at the time.","section":"Islamiyat & Pakistan Affairs","id":825},{"q":"Which treaty, agreed between the Muslims and the Quraysh, is often described in the Quran as a 'clear victory' despite its seemingly unfavorable terms at the time?","o":["Treaty of Madinah","Treaty of Hudaybiyyah","Constitution of Madinah","Treaty of Ta'if"],"a":1,"e":"The Treaty of Hudaybiyyah (628 CE), despite appearing unfavorable initially, is described in Surah Al-Fath as a clear victory due to its long-term benefits for the Muslim community.","section":"Islamiyat & Pakistan Affairs","id":826},{"q":"Which historic document, drafted shortly after the Hijrah, established the rights and responsibilities of various tribes and religious communities in Madinah under Prophet Muhammad's (PBUH) leadership?","o":["Constitution of Madinah","Charter of Makkah","Treaty of Hudaybiyyah","Covenant of Aqabah"],"a":0,"e":"The Constitution of Madinah (Mithaq al-Madinah) established a framework for coexistence among Muslims, Jews, and other tribes in Madinah, often cited as an early form of a written constitution.","section":"Islamiyat & Pakistan Affairs","id":827},{"q":"Which two tribes in Madinah had been in prolonged conflict before converting to Islam or accepting Prophet Muhammad's (PBUH) arbitration, later becoming known as the Ansar?","o":["Quraysh and Thaqif","Banu Nadir and Banu Qurayza","Muhajirun and Ansar","Aws and Khazraj"],"a":3,"e":"The Aws and Khazraj tribes of Madinah had a long history of conflict before accepting Islam and becoming the Ansar (Helpers) who supported the Prophet after the Hijrah.","section":"Islamiyat & Pakistan Affairs","id":828},{"q":"What is the term used for the Muslims who migrated from Makkah to Madinah with Prophet Muhammad (PBUH)?","o":["Muhajirun","Tabi'un","Ansar","Sahaba only broadly, not specifically for migrants"],"a":0,"e":"'Muhajirun' refers specifically to the Muslims who emigrated from Makkah to Madinah during the Hijrah.","section":"Islamiyat & Pakistan Affairs","id":829},{"q":"What is the term used for the residents of Madinah who supported and helped the migrating Muslims (Muhajirun)?","o":["Muhajirun","Sahaba only broadly","Ansar","Tabi'un"],"a":2,"e":"'Ansar' (Helpers) refers to the Madinan Muslims who welcomed and supported the Muhajirun after their migration from Makkah.","section":"Islamiyat & Pakistan Affairs","id":830},{"q":"Which term refers to the companions of Prophet Muhammad (PBUH) who directly met and believed in him during his lifetime?","o":["Tabi' al-Tabi'in","Tabi'un","Muhaddithun","Sahaba"],"a":3,"e":"'Sahaba' refers to the companions who personally knew and believed in Prophet Muhammad (PBUH) during his lifetime.","section":"Islamiyat & Pakistan Affairs","id":831},{"q":"Which term refers to the generation of Muslims who followed and learned directly from the Sahaba, but did not meet the Prophet (PBUH) himself?","o":["Tabi'un","Sahaba","Muhajirun","Ansar"],"a":0,"e":"'Tabi'un' (Successors) refers to the generation that learned from and interacted with the companions (Sahaba) but did not personally meet the Prophet.","section":"Islamiyat & Pakistan Affairs","id":832},{"q":"The event of Mubahalah, involving a proposed mutual imprecation between the Prophet (PBUH) and a Christian delegation, occurred with representatives from which region?","o":["Ta'if","Yemen (Sana'a)","Bahrain","Najran"],"a":3,"e":"The Mubahalah event involved a Christian delegation from Najran, who ultimately withdrew from the mutual imprecation and instead agreed to a peace treaty.","section":"Islamiyat & Pakistan Affairs","id":833},{"q":"Which constitutional amendment in Pakistan is specifically associated with declaring Ahmadis as non-Muslims for the purposes of the Constitution and law?","o":["8th Amendment","2nd Amendment (1974)","13th Amendment","9th Amendment"],"a":1,"e":"The Second Amendment to the Constitution of Pakistan, passed in 1974, declared members of the Ahmadiyya community as non-Muslims for constitutional and legal purposes.","section":"Islamiyat & Pakistan Affairs","id":834},{"q":"Which Pakistani constitutional amendment, passed during General Zia-ul-Haq's era, granted the President sweeping powers including the authority to dissolve the National Assembly?","o":["17th Amendment","8th Amendment","2nd Amendment","13th Amendment"],"a":1,"e":"The 8th Amendment (1985) inserted Article 58(2)(b), granting the President discretionary power to dissolve the National Assembly, significantly altering the balance of power.","section":"Islamiyat & Pakistan Affairs","id":835},{"q":"Which constitutional amendment repealed the controversial Article 58(2)(b), restoring the Prime Minister's supremacy and curbing presidential powers to dissolve the assembly?","o":["13th Amendment","18th Amendment","8th Amendment","17th Amendment"],"a":0,"e":"The 13th Amendment (1997), passed during Nawaz Sharif's second term, repealed Article 58(2)(b), removing the President's discretionary dissolution power.","section":"Islamiyat & Pakistan Affairs","id":836},{"q":"Which constitutional amendment, passed in 2010, is widely regarded as the most significant since 1973 in devolving powers to the provinces?","o":["17th Amendment","20th Amendment","19th Amendment","18th Amendment"],"a":3,"e":"The 18th Amendment (2010) is widely regarded as a landmark reform, devolving significant powers to the provinces and restoring parliamentary character to the Constitution.","section":"Islamiyat & Pakistan Affairs","id":837},{"q":"Which ministry/subject was notably abolished at the federal level and devolved to the provinces under the 18th Amendment?","o":["Ministry of Education (Concurrent List abolished)","Ministry of Finance","Ministry of Foreign Affairs","Ministry of Defence"],"a":0,"e":"The 18th Amendment abolished the Concurrent Legislative List, devolving subjects like education and health primarily to provincial governments.","section":"Islamiyat & Pakistan Affairs","id":838},{"q":"Which Pakistani constitutional document, adopted in 1949, laid down the foundational ideological principles later incorporated into subsequent constitutions?","o":["Indian Independence Act 1947","Lahore Resolution","Objectives Resolution","Government of India Act 1935"],"a":2,"e":"The Objectives Resolution (1949), passed by Pakistan's first Constituent Assembly, articulated foundational principles blending Islamic values with democratic governance, later made a substantive part of the Constitution via the 8th Amendment.","section":"Islamiyat & Pakistan Affairs","id":839},{"q":"Under which legal framework did Pakistan operate as a dominion before adopting its first constitution in 1956?","o":["Government of India Act 1935 (with modifications)","Indian Penal Code","The 1973 Constitution","Objectives Resolution alone"],"a":0,"e":"Pakistan initially governed itself under a modified version of the Government of India Act 1935 until the first Constitution was adopted in 1956.","section":"Islamiyat & Pakistan Affairs","id":840},{"q":"Which Pakistani political leader was responsible for abrogating the 1956 Constitution and imposing the country's first martial law in 1958?","o":["General Pervez Musharraf","General Zia-ul-Haq","General Ayub Khan","General Yahya Khan"],"a":2,"e":"General Ayub Khan abrogated the 1956 Constitution and imposed martial law in October 1958, later becoming President under a new 1962 Constitution.","section":"Islamiyat & Pakistan Affairs","id":841},{"q":"Which Pakistani constitution, promulgated in 1962 under President Ayub Khan, introduced a presidential system with indirect elections through 'Basic Democracies'?","o":["1962 Constitution","1973 Constitution","1956 Constitution","Interim Constitution of 1972"],"a":0,"e":"The 1962 Constitution introduced a presidential system and the 'Basic Democracies' framework, an indirect electoral college system devised under Ayub Khan.","section":"Islamiyat & Pakistan Affairs","id":842},{"q":"Who imposed martial law in Pakistan in 1977, overthrowing the government of Zulfikar Ali Bhutto?","o":["General Pervez Musharraf","General Zia-ul-Haq","General Yahya Khan","General Ayub Khan"],"a":1,"e":"General Muhammad Zia-ul-Haq overthrew Zulfikar Ali Bhutto's government in a military coup in July 1977, ushering in over a decade of military rule.","section":"Islamiyat & Pakistan Affairs","id":843},{"q":"Zulfikar Ali Bhutto served as Pakistan's Prime Minister following the 1973 Constitution's adoption. Which position did he hold immediately prior, following the 1971 war?","o":["Foreign Minister only","President and Chief Martial Law Administrator","Chief Justice","Governor of Punjab"],"a":1,"e":"Zulfikar Ali Bhutto assumed the presidency and became Chief Martial Law Administrator after the 1971 war and Yahya Khan's resignation, before later becoming Prime Minister under the 1973 Constitution.","section":"Islamiyat & Pakistan Affairs","id":844},{"q":"Which Pakistani military ruler assumed power via a coup in 1999, overthrowing Prime Minister Nawaz Sharif's government?","o":["General Zia-ul-Haq","General Pervez Musharraf","General Aslam Beg","General Jehangir Karamat"],"a":1,"e":"General Pervez Musharraf seized power in a bloodless coup in October 1999, removing Prime Minister Nawaz Sharif from office.","section":"Islamiyat & Pakistan Affairs","id":845},{"q":"Which Pakistani constitutional amendment, passed in 2003 during Musharraf's rule, granted constitutional cover to many of his actions including the National Security Council's formal establishment?","o":["13th Amendment","8th Amendment","17th Amendment","18th Amendment"],"a":2,"e":"The 17th Amendment (2003) provided constitutional cover to actions taken by General Musharraf since the 1999 coup and formally established the National Security Council.","section":"Islamiyat & Pakistan Affairs","id":846},{"q":"What is the total number of judges, including the Chief Justice, that the Constitution originally envisioned for the Supreme Court of Pakistan (subject to later legislative changes)?","o":["Fixed permanently at 9","Fixed permanently at 17","The number has changed over time via legislation, initially smaller and later expanded, currently set through an Act of Parliament","Fixed permanently at 25"],"a":2,"e":"The strength of the Supreme Court of Pakistan is determined by an Act of Parliament and has been revised multiple times, rather than being fixed permanently in the Constitution's original text.","section":"Islamiyat & Pakistan Affairs","id":847},{"q":"Which constitutional body in Pakistan is primarily responsible for the appointment of superior court judges, following the 18th and 19th Amendments?","o":["Judicial Commission of Pakistan, with parliamentary committee confirmation","The President alone","The Election Commission of Pakistan","The Prime Minister alone"],"a":0,"e":"Following the 18th and 19th Amendments, judicial appointments involve the Judicial Commission of Pakistan, with subsequent confirmation by a Parliamentary Committee.","section":"Islamiyat & Pakistan Affairs","id":848},{"q":"The 'Charter of Democracy', a significant political agreement between two major Pakistani political parties, was signed in which year?","o":["2006","2010","2008","2002"],"a":0,"e":"The Charter of Democracy was signed in May 2006 between the Pakistan Muslim League (N) and the Pakistan Peoples Party, primarily by Nawaz Sharif and Benazir Bhutto, in London.","section":"Islamiyat & Pakistan Affairs","id":849},{"q":"Which Pakistani province was affected by a major military operation named 'Zarb-e-Azb', launched in 2014 primarily against militant groups in North Waziristan?","o":["Sindh","Khyber Pakhtunkhwa (FATA region)","Punjab","Balochistan"],"a":1,"e":"Operation Zarb-e-Azb was launched in North Waziristan (then part of FATA, bordering Khyber Pakhtunkhwa) in June 2014 to combat militant networks.","section":"Islamiyat & Pakistan Affairs","id":850},{"q":"Which subsequent Pakistani military operation, launched in 2017, aimed to consolidate gains against militancy and eliminate remaining terrorist threats nationwide?","o":["Operation Al-Mizan","Operation Radd-ul-Fasaad","Operation Zarb-e-Azb","Operation Rah-e-Nijat"],"a":1,"e":"Operation Radd-ul-Fasaad was launched in February 2017 as a nationwide counter-terrorism and law enforcement operation.","section":"Islamiyat & Pakistan Affairs","id":851},{"q":"Which Pakistani Prime Minister was removed from office by the Supreme Court in 2017 following the Panama Papers case investigation?","o":["Imran Khan","Nawaz Sharif","Shahid Khaqan Abbasi","Yousaf Raza Gillani"],"a":1,"e":"Nawaz Sharif was disqualified as Prime Minister by the Supreme Court in July 2017 following findings related to the Panama Papers case.","section":"Islamiyat & Pakistan Affairs","id":852},{"q":"Which Pakistani Prime Minister was removed from office through a vote of no-confidence in the National Assembly in April 2022?","o":["Imran Khan","Shehbaz Sharif","Nawaz Sharif","Shahid Khaqan Abbasi"],"a":0,"e":"Imran Khan was removed as Prime Minister in April 2022 after losing a vote of no-confidence in the National Assembly.","section":"Islamiyat & Pakistan Affairs","id":853},{"q":"Which Pakistani political party did Imran Khan found, which later formed the federal government following the 2018 general elections?","o":["Pakistan Muslim League (N)","Pakistan Tehreek-e-Insaf (PTI)","Pakistan Peoples Party (PPP)","Muttahida Qaumi Movement (MQM)"],"a":1,"e":"Imran Khan founded the Pakistan Tehreek-e-Insaf (PTI) in 1996, which went on to form the federal government after the 2018 elections.","section":"Islamiyat & Pakistan Affairs","id":854},{"q":"Which Pakistani general election is widely regarded as the first in the country's history to result in a peaceful, democratic transfer of power from one full-term elected civilian government to another?","o":["2013 general election","2002 general election","2008 general election","1997 general election"],"a":0,"e":"The 2013 general election marked the first time in Pakistan's history that one democratically elected civilian government completed its full term and peacefully transferred power to another elected government.","section":"Islamiyat & Pakistan Affairs","id":855},{"q":"Which body in Pakistan is constitutionally responsible for organizing and conducting general elections?","o":["National Assembly Secretariat","Election Commission of Pakistan (ECP)","Supreme Court of Pakistan","Ministry of Interior"],"a":1,"e":"The Election Commission of Pakistan, an independent constitutional body, is responsible for organizing and conducting elections at federal and provincial levels.","section":"Islamiyat & Pakistan Affairs","id":856},{"q":"Which Pakistani city served as the country's capital before Islamabad was developed and formally designated as the new capital?","o":["Peshawar","Karachi","Rawalpindi","Lahore"],"a":1,"e":"Karachi served as Pakistan's capital from 1947 until the 1960s, when the capital was shifted to the newly developed city of Islamabad.","section":"Islamiyat & Pakistan Affairs","id":857},{"q":"In which year did Islamabad formally become the capital of Pakistan?","o":["1958","1947","1973","1960s (construction began 1961, formal shift completed by 1966)"],"a":3,"e":"Islamabad's construction began in the early 1960s, with the capital formally shifting from Rawalpindi (an interim capital) to Islamabad by around 1966.","section":"Islamiyat & Pakistan Affairs","id":858},{"q":"Which Pakistani leader is credited with initiating the country's nuclear weapons programme following the loss of East Pakistan in 1971?","o":["Zulfikar Ali Bhutto","Yahya Khan","Ziaul Haq","Ayub Khan"],"a":0,"e":"Zulfikar Ali Bhutto is widely credited with initiating Pakistan's nuclear weapons programme, notably at the Multan Conference in January 1972, in response to regional security concerns.","section":"Islamiyat & Pakistan Affairs","id":859},{"q":"Which international conflict/crisis in 1971 led directly to the secession of East Pakistan and the creation of Bangladesh?","o":["The Siachen Conflict","The Kargil Conflict","The Kashmir War of 1965","The Bangladesh Liberation War (1971 India-Pakistan War)"],"a":3,"e":"The 1971 Bangladesh Liberation War, involving Indian military intervention, resulted in the secession of East Pakistan and the emergence of Bangladesh as an independent state.","section":"Islamiyat & Pakistan Affairs","id":860},{"q":"Which agreement, signed between Pakistan and India in 1972 following the 1971 war, established the Line of Control in Kashmir and outlined principles for bilateral relations?","o":["Simla Agreement","Karachi Agreement","Lahore Declaration","Tashkent Declaration"],"a":0,"e":"The Simla Agreement, signed in July 1972 by Zulfikar Ali Bhutto and Indira Gandhi, established the Line of Control and set principles for resolving disputes bilaterally.","section":"Islamiyat & Pakistan Affairs","id":861},{"q":"Which earlier agreement, signed in 1966 after the 1965 Indo-Pakistan War, restored diplomatic and economic relations between Pakistan and India?","o":["Lahore Declaration","Tashkent Declaration","Karachi Agreement","Simla Agreement"],"a":1,"e":"The Tashkent Declaration, signed in January 1966 with Soviet mediation, ended hostilities following the 1965 war between Pakistan and India.","section":"Islamiyat & Pakistan Affairs","id":862},{"q":"Which Pakistani Prime Minister signed the Lahore Declaration with India in 1999, shortly before the Kargil conflict erupted?","o":["Zulfikar Ali Bhutto","Nawaz Sharif","Benazir Bhutto","Imran Khan"],"a":1,"e":"Nawaz Sharif signed the Lahore Declaration with Indian Prime Minister Atal Bihari Vajpayee in February 1999, aiming to improve bilateral relations shortly before the Kargil conflict.","section":"Islamiyat & Pakistan Affairs","id":863},{"q":"Which of the following best describes the core Islamic concept of 'Tawheed'?","o":["The absolute oneness and uniqueness of Allah","The Five Pillars of Islam collectively","The concept of predestination","The finality of Prophethood"],"a":0,"e":"Tawheed refers to the fundamental Islamic doctrine affirming the absolute oneness of Allah, without partners or equals, forming the core of Islamic monotheism.","section":"Islamiyat & Pakistan Affairs","id":864},{"q":"Which of the following correctly lists the Five Pillars of Islam?","o":["Shahada, Salah, Zakat, Sawm, Hajj","Shahada, Salah, Zakat, Jihad, Hajj","Salah, Sawm, Zakat, Hajj, Tawheed","Shahada, Sawm, Zakat, Hajj, Iman"],"a":0,"e":"The Five Pillars of Islam are the declaration of faith (Shahada), prayer (Salah), almsgiving (Zakat), fasting (Sawm), and pilgrimage (Hajj).","section":"Islamiyat & Pakistan Affairs","id":865},{"q":"What is the minimum nisab (threshold) of gold, in the traditional Hanafi calculation, above which Zakat becomes obligatory?","o":["5 tolas","12 tolas","10 tolas","7.5 tolas (approximately 87.48 grams)"],"a":3,"e":"The traditional nisab for gold is 7.5 tolas, approximately 87.48 grams, above which Zakat becomes obligatory if held for a full lunar year.","section":"Islamiyat & Pakistan Affairs","id":866},{"q":"What is the standard percentage rate of Zakat payable on qualifying wealth held for one lunar year?","o":["10%","5%","1%","2.5%"],"a":3,"e":"Zakat is calculated at a standard rate of 2.5% (1/40th) of qualifying wealth held above the nisab threshold for a full lunar year.","section":"Islamiyat & Pakistan Affairs","id":867},{"q":"Which of the following categories of people are explicitly mentioned in the Quran as eligible recipients of Zakat (Asnaf)?","o":["Only scholars of religion","The poor, the needy, and those employed to administer Zakat, among others","Only mosque construction projects","Only orphans"],"a":1,"e":"Surah At-Tawbah (9:60) explicitly enumerates eight categories of Zakat recipients, including the poor, the needy, Zakat administrators, and others.","section":"Islamiyat & Pakistan Affairs","id":868},{"q":"Which month of the Islamic (Hijri) calendar is designated for obligatory fasting (Sawm)?","o":["Ramadan","Muharram","Shawwal","Dhul-Hijjah"],"a":0,"e":"Ramadan, the ninth month of the Islamic calendar, is the month during which fasting from dawn to sunset is obligatory for adult Muslims.","section":"Islamiyat & Pakistan Affairs","id":869},{"q":"Which act of worship, performed once in a lifetime if financially and physically able, takes place in Makkah during a specific period of the Islamic calendar?","o":["Umrah","I'tikaf","Tahajjud","Hajj"],"a":3,"e":"Hajj, the pilgrimage to Makkah, is obligatory once in a lifetime for those who are physically and financially capable, performed during specific days of Dhul-Hijjah.","section":"Islamiyat & Pakistan Affairs","id":870},{"q":"Which of the following describes 'Umrah', as distinct from Hajj?","o":["A mandatory annual pilgrimage","A specific charity payment","A non-obligatory pilgrimage to Makkah that can be performed at any time of the year","A form of fasting during Ramadan"],"a":2,"e":"Umrah is a voluntary pilgrimage to Makkah that, unlike Hajj, can be performed at any time throughout the year and involves fewer rites.","section":"Islamiyat & Pakistan Affairs","id":871},{"q":"How many obligatory (Fard) units (Rak'ahs) are there in total across the five daily prayers?","o":["17","19","15","20"],"a":0,"e":"The total obligatory Rak'ahs across the five daily prayers are: Fajr (2), Zuhr (4), Asr (4), Maghrib (3), and Isha (4), totaling 17.","section":"Islamiyat & Pakistan Affairs","id":872},{"q":"Which daily prayer consists of two obligatory Rak'ahs and is performed before sunrise?","o":["Zuhr","Fajr","Asr","Isha"],"a":1,"e":"Fajr, the dawn prayer, consists of two obligatory Rak'ahs and is performed before sunrise.","section":"Islamiyat & Pakistan Affairs","id":873},{"q":"Which of the following best describes the concept of 'Akhirah' in Islamic belief?","o":["Belief in the divine scriptures","Belief in the oneness of Allah","Belief in the Hereafter, including resurrection and the Day of Judgment","Belief in the Prophets"],"a":2,"e":"Akhirah refers to the Islamic belief in life after death, encompassing resurrection, accountability, and the Day of Judgment.","section":"Islamiyat & Pakistan Affairs","id":874},{"q":"Which of the following correctly lists the six articles of faith (Iman) in Islam?","o":["Belief in Tawheed, Angels, and Books only","Belief in Allah, Angels, Prophets, and the Quran only","Belief in Allah, Salah, Zakat, Sawm, Hajj, and Jihad","Belief in Allah, Angels, Books, Prophets, the Day of Judgment, and Qadar (divine decree)"],"a":3,"e":"The six articles of faith are belief in Allah, His Angels, His Books, His Messengers, the Day of Judgment, and Qadar (divine predestination).","section":"Islamiyat & Pakistan Affairs","id":875},{"q":"Which region, historically known as 'Jammu and Kashmir', remains a long-standing territorial dispute between Pakistan and India since 1947?","o":["Punjab","Sindh","Balochistan","Kashmir"],"a":3,"e":"The Kashmir dispute, involving competing claims over the former princely state of Jammu and Kashmir, has remained unresolved since the Partition of British India in 1947.","section":"Islamiyat & Pakistan Affairs","id":876},{"q":"Which UN body passed early resolutions calling for a plebiscite to determine the future status of Jammu and Kashmir?","o":["United Nations Security Council","International Court of Justice","United Nations General Assembly","United Nations Human Rights Council"],"a":0,"e":"The UN Security Council passed resolutions, including in 1948 and 1949, calling for a plebiscite in Jammu and Kashmir, which has not been implemented to date.","section":"Islamiyat & Pakistan Affairs","id":877},{"q":"What is the name of the region administered by Pakistan within the broader Kashmir dispute, distinct from Gilgit-Baltistan?","o":["Ladakh","Indian-administered Jammu and Kashmir","Azad Jammu and Kashmir (AJK)","Aksai Chin"],"a":2,"e":"Azad Jammu and Kashmir (AJK) is the self-governing territory administered by Pakistan as part of the larger disputed Kashmir region.","section":"Islamiyat & Pakistan Affairs","id":878},{"q":"India revoked the special constitutional status of Jammu and Kashmir (under its Article 370) in which year?","o":["2015","2019","2017","2020"],"a":1,"e":"In August 2019, India revoked Article 370 of its constitution, which had granted special autonomous status to Jammu and Kashmir, and reorganized the region into union territories.","section":"Islamiyat & Pakistan Affairs","id":879},{"q":"Which mountain range separates the Kashmir Valley from the Pakistani-administered Azad Jammu and Kashmir, forming part of the broader Himalayan system?","o":["Pir Panjal Range","Karakoram Range","Hindu Kush Range","Sulaiman Range"],"a":0,"e":"The Pir Panjal Range forms a key part of the geographical boundary within the wider Kashmir region.","section":"Islamiyat & Pakistan Affairs","id":880},{"q":"Which glacier, a site of prolonged military standoff between India and Pakistan, is often cited as the highest battlefield in the world?","o":["Batura Glacier","Baltoro Glacier","Siachen Glacier","Biafo Glacier"],"a":2,"e":"The Siachen Glacier, in the eastern Karakoram range, has been the site of military confrontation between India and Pakistan since 1984, and is often described as the world's highest battlefield.","section":"Islamiyat & Pakistan Affairs","id":881},{"q":"Pakistan's territory is divided into how many provinces, along with additional federal territories and administrative regions?","o":["Five provinces","Six provinces","Three provinces","Four provinces (Punjab, Sindh, KP, Balochistan), plus Islamabad Capital Territory, AJK, and Gilgit-Baltistan"],"a":3,"e":"Pakistan comprises four provinces—Punjab, Sindh, Khyber Pakhtunkhwa, and Balochistan—along with the Islamabad Capital Territory and the separately administered territories of AJK and Gilgit-Baltistan.","section":"Islamiyat & Pakistan Affairs","id":882},{"q":"Which Pakistani province is the largest by land area, though comparatively less populous than Punjab?","o":["Khyber Pakhtunkhwa","Punjab","Sindh","Balochistan"],"a":3,"e":"Balochistan is Pakistan's largest province by land area, covering nearly 44% of the country's total territory, despite having a relatively smaller population.","section":"Islamiyat & Pakistan Affairs","id":883},{"q":"Which Pakistani province is the most populous, based on the 2023 census figures?","o":["Balochistan","Punjab","Khyber Pakhtunkhwa","Sindh"],"a":1,"e":"Punjab remains Pakistan's most populous province by a significant margin, according to census data.","section":"Islamiyat & Pakistan Affairs","id":884},{"q":"Which river is considered the longest river in Pakistan, flowing through the entire length of the country from north to south?","o":["Ravi River","Indus River","Chenab River","Jhelum River"],"a":1,"e":"The Indus River, Pakistan's principal river, flows from the northern mountains through the length of the country to the Arabian Sea.","section":"Islamiyat & Pakistan Affairs","id":885},{"q":"Which of the following is NOT one of the five rivers traditionally associated with the Punjab region (Land of Five Rivers)?","o":["Indus","Jhelum","Ravi, Sutlej, and Beas complete the five, making Indus itself not part of the traditional 'five rivers of Punjab'","Chenab"],"a":0,"e":"The name 'Punjab' (Five Rivers) traditionally refers to the Jhelum, Chenab, Ravi, Sutlej, and Beas; the Indus, while a major river of Pakistan, is not counted among these five.","section":"Islamiyat & Pakistan Affairs","id":886},{"q":"Which mountain, part of the Karakoram Range, is the second-highest peak in the world and located in Pakistan's Gilgit-Baltistan region?","o":["Broad Peak","Nanga Parbat","K2 (Mount Godwin-Austen)","Gasherbrum I"],"a":2,"e":"K2, standing at 8,611 metres, is the world's second-highest mountain and is located in the Karakoram Range within Pakistan's Gilgit-Baltistan region.","section":"Islamiyat & Pakistan Affairs","id":887},{"q":"Which Pakistani mountain, part of the western Himalayas, is known as the 'Killer Mountain' due to its historically high fatality rate among climbers?","o":["Rakaposhi","Tirich Mir","Nanga Parbat","K2"],"a":2,"e":"Nanga Parbat, the ninth-highest mountain in the world, has earned the nickname 'Killer Mountain' due to the significant number of climbing fatalities associated with it historically.","section":"Islamiyat & Pakistan Affairs","id":888},{"q":"Which is the highest peak located entirely within the Hindu Kush mountain range, situated in Pakistan's Chitral region?","o":["K2","Nanga Parbat","Tirich Mir","Rakaposhi"],"a":2,"e":"Tirich Mir, at 7,708 metres, is the highest peak in the Hindu Kush range and is located in Chitral, Khyber Pakhtunkhwa.","section":"Islamiyat & Pakistan Affairs","id":889},{"q":"Pakistan's currency, the Rupee, is issued and regulated by which institution?","o":["State Bank of Pakistan","Ministry of Finance","National Bank of Pakistan","Federal Board of Revenue"],"a":0,"e":"The State Bank of Pakistan, the country's central bank, is responsible for issuing currency and formulating monetary policy.","section":"Islamiyat & Pakistan Affairs","id":890},{"q":"Which agricultural crop is traditionally referred to as one of Pakistan's major cash crops, especially significant for the textile industry?","o":["Wheat","Rice","Cotton","Sugarcane"],"a":2,"e":"Cotton is one of Pakistan's principal cash crops and forms the backbone of its large textile export industry.","section":"Islamiyat & Pakistan Affairs","id":891},{"q":"Which Pakistani city is historically and culturally significant as the site of the Minar-e-Pakistan, commemorating the Lahore Resolution of 1940?","o":["Islamabad","Lahore","Multan","Karachi"],"a":1,"e":"The Minar-e-Pakistan, located in Lahore's Iqbal Park, commemorates the site where the Lahore Resolution was passed by the All-India Muslim League in March 1940.","section":"Islamiyat & Pakistan Affairs","id":892},{"q":"The Lahore Resolution, a foundational document in the Pakistan Movement, was passed in which year?","o":["1930","1947","1945","1940"],"a":3,"e":"The Lahore Resolution was passed on 23 March 1940 at the All-India Muslim League's annual session, laying the groundwork for the demand for a separate Muslim state.","section":"Islamiyat & Pakistan Affairs","id":893},{"q":"Which poet-philosopher is widely credited with articulating the intellectual vision for a separate Muslim homeland in his 1930 Allahabad Address?","o":["Chaudhry Rahmat Ali","Allama Muhammad Iqbal","Muhammad Ali Jinnah","Liaquat Ali Khan"],"a":1,"e":"Allama Iqbal, in his presidential address at the All-India Muslim League session in Allahabad in 1930, articulated the vision of a separate Muslim state in northwestern India.","section":"Islamiyat & Pakistan Affairs","id":894},{"q":"Who is credited with coining the term 'Pakistan' in his 1933 pamphlet 'Now or Never'?","o":["Muhammad Ali Jinnah","Allama Iqbal","Chaudhry Rahmat Ali","Liaquat Ali Khan"],"a":2,"e":"Chaudhry Rahmat Ali coined the term 'Pakistan' in his 1933 pamphlet, proposing it as the name for a separate Muslim state.","section":"Islamiyat & Pakistan Affairs","id":895},{"q":"Muhammad Ali Jinnah is officially given which title in Pakistan, reflecting his foundational role in the country's creation?","o":["Quaid-e-Azam (Great Leader)","Baba-e-Qaum","Muhtaram Rehbar","Sardar-e-Azam"],"a":0,"e":"Muhammad Ali Jinnah is officially honored with the title 'Quaid-e-Azam', meaning 'Great Leader', in recognition of his central role in Pakistan's creation.","section":"Islamiyat & Pakistan Affairs","id":896},{"q":"Who served as Pakistan's first Prime Minister following independence in 1947?","o":["Liaquat Ali Khan","Muhammad Ali Jinnah","Khawaja Nazimuddin","Chaudhry Muhammad Ali"],"a":0,"e":"Liaquat Ali Khan served as Pakistan's first Prime Minister from 1947 until his assassination in 1951.","section":"Islamiyat & Pakistan Affairs","id":897},{"q":"In which year of the Islamic calendar's historical timeline (Gregorian) was Prophet Muhammad (PBUH) born, according to the widely accepted account?","o":["632 CE","622 CE","610 CE","570 CE"],"a":3,"e":"Prophet Muhammad (PBUH) is widely reported to have been born in the Year of the Elephant, corresponding to approximately 570 CE.","section":"Islamiyat & Pakistan Affairs","id":898},{"q":"In which year did Prophet Muhammad (PBUH) receive his first revelation in the Cave of Hira?","o":["570 CE","610 CE","622 CE","605 CE"],"a":1,"e":"The first revelation occurred in 610 CE, when the Prophet was approximately 40 years old, in the Cave of Hira near Makkah.","section":"Islamiyat & Pakistan Affairs","id":899},{"q":"The migration (Hijrah) of Prophet Muhammad (PBUH) from Makkah to Madinah took place in which year, later marking the start of the Islamic calendar?","o":["610 CE","622 CE","632 CE","630 CE"],"a":1,"e":"The Hijrah occurred in 622 CE and marks the beginning of the Islamic (Hijri) lunar calendar.","section":"Islamiyat & Pakistan Affairs","id":900},{"q":"In which year did the conquest of Makkah (Fath Makkah) take place, allowing Muslims to peacefully reclaim the city?","o":["610 CE","630 CE","624 CE","622 CE"],"a":1,"e":"The Conquest of Makkah occurred in 630 CE (8 AH), achieved largely without bloodshed.","section":"Islamiyat & Pakistan Affairs","id":901},{"q":"Prophet Muhammad (PBUH) passed away in which year, marking the end of the era of direct prophetic guidance?","o":["634 CE","632 CE","640 CE","630 CE"],"a":1,"e":"Prophet Muhammad (PBUH) passed away in 632 CE (11 AH) in Madinah.","section":"Islamiyat & Pakistan Affairs","id":902},{"q":"Who was the first Caliph of Islam following the death of Prophet Muhammad (PBUH)?","o":["Hazrat Uthman (RA)","Hazrat Abu Bakr (RA)","Hazrat Ali (RA)","Hazrat Umar (RA)"],"a":1,"e":"Hazrat Abu Bakr Siddique (RA) was elected as the first Caliph (Khalifa) of the Muslim community after the Prophet's death.","section":"Islamiyat & Pakistan Affairs","id":903},{"q":"Which Caliph is credited with the initial compilation of the Quran into a single manuscript (Mus'haf) following the Battle of Yamama?","o":["Hazrat Uthman (RA)","Hazrat Abu Bakr (RA)","Hazrat Umar (RA)","Hazrat Ali (RA)"],"a":1,"e":"Hazrat Abu Bakr (RA), on the advice of Hazrat Umar (RA), initiated the compilation of the Quran into a single manuscript after many Huffaz were martyred at the Battle of Yamama.","section":"Islamiyat & Pakistan Affairs","id":904},{"q":"Which Caliph standardized the Quranic text into a single official version and distributed copies to major Islamic provinces?","o":["Hazrat Umar (RA)","Hazrat Uthman (RA)","Hazrat Abu Bakr (RA)","Hazrat Ali (RA)"],"a":1,"e":"Hazrat Uthman (RA) standardized the Quranic text into what is known as the 'Uthmanic codex' and sent copies to major cities to ensure uniformity.","section":"Islamiyat & Pakistan Affairs","id":905},{"q":"Which Caliph is known for significant administrative expansion, including the establishment of the Islamic calendar and various governance systems?","o":["Hazrat Abu Bakr (RA)","Hazrat Umar (RA)","Hazrat Uthman (RA)","Hazrat Ali (RA)"],"a":1,"e":"Hazrat Umar ibn al-Khattab (RA), the second Caliph, is credited with major administrative reforms, the establishment of the Hijri calendar, and significant territorial expansion.","section":"Islamiyat & Pakistan Affairs","id":906},{"q":"Who was the fourth and final of the Rightly Guided Caliphs (Khulafa-e-Rashidun)?","o":["Hazrat Ali (RA)","Hazrat Umar (RA)","Hazrat Abu Bakr (RA)","Hazrat Uthman (RA)"],"a":0,"e":"Hazrat Ali ibn Abi Talib (RA) was the fourth Rightly Guided Caliph, cousin and son-in-law of Prophet Muhammad (PBUH).","section":"Islamiyat & Pakistan Affairs","id":907},{"q":"Which term collectively refers to the first four Caliphs of Islam, regarded by Sunni Muslims as rightly guided?","o":["Ahl al-Bayt","Tabi'un","Khulafa-e-Rashidun","Sahaba-e-Kiram"],"a":2,"e":"'Khulafa-e-Rashidun' (Rightly Guided Caliphs) refers to Abu Bakr, Umar, Uthman, and Ali, the first four Caliphs following Prophet Muhammad's death.","section":"Islamiyat & Pakistan Affairs","id":908},{"q":"Which battle, fought in 624 CE, is regarded as the first major military victory for the Muslims against the Quraysh of Makkah?","o":["Battle of Uhud","Battle of Badr","Battle of Khandaq","Battle of Hunayn"],"a":1,"e":"The Battle of Badr (624 CE/2 AH) was the first major military engagement, resulting in a decisive victory for the significantly outnumbered Muslim forces.","section":"Islamiyat & Pakistan Affairs","id":909},{"q":"Which battle, fought in 625 CE, resulted in setbacks for the Muslims partly due to the archers leaving their assigned position?","o":["Battle of Tabuk","Battle of Badr","Battle of Uhud","Battle of Khandaq"],"a":2,"e":"The Battle of Uhud (625 CE/3 AH) saw initial Muslim success followed by setbacks after a group of archers left their post prematurely.","section":"Islamiyat & Pakistan Affairs","id":910},{"q":"Which expedition, led personally by Prophet Muhammad (PBUH) in 630 CE, was aimed at confronting a potential Byzantine threat from the north, though no major battle occurred?","o":["Battle of Hunayn","Conquest of Makkah","Expedition of Tabuk","Battle of Mu'tah"],"a":2,"e":"The Expedition of Tabuk (630 CE/9 AH) was undertaken to address rumors of a Byzantine military threat, though the anticipated confrontation did not materialize.","section":"Islamiyat & Pakistan Affairs","id":911},{"q":"Which battle occurred shortly after the Conquest of Makkah, in which the Muslims initially faced difficulty against the Hawazin tribe before achieving victory?","o":["Battle of Hunayn","Battle of Khandaq","Battle of Badr","Battle of Uhud"],"a":0,"e":"The Battle of Hunayn (630 CE) followed the Conquest of Makkah, where Muslims initially struggled against a surprise attack before ultimately prevailing.","section":"Islamiyat & Pakistan Affairs","id":912},{"q":"Which of the following is a well-known Hadith collection compiled by Imam Malik ibn Anas, considered one of the earliest systematic compilations of Hadith and Islamic law?","o":["Muwatta Imam Malik","Sahih al-Bukhari","Sahih Muslim","Sunan Abu Dawood"],"a":0,"e":"Muwatta Imam Malik, compiled by Imam Malik ibn Anas, is regarded as one of the earliest and most authoritative collections of Hadith combined with legal rulings.","section":"Islamiyat & Pakistan Affairs","id":913},{"q":"Which term describes the specific compilation of rulings and interpretations by a recognized school of Islamic jurisprudence?","o":["Ijma","Tafsir","Madhhab (school of thought)","Aqeedah"],"a":2,"e":"A 'Madhhab' refers to a specific school of Islamic jurisprudence, such as Hanafi, Maliki, Shafi'i, or Hanbali, each with its own methodology and rulings.","section":"Islamiyat & Pakistan Affairs","id":914},{"q":"Which of the following best defines 'Tafsir' in Islamic scholarship?","o":["Islamic jurisprudence rulings","The chain of narrators of a Hadith","The study of Arabic grammar","Exegesis or interpretation of the Quran"],"a":3,"e":"'Tafsir' refers to the scholarly interpretation and explanation of the Quran's meanings and context.","section":"Islamiyat & Pakistan Affairs","id":915},{"q":"Which renowned scholar authored one of the most widely referenced classical Quranic exegeses, 'Tafsir Ibn Kathir'?","o":["Al-Qurtubi","Al-Razi","Al-Tabari","Ibn Kathir"],"a":3,"e":"Ibn Kathir authored 'Tafsir al-Qur'an al-Azim', commonly known as Tafsir Ibn Kathir, one of the most widely referenced classical Quranic commentaries.","section":"Islamiyat & Pakistan Affairs","id":916},{"q":"Which Pakistani Islamic scholar and philosopher is known for founding the Jamaat-e-Islami political and religious organization?","o":["Mufti Muhammad Shafi","Allama Iqbal","Maulana Abul A'la Maududi","Dr. Israr Ahmed"],"a":2,"e":"Maulana Abul A'la Maududi founded Jamaat-e-Islami in 1941 and was a prominent Islamic scholar and political thinker whose works influenced Islamic revivalist movements.","section":"Islamiyat & Pakistan Affairs","id":917},{"q":"Which Pakistani Islamic scholar is known for founding the Tanzeem-e-Islami and for his extensive lectures on the Quran?","o":["Maulana Abul A'la Maududi","Dr. Israr Ahmed","Mufti Muhammad Shafi","Justice Muhammad Taqi Usmani"],"a":1,"e":"Dr. Israr Ahmed founded Tanzeem-e-Islami and was widely known for his detailed Quranic lectures broadcast across Pakistan.","section":"Islamiyat & Pakistan Affairs","id":918},{"q":"Which Pakistani jurist and scholar has served as a prominent authority in Islamic finance, contributing significantly to Shariah-compliant banking principles?","o":["Maulana Maududi","Allama Iqbal","Dr. Israr Ahmed","Justice Muhammad Taqi Usmani"],"a":3,"e":"Justice Muhammad Taqi Usmani is internationally recognized as a leading authority on Islamic finance and Shariah-compliant banking practices.","section":"Islamiyat & Pakistan Affairs","id":919},{"q":"Which of the following describes the Islamic concept of 'Shirk'?","o":["Reciting the Quran","Giving charity to the poor","Performing the five daily prayers","Associating partners with Allah in worship or belief"],"a":3,"e":"'Shirk' refers to the association of partners with Allah, considered the gravest sin in Islam as it violates the core principle of Tawheed.","section":"Islamiyat & Pakistan Affairs","id":920},{"q":"Which of the following best describes the concept of 'Sabr' in Islamic teaching?","o":["Ritual purification before prayer","Patience and perseverance in the face of hardship","The declaration of faith","Generosity in charity"],"a":1,"e":"'Sabr' refers to patience and steadfast perseverance, particularly during trials, hardships, or in fulfilling religious obligations.","section":"Islamiyat & Pakistan Affairs","id":921},{"q":"Which of the following best describes 'Taqwa' in Islamic terminology?","o":["A specific type of charity","God-consciousness and mindfulness of Allah, leading to righteous conduct","The recitation of the Quran in a specific style","The performance of Hajj"],"a":1,"e":"'Taqwa' refers to a state of God-consciousness and piety that guides a believer to avoid sin and act righteously.","section":"Islamiyat & Pakistan Affairs","id":922},{"q":"Which term refers to the pre-Islamic period in Arabia, often characterized as an age of ignorance and moral decline?","o":["Jahiliyyah","Hijrah","Khilafah","Sunnah"],"a":0,"e":"'Jahiliyyah' refers to the state of ignorance in Arabia before the advent of Islam, marked by idolatry and various social ills.","section":"Islamiyat & Pakistan Affairs","id":923},{"q":"Which of the following describes the term 'Sunnah' in Islamic terminology?","o":["A specific chain of narrators","A form of charity","The written text of the Quran","The sayings, actions, and approvals of Prophet Muhammad (PBUH), serving as a model for Muslims"],"a":3,"e":"'Sunnah' refers to the practices, sayings, and tacit approvals of Prophet Muhammad (PBUH), serving as an exemplary model for Muslim conduct.","section":"Islamiyat & Pakistan Affairs","id":924},{"q":"Which of the following describes 'Fard' in the classification of Islamic legal rulings?","o":["A permissible act with no reward or sin","A prohibited act","An obligatory act, the neglect of which is sinful","A recommended but non-obligatory act"],"a":2,"e":"'Fard' refers to an obligatory duty in Islam, such as the five daily prayers, whose omission is considered sinful.","section":"Islamiyat & Pakistan Affairs","id":925},{"q":"Which of the following describes 'Mustahab' (or Sunnah Mu'akkadah in some usages) in Islamic legal classification?","o":["An obligatory act","A strictly forbidden act","A recommended act that is rewarded if performed but not sinful if omitted","A disliked but not forbidden act"],"a":2,"e":"'Mustahab' refers to a recommended, though non-obligatory, act that brings reward when performed but incurs no sin if left undone.","section":"Islamiyat & Pakistan Affairs","id":926},{"q":"Which of the following describes 'Haram' in Islamic legal classification?","o":["An act that is recommended","An act that is merely disliked","An act that is strictly forbidden","An act that is obligatory"],"a":2,"e":"'Haram' refers to acts that are absolutely forbidden in Islam, with severe consequences for engaging in them.","section":"Islamiyat & Pakistan Affairs","id":927},{"q":"Which of the following describes 'Makruh' in Islamic legal classification?","o":["An act that is disliked or discouraged but not strictly forbidden","An act that is obligatory","An act that is recommended","An act that is strictly forbidden"],"a":0,"e":"'Makruh' refers to an act that is discouraged or disliked in Islam, though not to the extent of being strictly prohibited (Haram).","section":"Islamiyat & Pakistan Affairs","id":928},{"q":"Which Pakistani institution is responsible for overseeing Zakat collection and distribution at the national and provincial levels?","o":["Zakat and Ushr Department/Council under relevant federal and provincial administration","Federal Board of Revenue","National Database and Registration Authority","State Bank of Pakistan"],"a":0,"e":"Pakistan's Zakat and Ushr system operates through dedicated federal and provincial councils/departments responsible for collection and disbursement to eligible recipients.","section":"Islamiyat & Pakistan Affairs","id":929},{"q":"Which day of the week holds special religious significance in Islam, marked by the congregational Friday prayer (Jumu'ah)?","o":["Friday","Saturday","Thursday","Sunday"],"a":0,"e":"Friday holds special significance in Islam as the day of congregational Friday prayer (Salat al-Jumu'ah), considered obligatory for adult Muslim men.","section":"Islamiyat & Pakistan Affairs","id":930},{"q":"Which month in the Islamic calendar is considered sacred and is associated with the tragic events of Karbala?","o":["Shawwal","Ramadan","Rajab","Muharram"],"a":3,"e":"Muharram, the first month of the Islamic calendar, is one of the four sacred months and is particularly significant due to the events of Karbala, commemorated especially on the 10th day (Ashura).","section":"Islamiyat & Pakistan Affairs","id":931},{"q":"Which event, commemorated on the 10th of Muharram, holds particular significance across the Muslim world?","o":["The Battle of Badr","The Hijrah","The Conquest of Makkah","The Day of Ashura"],"a":3,"e":"The 10th of Muharram, known as Ashura, holds significance for various reasons across Islamic history, including the tragic martyrdom of Imam Hussain (RA) at Karbala.","section":"Islamiyat & Pakistan Affairs","id":932},{"q":"Which Pakistani province shares its longest international border with Afghanistan?","o":["Sindh","Punjab","Balochistan","Khyber Pakhtunkhwa"],"a":2,"e":"Balochistan shares the longest stretch of Pakistan's border with Afghanistan, running along the Durand Line.","section":"Islamiyat & Pakistan Affairs","id":933},{"q":"The 'Durand Line', a historically contested border, separates Pakistan from which neighboring country?","o":["China","Iran","Afghanistan","India"],"a":2,"e":"The Durand Line, established in 1893 during British colonial rule, forms the border between Pakistan and Afghanistan, and its status remains a subject of historical dispute.","section":"Islamiyat & Pakistan Affairs","id":934},{"q":"Which Pakistani province borders Iran along its southwestern frontier?","o":["Punjab","Sindh","Balochistan","Khyber Pakhtunkhwa"],"a":2,"e":"Balochistan shares Pakistan's border with Iran along its southwestern frontier.","section":"Islamiyat & Pakistan Affairs","id":935},{"q":"Which body of water lies along Pakistan's southern coastline?","o":["Arabian Sea","Persian Gulf","Bay of Bengal","Gulf of Oman only"],"a":0,"e":"Pakistan's southern coastline, spanning Sindh and Balochistan, borders the Arabian Sea.","section":"Islamiyat & Pakistan Affairs","id":936},{"q":"Which Pakistani city is regarded as the financial and commercial capital of the country, despite not being the political capital?","o":["Lahore","Faisalabad","Islamabad","Karachi"],"a":3,"e":"Karachi, Pakistan's largest city, serves as the country's principal financial, commercial, and industrial hub.","section":"Islamiyat & Pakistan Affairs","id":937},{"q":"Which of the following best describes the significance of the 'Two-Nation Theory' in the context of Pakistan's creation?","o":["The idea that Muslims and Hindus constituted two distinct nations, justifying a separate Muslim homeland","A theory about federal versus provincial power distribution","An economic theory about trade relations","A theory related to linguistic diversity alone"],"a":0,"e":"The Two-Nation Theory posited that Muslims and Hindus of the Indian subcontinent were distinct nations with differing religious, cultural, and social practices, forming the ideological basis for Pakistan's demand as a separate homeland.","section":"Islamiyat & Pakistan Affairs","id":938},{"q":"Which Pakistani institution is responsible for regulating Islamic banking and finance practices at the national level?","o":["State Bank of Pakistan (via its Islamic Banking Department)","Securities and Exchange Commission of Pakistan alone","Federal Shariat Court","Council of Islamic Ideology"],"a":0,"e":"The State Bank of Pakistan, through its dedicated Islamic Banking Department, regulates and promotes Shariah-compliant banking practices across the country.","section":"Islamiyat & Pakistan Affairs","id":939},{"q":"Which Pakistani constitutional body is tasked with advising the government on the compatibility of laws with Islamic injunctions?","o":["Federal Shariat Court","Council of Islamic Ideology (CII)","National Assembly Standing Committee on Religious Affairs","Supreme Judicial Council"],"a":1,"e":"The Council of Islamic Ideology is a constitutional advisory body that examines and advises on whether laws conform to Islamic principles.","section":"Islamiyat & Pakistan Affairs","id":940},{"q":"Which Pakistani court has the specific jurisdiction to examine whether laws are repugnant to the injunctions of Islam?","o":["District and Sessions Courts","Supreme Court of Pakistan","High Courts of the provinces","Federal Shariat Court"],"a":3,"e":"The Federal Shariat Court, established under the Constitution, has jurisdiction to examine and decide whether certain laws are repugnant to Islamic injunctions.","section":"Islamiyat & Pakistan Affairs","id":941},{"q":"Which article of the 1973 Constitution of Pakistan declares Islam as the State Religion?","o":["Article 227","Article 25","Article 2","Article 62"],"a":2,"e":"Article 2 of the Constitution of Pakistan explicitly declares Islam as the State Religion.","section":"Islamiyat & Pakistan Affairs","id":942},{"q":"Which article of the Constitution of Pakistan sets out that all existing laws shall be brought into conformity with the injunctions of Islam?","o":["Article 62","Article 227","Article 63","Article 2"],"a":1,"e":"Article 227 mandates that all existing laws be brought into conformity with the injunctions of Islam as laid down in the Quran and Sunnah.","section":"Islamiyat & Pakistan Affairs","id":943},{"q":"Which articles of the Constitution of Pakistan lay down specific eligibility qualifications and disqualifications for membership of Parliament, including moral character clauses?","o":["Articles 62 and 63","Articles 8 and 25","Articles 2 and 227","Articles 175 and 203"],"a":0,"e":"Articles 62 and 63 of the Constitution outline the qualifications and disqualifications for membership of the Parliament, including provisions related to character and integrity.","section":"Islamiyat & Pakistan Affairs","id":944},{"q":"Which fundamental right in the Constitution of Pakistan guarantees equality of all citizens before the law?","o":["Article 19","Article 25","Article 2","Article 9"],"a":1,"e":"Article 25 of the Constitution guarantees that all citizens are equal before the law and are entitled to equal protection of the law.","section":"Islamiyat & Pakistan Affairs","id":945},{"q":"Which article of the Constitution of Pakistan guarantees the right to life and liberty?","o":["Article 19","Article 9","Article 25","Article 14"],"a":1,"e":"Article 9 of the Constitution guarantees that no person shall be deprived of life or liberty except in accordance with law.","section":"Islamiyat & Pakistan Affairs","id":946},{"q":"Which article of the Constitution of Pakistan guarantees freedom of speech and expression?","o":["Article 25","Article 9","Article 20","Article 19"],"a":3,"e":"Article 19 of the Constitution guarantees freedom of speech, subject to reasonable restrictions in the interest of public order and other specified grounds.","section":"Islamiyat & Pakistan Affairs","id":947},{"q":"Which article of the Constitution of Pakistan guarantees freedom to profess, practice, and propagate one's religion?","o":["Article 19","Article 25","Article 9","Article 20"],"a":3,"e":"Article 20 of the Constitution guarantees every citizen the right to profess, practice, and propagate their religion, subject to law, public order, and morality.","section":"Islamiyat & Pakistan Affairs","id":948},{"q":"Which Pakistani legal code, largely inherited from British colonial law, forms the primary basis for criminal law in the country?","o":["Constitution of Pakistan","Pakistan Penal Code (PPC)","Civil Procedure Code","Qanun-e-Shahadat Order"],"a":1,"e":"The Pakistan Penal Code, originally enacted during British rule as the Indian Penal Code, forms the foundational basis of criminal law in Pakistan, later amended to incorporate Islamic provisions.","section":"Islamiyat & Pakistan Affairs","id":949},{"q":"Which law governs the rules of evidence in Pakistani courts, having replaced the earlier Evidence Act to align more closely with Islamic principles?","o":["Pakistan Penal Code","Civil Procedure Code","Qanun-e-Shahadat Order, 1984","Criminal Procedure Code"],"a":2,"e":"The Qanun-e-Shahadat Order, 1984, replaced the earlier Evidence Act, introducing provisions intended to align the law of evidence more closely with Islamic legal principles.","section":"Islamiyat & Pakistan Affairs","id":950},{"q":"Which Islamic legal punishments, involving specific fixed penalties prescribed in the Quran and Sunnah for certain crimes, were incorporated into Pakistani law through various ordinances in the 1970s-1980s?","o":["Zina laws exclusively","Blasphemy laws alone","Hudood Ordinances","Qisas and Diyat laws exclusively"],"a":2,"e":"The Hudood Ordinances, promulgated in 1979 under General Zia-ul-Haq, incorporated Islamic criminal punishments (Hudood) for offenses such as theft, adultery, and false accusation into Pakistani law.","section":"Islamiyat & Pakistan Affairs","id":951},{"q":"Which law, enacted in 1990, deals specifically with the Islamic legal principles of retribution (Qisas) and compensation (Diyat) for bodily harm or murder?","o":["Blasphemy Law","Hudood Ordinances","Zina Ordinance","Qisas and Diyat Ordinance/Act"],"a":3,"e":"The Qisas and Diyat laws, incorporated into Pakistani criminal law, deal with retribution and financial compensation for offenses involving bodily harm or homicide, based on Islamic legal principles.","section":"Islamiyat & Pakistan Affairs","id":952},{"q":"Which women's rights-related law was passed in Pakistan in 2006, significantly amending the earlier Hudood Ordinances relating to rape and adultery?","o":["Muslim Family Laws Ordinance of 1961","Hudood Ordinances of 1979","Protection of Women (Criminal Laws Amendment) Act, 2006","Qisas and Diyat Ordinance"],"a":2,"e":"The Protection of Women Act, 2006, amended significant portions of the Hudood Ordinances, moving offenses like rape from Islamic Hudood provisions to the Pakistan Penal Code and altering evidentiary requirements.","section":"Islamiyat & Pakistan Affairs","id":953},{"q":"Which Pakistani law, enacted in 1961, regulates matters of marriage, divorce, and maintenance among Muslims, including provisions on polygamy and registration of marriages?","o":["Qisas and Diyat Ordinance","Protection of Women Act","Muslim Family Laws Ordinance, 1961","Hudood Ordinances"],"a":2,"e":"The Muslim Family Laws Ordinance, 1961, governs family matters for Muslims in Pakistan, including requirements for registering marriages, restrictions on polygamy, and provisions for maintenance.","section":"Islamiyat & Pakistan Affairs","id":954},{"q":"Which Surah of the Quran is known for containing 'Ayat-ul-Kursi', considered one of the most significant verses regarding Allah's sovereignty?","o":["Al-Imran","Al-Baqarah","Al-Ma'idah","An-Nisa"],"a":1,"e":"Ayat-ul-Kursi (2:255) is found in Surah Al-Baqarah and is widely regarded as one of the most powerful and significant verses in the Quran regarding Allah's dominion and knowledge.","section":"Islamiyat & Pakistan Affairs","id":955},{"q":"Which Surah of the Quran is recited widely for protection and is often referred to as one of the 'Al-Mu'awwidhatayn' (the two chapters of refuge)?","o":["Al-Ikhlas and Al-Kausar","Al-Falaq and An-Nas","Al-Fatiha and Al-Baqarah","Yasin and Ar-Rahman"],"a":1,"e":"Surahs Al-Falaq and An-Nas together are known as 'Al-Mu'awwidhatayn' (the two chapters of seeking refuge), recited for protection against harm.","section":"Islamiyat & Pakistan Affairs","id":956},{"q":"Which Surah of the Quran is often recommended for recitation on Friday, associated with special virtues in Hadith literature?","o":["Yasin","Ar-Rahman","Al-Waqiah","Al-Kahf"],"a":3,"e":"Surah Al-Kahf is traditionally recommended for recitation on Fridays, based on various Hadith emphasizing its spiritual benefits and protection.","section":"Islamiyat & Pakistan Affairs","id":957},{"q":"Which Surah is often referred to as the 'Heart of the Quran' according to certain scholarly traditions?","o":["Al-Fatiha","Al-Baqarah","Yasin","Al-Ikhlas"],"a":2,"e":"Surah Yasin is often referred to as the 'Heart of the Quran' in various scholarly and popular traditions, reflecting its perceived spiritual centrality.","section":"Islamiyat & Pakistan Affairs","id":958},{"q":"How many chapters (Surahs) does the Quran contain in total?","o":["114","112","116","113"],"a":0,"e":"The Quran is traditionally divided into 114 Surahs (chapters) of varying lengths.","section":"Islamiyat & Pakistan Affairs","id":959},{"q":"How many Juz (parts) is the Quran traditionally divided into for the purposes of recitation, especially during Ramadan?","o":["27","28","32","30"],"a":3,"e":"The Quran is traditionally divided into 30 equal parts called Juz, often recited over the 30 days of Ramadan.","section":"Islamiyat & Pakistan Affairs","id":960},{"q":"Which of the following describes the term 'Makki' Surahs in Quranic classification?","o":["Surahs dealing only with legal rulings","Surahs revealed during the Farewell Pilgrimage","Surahs revealed exclusively after the Hijrah","Surahs revealed before the Prophet's migration to Madinah, generally in Makkah"],"a":3,"e":"'Makki' Surahs refer to chapters revealed before the Hijrah (migration to Madinah), typically during the Prophet's time in Makkah, and often focus on faith, monotheism, and the Hereafter.","section":"Islamiyat & Pakistan Affairs","id":961},{"q":"Which of the following describes the term 'Madani' Surahs in Quranic classification?","o":["Surahs revealed exclusively in Makkah","Surahs dealing only with stories of previous prophets","Surahs revealed after the Prophet's migration to Madinah","Surahs revealed only during the early years of Prophethood"],"a":2,"e":"'Madani' Surahs refer to chapters revealed after the Hijrah, generally addressing legal, social, and communal matters relevant to the growing Muslim community in Madinah.","section":"Islamiyat & Pakistan Affairs","id":962},{"q":"Which of the following is considered the longest Surah in the Quran?","o":["Al-Imran","An-Nisa","Al-Baqarah","Al-Ma'idah"],"a":2,"e":"Surah Al-Baqarah, the second chapter of the Quran, is the longest Surah, containing 286 verses.","section":"Islamiyat & Pakistan Affairs","id":963},{"q":"Which of the following is considered the shortest Surah in the Quran?","o":["Al-Asr","An-Nas","Al-Ikhlas","Al-Kausar"],"a":3,"e":"Surah Al-Kausar, with only three verses, is traditionally regarded as the shortest chapter in the Quran.","section":"Islamiyat & Pakistan Affairs","id":964},{"q":"Which Islamic angel is traditionally associated with delivering divine revelation to the prophets, including Prophet Muhammad (PBUH)?","o":["Izraeel","Mikaeel (Michael)","Jibreel (Gabriel)","Israfeel"],"a":2,"e":"Angel Jibreel (Gabriel) is traditionally identified as the angel responsible for delivering divine revelation to the prophets.","section":"Islamiyat & Pakistan Affairs","id":965},{"q":"Which Islamic angel is traditionally associated with blowing the trumpet to signal the Day of Judgment?","o":["Izraeel","Israfeel","Mikaeel","Jibreel"],"a":1,"e":"Angel Israfeel is traditionally associated with blowing the trumpet (Sur) to signal the onset of the Day of Judgment.","section":"Islamiyat & Pakistan Affairs","id":966},{"q":"Which Islamic angel is traditionally associated with the task of taking souls at the time of death?","o":["Jibreel","Israfeel","Mikaeel","Izraeel (Angel of Death)"],"a":3,"e":"Izraeel, commonly referred to as the Angel of Death, is traditionally associated with the task of taking the souls of the deceased.","section":"Islamiyat & Pakistan Affairs","id":967},{"q":"Which Islamic angel is traditionally associated with the provision of sustenance and control of rain and vegetation?","o":["Mikaeel (Michael)","Israfeel","Izraeel","Jibreel"],"a":0,"e":"Angel Mikaeel is traditionally associated with overseeing sustenance, including rain and the growth of vegetation.","section":"Islamiyat & Pakistan Affairs","id":968},{"q":"Which Prophet is mentioned in the Quran as having been swallowed by a large fish/whale after leaving his people in frustration?","o":["Prophet Nuh","Prophet Yunus (Jonah)","Prophet Musa","Prophet Yusuf"],"a":1,"e":"Prophet Yunus (Jonah) is described in the Quran as having been swallowed by a large fish after leaving his community, later repenting and being released.","section":"Islamiyat & Pakistan Affairs","id":969},{"q":"Which Prophet is associated with building the Ark to save believers from a great flood, as described in the Quran?","o":["Prophet Nuh (Noah)","Prophet Ibrahim","Prophet Musa","Prophet Yunus"],"a":0,"e":"Prophet Nuh (Noah) is described in the Quran as building an Ark on divine command to save believers and pairs of animals from a catastrophic flood.","section":"Islamiyat & Pakistan Affairs","id":970},{"q":"Which Prophet is associated with the miraculous parting of the sea while fleeing the Pharaoh's army, as described in the Quran?","o":["Prophet Nuh","Prophet Isa","Prophet Musa (Moses)","Prophet Ibrahim"],"a":2,"e":"Prophet Musa (Moses) is described in the Quran as leading the Israelites across the miraculously parted sea while fleeing Pharaoh's pursuing army.","section":"Islamiyat & Pakistan Affairs","id":971},{"q":"Which Prophet is described in the Quran as being placed into a fire by his people, from which he emerged unharmed by Allah's command?","o":["Prophet Nuh","Prophet Yunus","Prophet Ibrahim (Abraham)","Prophet Musa"],"a":2,"e":"Prophet Ibrahim (Abraham) is described in the Quran as being thrown into a fire by his idol-worshipping people, from which he emerged unharmed through Allah's command for the fire to be 'cool and safe'.","section":"Islamiyat & Pakistan Affairs","id":972},{"q":"Which Prophet is described in the Quran as having been granted the ability to speak while still an infant in the cradle, defending his mother's honor?","o":["Prophet Isa (Jesus)","Prophet Ibrahim","Prophet Musa","Prophet Yahya"],"a":0,"e":"Prophet Isa (Jesus) is described in the Quran as having spoken while still an infant in the cradle, defending his mother Maryam against accusations.","section":"Islamiyat & Pakistan Affairs","id":973},{"q":"Which Pakistani region is known for its distinct Kalash culture and pre-Islamic religious practices, located in Chitral?","o":["Hunza Valley","Neelum Valley","Kalash Valleys","Swat Valley"],"a":2,"e":"The Kalash Valleys in Chitral, Khyber Pakhtunkhwa, are home to the Kalash people, known for their distinct pre-Islamic religious and cultural traditions.","section":"Islamiyat & Pakistan Affairs","id":974},{"q":"Which Pakistani valley, part of Khyber Pakhtunkhwa, was historically referred to as the 'Switzerland of Pakistan' due to its scenic beauty?","o":["Hunza Valley","Kaghan Valley","Neelum Valley","Swat Valley"],"a":3,"e":"Swat Valley has long been referred to as the 'Switzerland of Pakistan' due to its picturesque mountain scenery and lush landscapes.","section":"Islamiyat & Pakistan Affairs","id":975},{"q":"Which valley in Gilgit-Baltistan is renowned for its apricot orchards and views of Rakaposhi peak?","o":["Neelum Valley","Swat Valley","Kaghan Valley","Hunza Valley"],"a":3,"e":"Hunza Valley in Gilgit-Baltistan is famous for its apricot cultivation and stunning views of Rakaposhi and other Karakoram peaks.","section":"Islamiyat & Pakistan Affairs","id":976},{"q":"Which Pakistani valley in Azad Jammu and Kashmir is known for its scenic beauty along the Neelum River?","o":["Kaghan Valley","Neelum Valley","Swat Valley","Hunza Valley"],"a":1,"e":"Neelum Valley, located in Azad Jammu and Kashmir, is renowned for its natural beauty along the Neelum River.","section":"Islamiyat & Pakistan Affairs","id":977},{"q":"Which Pakistani fort, located near Lahore, is a UNESCO World Heritage Site reflecting Mughal architectural grandeur?","o":["Attock Fort","Lahore Fort","Rohtas Fort","Bala Hisar Fort"],"a":1,"e":"Lahore Fort, a UNESCO World Heritage Site, showcases significant Mughal-era architecture and historical importance.","section":"Islamiyat & Pakistan Affairs","id":978},{"q":"Which Pakistani fort, located in Jhelum district, was built by Sher Shah Suri and is also recognized as a UNESCO World Heritage Site?","o":["Rohtas Fort","Attock Fort","Bala Hisar Fort","Lahore Fort"],"a":0,"e":"Rohtas Fort, built by Sher Shah Suri in the 16th century, is a UNESCO World Heritage Site located in Jhelum district, Punjab.","section":"Islamiyat & Pakistan Affairs","id":979},{"q":"Which historic fort, located in Peshawar, has served various roles including a royal residence and now houses a museum?","o":["Rohtas Fort","Lahore Fort","Attock Fort","Bala Hisar Fort"],"a":3,"e":"Bala Hisar Fort in Peshawar has a long history as a royal residence and military garrison, now also serving as a museum.","section":"Islamiyat & Pakistan Affairs","id":980},{"q":"Which ancient archaeological site in Sindh, dating back to the Indus Valley Civilization, is one of the earliest major urban settlements in South Asia?","o":["Harappa","Mehrgarh","Taxila","Mohenjo-daro"],"a":3,"e":"Mohenjo-daro, located in Sindh, is one of the largest and best-preserved urban settlements of the ancient Indus Valley Civilization.","section":"Islamiyat & Pakistan Affairs","id":981},{"q":"Which ancient archaeological site in Punjab, along with Mohenjo-daro, represents one of the principal urban centers of the Indus Valley Civilization?","o":["Charsadda","Harappa","Taxila","Mehrgarh"],"a":1,"e":"Harappa, located in Punjab, is another major urban center of the Indus Valley Civilization, giving its name to the broader Harappan culture.","section":"Islamiyat & Pakistan Affairs","id":982},{"q":"Which ancient site in Khyber Pakhtunkhwa is renowned as a significant center of Gandhara Buddhist civilization and learning?","o":["Taxila","Mohenjo-daro","Harappa","Mehrgarh"],"a":0,"e":"Taxila, a UNESCO World Heritage Site, was a significant center of learning and Buddhist civilization during the Gandhara period.","section":"Islamiyat & Pakistan Affairs","id":983},{"q":"Which archaeological site in Balochistan is considered one of the earliest known farming settlements in South Asia, dating back thousands of years before the Indus Valley Civilization?","o":["Mohenjo-daro","Mehrgarh","Taxila","Harappa"],"a":1,"e":"Mehrgarh, located in Balochistan, is considered one of the earliest known sites of farming and animal husbandry in South Asia, predating the mature Indus Valley Civilization.","section":"Islamiyat & Pakistan Affairs","id":984},{"q":"Which Pakistani Sufi shrine, located in Lahore, is dedicated to the 11th-century saint Ali Hujwiri, also known as Data Ganj Bakhsh?","o":["Shah Jamal Shrine","Baba Farid Shrine","Data Darbar","Bari Imam Shrine"],"a":2,"e":"Data Darbar in Lahore is one of the most significant Sufi shrines in South Asia, dedicated to Hazrat Ali Hujwiri (Data Ganj Bakhsh).","section":"Islamiyat & Pakistan Affairs","id":985},{"q":"Which Sufi saint, buried in Pakpattan, Punjab, is a revered figure in the Chishti Sufi order and a spiritual predecessor to several later saints?","o":["Shah Abdul Latif Bhittai","Ali Hujwiri","Lal Shahbaz Qalandar","Baba Farid (Fariduddin Ganjshakar)"],"a":3,"e":"Baba Farid, buried in Pakpattan, was a prominent Chishti Sufi saint whose teachings significantly influenced the broader Sufi tradition in the subcontinent.","section":"Islamiyat & Pakistan Affairs","id":986},{"q":"Which Sufi shrine, located in Sehwan Sharif, Sindh, is dedicated to the saint Lal Shahbaz Qalandar, known for its distinctive dhamaal ritual?","o":["Shah Rukn-e-Alam Shrine","Bari Imam Shrine","Lal Shahbaz Qalandar Shrine","Data Darbar"],"a":2,"e":"The shrine of Lal Shahbaz Qalandar in Sehwan Sharif, Sindh, is renowned for its vibrant devotional practices, including the ritual dance known as dhamaal.","section":"Islamiyat & Pakistan Affairs","id":987},{"q":"Which prominent Sufi poet and saint of Sindh is renowned for his mystical poetry compiled in the 'Shah Jo Risalo'?","o":["Shah Abdul Latif Bhittai","Lal Shahbaz Qalandar","Baba Farid","Sachal Sarmast"],"a":0,"e":"Shah Abdul Latif Bhittai, a celebrated Sindhi Sufi poet, is best known for his mystical verses compiled in the 'Shah Jo Risalo'.","section":"Islamiyat & Pakistan Affairs","id":988},{"q":"Which Pakistani Sufi poet, associat
