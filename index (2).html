wledge","id":571},{"q":"What is the primary function of a 'linter' tool in software development?","o":["Encrypting source code files","Compiling source code into an executable","Analyzing source code to flag programming errors, bugs, and stylistic issues","Managing version control branches"],"a":2,"e":"A linter analyzes source code to detect potential errors, bugs, stylistic inconsistencies, and suspicious constructs without executing the program.","section":"Computer Related Knowledge","id":572},{"q":"Which of the following best describes 'unit testing' in software development?","o":["Testing an entire application's performance under heavy load","Testing software exclusively on a production server","Testing individual components or functions of software in isolation to verify correctness","Testing software solely through manual, non-automated methods"],"a":2,"e":"Unit testing involves testing individual components or functions in isolation to verify that each performs as expected.","section":"Computer Related Knowledge","id":573},{"q":"Which of the following best describes 'integration testing'?","o":["Testing software exclusively for security vulnerabilities","Testing only the user interface design","Testing how different modules or services work together as a combined system","Testing individual functions in isolation only"],"a":2,"e":"Integration testing verifies that different modules or services function correctly when combined, checking for interface and interaction issues.","section":"Computer Related Knowledge","id":574},{"q":"Which of the following best describes 'regression testing'?","o":["Re-running previously passed tests after code changes to ensure existing functionality still works correctly","Testing only the visual design elements","Testing performance under high traffic conditions","Testing new features exclusively without checking prior functionality"],"a":0,"e":"Regression testing ensures that new code changes have not adversely affected existing functionality that previously worked correctly.","section":"Computer Related Knowledge","id":575},{"q":"What is the primary purpose of 'load testing' in software quality assurance?","o":["Verifying database schema design only","Testing individual code functions in isolation","Checking for spelling errors in the user interface","Evaluating how a system performs under expected and peak user loads"],"a":3,"e":"Load testing evaluates how a system behaves under expected and peak levels of user traffic or data processing demand.","section":"Computer Related Knowledge","id":576},{"q":"Which of the following best describes a 'race condition' in concurrent programming?","o":["A method for optimizing code execution speed","A flaw where the system's behavior depends on the unpredictable timing or interleaving of multiple threads or processes","A network security vulnerability related to DDoS attacks","A type of database indexing strategy"],"a":1,"e":"A race condition occurs when the behavior of software depends on the relative timing of events, such as thread execution order, leading to unpredictable results.","section":"Computer Related Knowledge","id":577},{"q":"Which synchronization mechanism is commonly used in concurrent programming to prevent multiple threads from accessing a shared resource simultaneously?","o":["Load balancer","Mutex (Mutual Exclusion Lock)","Garbage collector","Compiler optimization flag"],"a":1,"e":"A mutex is a synchronization primitive that ensures only one thread can access a critical section or shared resource at a time, preventing race conditions.","section":"Computer Related Knowledge","id":578},{"q":"What is 'garbage collection' in the context of programming languages like Java or Python?","o":["A method of compressing source code files","An automatic memory management process that reclaims memory occupied by objects no longer in use","A network security feature","A manual process for deleting unused files from a hard drive"],"a":1,"e":"Garbage collection automatically identifies and frees memory occupied by objects that are no longer referenced or needed by a running program.","section":"Computer Related Knowledge","id":579},{"q":"Which of the following best describes 'memory leak' in software development?","o":["A deliberate technique to optimize memory usage","A type of network security vulnerability only","A method of compressing large files","A situation where a program fails to release memory that is no longer needed, gradually consuming more resources"],"a":3,"e":"A memory leak occurs when a program does not properly release memory it no longer needs, potentially leading to performance degradation or crashes over time.","section":"Computer Related Knowledge","id":580},{"q":"Which of the following best defines 'polymorphism' with a practical example in object-oriented programming?","o":["Encrypting class attributes for security","A single interface (e.g., a 'draw' method) can be implemented differently by different classes like Circle and Square","Compiling multiple classes into a single executable file","Creating multiple unrelated classes with identical, non-overridable method names"],"a":1,"e":"Polymorphism allows a common interface, such as a 'draw' method, to be implemented differently across various classes (e.g., Circle, Square), each providing their own specific behavior.","section":"Computer Related Knowledge","id":581},{"q":"Which design pattern ensures a class has only one instance and provides a global point of access to it?","o":["Singleton Pattern","Factory Pattern","Strategy Pattern","Observer Pattern"],"a":0,"e":"The Singleton design pattern restricts a class to a single instance and provides a centralized, global access point to that instance.","section":"Computer Related Knowledge","id":582},{"q":"Which design pattern defines a one-to-many dependency so that when one object changes state, all its dependents are automatically notified?","o":["Singleton Pattern","Observer Pattern","Factory Pattern","Adapter Pattern"],"a":1,"e":"The Observer pattern establishes a one-to-many relationship where dependent objects (observers) are automatically notified of state changes in the observed subject.","section":"Computer Related Knowledge","id":583},{"q":"Which design pattern provides an interface for creating objects without specifying their exact concrete class?","o":["Observer Pattern","Singleton Pattern","Decorator Pattern","Factory Pattern"],"a":3,"e":"The Factory design pattern provides a way to create objects without exposing the exact instantiation logic or concrete class to the client.","section":"Computer Related Knowledge","id":584},{"q":"What does the term 'abstraction' mean in object-oriented programming?","o":["Hiding complex implementation details and exposing only the essential features of an object","Combining multiple unrelated classes into a single file","Encrypting data within an object","Compiling code into machine language"],"a":0,"e":"Abstraction involves hiding the complex internal implementation details of an object while exposing only the necessary and relevant features to the user.","section":"Computer Related Knowledge","id":585},{"q":"Which of the following best describes 'method overloading' in object-oriented programming?","o":["Deleting a method from a class entirely","Defining multiple methods with the same name but different parameter lists within the same class","Overriding a parent class's method in a subclass","Combining two classes into one"],"a":1,"e":"Method overloading allows multiple methods with the same name to coexist within a class, differentiated by their parameter types or counts.","section":"Computer Related Knowledge","id":586},{"q":"Which of the following best describes 'method overriding' in object-oriented programming?","o":["Deleting a method entirely from the codebase","Redefining a method in a subclass that already exists in its parent class, with the same signature","Combining unrelated classes into a single module","Defining multiple methods with the same name but different parameters"],"a":1,"e":"Method overriding allows a subclass to provide a specific implementation of a method already defined in its parent class, using the same method signature.","section":"Computer Related Knowledge","id":587},{"q":"Which of the following best describes 'binary search tree traversal' method known as 'in-order traversal'?","o":["Visiting left subtree, then root, then right subtree, producing sorted output for a BST","Visiting left subtree, then right subtree, then root","Visiting root, then left subtree, then right subtree","Visiting nodes randomly without a fixed pattern"],"a":0,"e":"In-order traversal visits the left subtree, then the current node, then the right subtree, which produces values in sorted order for a binary search tree.","section":"Computer Related Knowledge","id":588},{"q":"Which traversal method visits the root node first, followed by the left subtree, then the right subtree?","o":["Level-order traversal","Pre-order traversal","Post-order traversal","In-order traversal"],"a":1,"e":"Pre-order traversal visits the root first, followed by the left subtree and then the right subtree.","section":"Computer Related Knowledge","id":589},{"q":"Which traversal method visits the left subtree, then the right subtree, and finally the root node?","o":["In-order traversal","Post-order traversal","Level-order traversal","Pre-order traversal"],"a":1,"e":"Post-order traversal visits the left subtree, then the right subtree, and finally the root node.","section":"Computer Related Knowledge","id":590},{"q":"Which graph traversal algorithm explores as far as possible along each branch before backtracking?","o":["Breadth-First Search (BFS)","A* Search Algorithm","Dijkstra's Algorithm","Depth-First Search (DFS)"],"a":3,"e":"Depth-First Search (DFS) explores a graph by going as deep as possible along each branch before backtracking to explore other paths.","section":"Computer Related Knowledge","id":591},{"q":"Which graph traversal algorithm explores all neighbors at the current depth before moving to nodes at the next depth level?","o":["Depth-First Search (DFS)","Kruskal's Algorithm","Breadth-First Search (BFS)","Bellman-Ford Algorithm"],"a":2,"e":"Breadth-First Search (BFS) explores all neighboring nodes at the current depth before proceeding to nodes at the next depth level.","section":"Computer Related Knowledge","id":592},{"q":"Which algorithm is commonly used to find the shortest path between nodes in a weighted graph with non-negative edge weights?","o":["Bubble Sort","Dijkstra's Algorithm","Merge Sort","Binary Search"],"a":1,"e":"Dijkstra's Algorithm is a widely used method for finding the shortest paths between nodes in a graph with non-negative edge weights.","section":"Computer Related Knowledge","id":593},{"q":"Which data structure is typically used to implement a priority queue efficiently?","o":["Heap","Simple array without ordering","Basic queue (FIFO) structure","Linked list without ordering"],"a":0,"e":"A heap (typically a binary heap) is commonly used to implement priority queues efficiently, allowing quick access to the highest or lowest priority element.","section":"Computer Related Knowledge","id":594},{"q":"Which type of heap ensures that the value of each parent node is greater than or equal to the values of its children?","o":["Balanced Binary Search Tree","Trie","Min-Heap","Max-Heap"],"a":3,"e":"In a Max-Heap, each parent node's value is greater than or equal to its children's values, ensuring the maximum element is always at the root.","section":"Computer Related Knowledge","id":595},{"q":"Which type of heap ensures that the value of each parent node is less than or equal to the values of its children?","o":["B-Tree specifically","Max-Heap","Min-Heap","AVL Tree specifically"],"a":2,"e":"In a Min-Heap, each parent node's value is less than or equal to its children's values, ensuring the minimum element is always at the root.","section":"Computer Related Knowledge","id":596},{"q":"Which data structure, often used in autocomplete and dictionary implementations, stores strings by sharing common prefixes among nodes?","o":["Hash Table","Queue","Stack","Trie"],"a":3,"e":"A Trie (prefix tree) stores strings by sharing common prefixes across branches, making it efficient for tasks like autocomplete and dictionary lookups.","section":"Computer Related Knowledge","id":597},{"q":"Which algorithmic technique solves complex problems by breaking them down into simpler overlapping subproblems and storing their solutions?","o":["Divide and Conquer (without overlap consideration)","Brute Force","Dynamic Programming","Greedy Algorithm"],"a":2,"e":"Dynamic programming solves problems by breaking them into overlapping subproblems, storing (memoizing) their solutions to avoid redundant computation.","section":"Computer Related Knowledge","id":598},{"q":"Which algorithmic strategy makes the locally optimal choice at each step, hoping to find a global optimum?","o":["Dynamic Programming","Backtracking","Randomized Algorithm","Greedy Algorithm"],"a":3,"e":"A Greedy Algorithm builds a solution piece by piece, always choosing the option that seems best at the current step, without reconsidering previous choices.","section":"Computer Related Knowledge","id":599},{"q":"Which sorting algorithm builds the final sorted array one item at a time by repeatedly inserting elements into their correct position?","o":["Merge Sort","Selection Sort","Quick Sort","Insertion Sort"],"a":3,"e":"Insertion Sort builds the sorted array incrementally, taking each new element and inserting it into its correct position among the already-sorted elements.","section":"Computer Related Knowledge","id":600},{"q":"Which sorting algorithm repeatedly selects the smallest (or largest) element from the unsorted portion and moves it to the sorted portion?","o":["Selection Sort","Merge Sort","Bubble Sort","Insertion Sort"],"a":0,"e":"Selection Sort repeatedly selects the minimum (or maximum) element from the unsorted portion of the array and places it at the beginning of the sorted portion.","section":"Computer Related Knowledge","id":601},{"q":"Which of the following best describes 'quantum computing', an emerging computing paradigm?","o":["A method for compressing large video files","A type of cloud storage architecture","A faster version of classical binary computing using only 0s and 1s","A computing model that uses quantum bits (qubits) capable of representing multiple states simultaneously via superposition"],"a":3,"e":"Quantum computing leverages principles like superposition and entanglement, using qubits that can represent multiple states simultaneously, unlike classical bits restricted to 0 or 1.","section":"Computer Related Knowledge","id":602},{"q":"Which of the following best describes 'blockchain' technology?","o":["A method of compressing large files for storage","A distributed, immutable ledger system that records transactions across multiple computers","A centralized database controlled by a single authority","A type of antivirus software"],"a":1,"e":"Blockchain is a decentralized, distributed ledger technology that records transactions across a network of computers, designed to be resistant to modification.","section":"Computer Related Knowledge","id":603},{"q":"Which cryptocurrency is widely regarded as the first and most well-known application of blockchain technology?","o":["Bitcoin","Litecoin","Ethereum","Ripple"],"a":0,"e":"Bitcoin, introduced in 2009 by the pseudonymous Satoshi Nakamoto, was the first and remains the most well-known application of blockchain technology.","section":"Computer Related Knowledge","id":604},{"q":"Which of the following best describes 'smart contracts' in blockchain technology?","o":["Legal documents requiring manual verification by lawyers","Physical contracts stored digitally without automation","A type of encrypted email service","Self-executing contracts with terms directly written into code, automatically enforced on the blockchain"],"a":3,"e":"Smart contracts are self-executing agreements with terms directly encoded into a blockchain, automatically enforcing and executing conditions without intermediaries.","section":"Computer Related Knowledge","id":605},{"q":"A shopkeeper marks up an item by 40% above cost price, then offers a 25% discount on the marked price. What is his overall profit or loss percentage?","o":["10% profit","15% profit","No profit no loss","5% profit"],"a":3,"e":"Let CP=100. Marked price=140. After a 25% discount: 140 x 0.75 = 105. Profit = 105-100 = 5, i.e. a 5% profit overall.","section":"Arithmetical & Analytical Reasoning","id":606},{"q":"A sum of Rs. 12,000 is invested at compound interest of 10% per annum, compounded annually, for 3 years. Find the compound interest earned.","o":["Rs. 4,200","Rs. 3,972","Rs. 3,600","Rs. 3,000"],"a":1,"e":"Amount = 12000 x (1.10)^3 = 12000 x 1.331 = 15,972. CI = 15972-12000 = Rs. 3,972.","section":"Arithmetical & Analytical Reasoning","id":607},{"q":"Two trains, 150m and 180m long, run in opposite directions at 54 km/h and 36 km/h respectively. Find the time taken to cross each other.","o":["13.2 seconds","11 seconds","12 seconds","10 seconds"],"a":0,"e":"Relative speed = 54+36=90 km/h = 25 m/s. Total length=150+180=330m. Time=330/25=13.2 seconds.","section":"Arithmetical & Analytical Reasoning","id":608},{"q":"A boat's speed in still water is 12 km/h and the speed of the stream is 3 km/h. Find the time taken to travel 45 km downstream.","o":["3 hours","3.5 hours","4 hours","2.5 hours"],"a":0,"e":"Downstream speed = 12+3=15 km/h. Time = 45/15 = 3 hours.","section":"Arithmetical & Analytical Reasoning","id":609},{"q":"A and B together can complete a task in 12 days. A alone can complete it in 20 days. In how many days can B alone complete the task?","o":["35 days","25 days","30 days","28 days"],"a":2,"e":"Combined rate=1/12. A's rate=1/20. B's rate=1/12-1/20=(5-3)/60=2/60=1/30. B alone takes 30 days.","section":"Arithmetical & Analytical Reasoning","id":610},{"q":"The average age of a group of 8 people is 25 years. If a new person aged 34 joins the group, what is the new average age?","o":["27 years","26 years","28 years","26.5 years"],"a":1,"e":"Total age of 8 people=200. New total=200+34=234. New average=234/9=26 years.","section":"Arithmetical & Analytical Reasoning","id":611},{"q":"The average marks of 30 students in a class is 68. If the top 5 students' average is excluded, the average of the remaining 25 students becomes 65. Find the average marks of the top 5 students.","o":["86","85","83","84"],"a":2,"e":"Total for 30 students=2040. Total for 25 students=1625. Total for top 5=2040-1625=415. Average=415/5=83.","section":"Arithmetical & Analytical Reasoning","id":612},{"q":"A sum of money at simple interest amounts to Rs. 1,220 in 2 years and to Rs. 1,300 in 3 years. Find the principal sum.","o":["Rs. 950","Rs. 1,100","Rs. 1,060","Rs. 1,000"],"a":2,"e":"SI for 1 year = 1300-1220=80. SI for 2 years=160. Principal=1220-160=1060.","section":"Arithmetical & Analytical Reasoning","id":613},{"q":"A sum of money doubles itself in 5 years on simple interest. In how many years will it become four times itself?","o":["12 years","20 years","10 years","15 years"],"a":3,"e":"If sum doubles in 5 years, SI equals principal in 5 years, so rate=100/5=20%. To become 4 times, SI needed=3xP. Time=3P/(P x 0.20)=15 years.","section":"Arithmetical & Analytical Reasoning","id":614},{"q":"The ratio of the ages of A and B is 4:5. Eight years from now, the ratio will become 6:7. Find A's current age.","o":["24 years","20 years","16 years","12 years"],"a":2,"e":"Let ages be 4x and 5x. (4x+8)/(5x+8)=6/7. Cross multiply: 7(4x+8)=6(5x+8) => 28x+56=30x+48 => 2x=8 => x=4. A's age=4x=16.","section":"Arithmetical & Analytical Reasoning","id":615},{"q":"A can complete a piece of work in 15 days and B can complete it in 10 days. They work together for 3 days, after which A leaves. In how many more days will B alone finish the remaining work?","o":["5 days","3 days","4 days","6 days"],"a":0,"e":"Combined rate for 3 days = 3x(1/15+1/10)=3x(2/30+3/30)=3x5/30=1/2. Remaining work=1/2. B's rate=1/10. Time=（1/2)/(1/10)=5 days.","section":"Arithmetical & Analytical Reasoning","id":616},{"q":"A vessel contains a mixture of milk and water in the ratio 5:2, totalling 63 litres. If 28 litres of the mixture is removed and replaced with pure water, find the new quantity of milk in the vessel.","o":["25 litres","27 litres","23 litres","30 litres"],"a":0,"e":"Initial milk = (5/7)x63=45 litres. Fraction of mixture remaining after removal = (63-28)/63=35/63=5/9. Remaining milk = 45 x 5/9 = 25 litres.","section":"Arithmetical & Analytical Reasoning","id":617},{"q":"The compound interest on a sum for 2 years at 12% per annum is Rs. 2,544. Find the sum.","o":["Rs. 9,800","Rs. 11,000","Rs. 10,000","Rs. 10,500"],"a":2,"e":"CI factor for 2 years at 12% = (1.12)^2-1=0.2544. Sum=2544/0.2544=Rs. 10,000.","section":"Arithmetical & Analytical Reasoning","id":618},{"q":"A car depreciates at 10% per annum on a reducing balance basis. If its current value is Rs. 5,00,000, what will its value be after 2 years?","o":["Rs. 4,05,000","Rs. 4,10,000","Rs. 4,00,000","Rs. 3,95,000"],"a":0,"e":"Value after 2 years = 500000 x (0.9)^2 = 500000 x 0.81 = Rs. 4,05,000.","section":"Arithmetical & Analytical Reasoning","id":619},{"q":"If the length of a rectangle is increased by 20% and the width is decreased by 20%, what is the net percentage change in area?","o":["4% decrease","4% increase","No change","2% decrease"],"a":0,"e":"New area factor = 1.20 x 0.80 = 0.96, representing a 4% decrease in area.","section":"Arithmetical & Analytical Reasoning","id":620},{"q":"The perimeter of a rectangular field is 300m and its length is twice its width. Find the area of the field.","o":["5000 sq m","4800 sq m","5200 sq m","4500 sq m"],"a":0,"e":"Let width=x, length=2x. Perimeter=2(x+2x)=6x=300, so x=50. Length=100, width=50. Area=100x50=5000 sq m.","section":"Arithmetical & Analytical Reasoning","id":621},{"q":"A cylindrical tank has a radius of 7m and height of 10m. Find its volume. (Use pi = 22/7)","o":["1650 cubic meters","1500 cubic meters","1540 cubic meters","1400 cubic meters"],"a":2,"e":"Volume = pi x r^2 x h = (22/7) x 49 x 10 = 22 x 7 x 10 = 1540 cubic meters.","section":"Arithmetical & Analytical Reasoning","id":622},{"q":"The sum of the interior angles of a hexagon is how many degrees?","o":["900","720","1080","540"],"a":1,"e":"Sum of interior angles of a polygon = (n-2) x 180. For a hexagon (n=6): (6-2)x180=720 degrees.","section":"Arithmetical & Analytical Reasoning","id":623},{"q":"Find the probability of getting a sum of 9 when two fair dice are rolled together.","o":["1/9","1/12","1/6","1/8"],"a":0,"e":"Sum of 9 can occur as (3,6),(4,5),(5,4),(6,3) = 4 favorable outcomes out of 36 total outcomes = 4/36 = 1/9.","section":"Arithmetical & Analytical Reasoning","id":624},{"q":"From a pack of 52 playing cards, one card is drawn at random. Find the probability that it is either a king or a queen.","o":["1/13","2/13","1/26","4/13"],"a":1,"e":"There are 4 kings and 4 queens, totaling 8 favorable cards out of 52. Probability = 8/52 = 2/13.","section":"Arithmetical & Analytical Reasoning","id":625},{"q":"In how many ways can 5 different books be arranged on a shelf?","o":["60","150","120","100"],"a":2,"e":"The number of arrangements of 5 distinct items = 5! = 120.","section":"Arithmetical & Analytical Reasoning","id":626},{"q":"In how many ways can a committee of 3 be selected from a group of 8 people?","o":["56","48","42","64"],"a":0,"e":"Number of combinations = 8C3 = 8!/(3!x5!) = (8x7x6)/(3x2x1) = 56.","section":"Arithmetical & Analytical Reasoning","id":627},{"q":"If the average of five consecutive odd numbers is 61, find the largest number.","o":["67","63","65","69"],"a":2,"e":"Let the numbers be x-4,x-2,x,x+2,x+4. Average=x=61. Largest number=x+4=65.","section":"Arithmetical & Analytical Reasoning","id":628},{"q":"A man invests Rs. 8,000 at 10% simple interest and Rs. 12,000 at 8% simple interest. Find his total interest earned after 2 years.","o":["Rs. 3,200","Rs. 3,600","Rs. 3,520","Rs. 3,400"],"a":2,"e":"SI1 = 8000x10x2/100=1600. SI2=12000x8x2/100=1920. Total=1600+1920=Rs. 3,520.","section":"Arithmetical & Analytical Reasoning","id":629},{"q":"A shopkeeper allows a 10% discount on the marked price of an item and still makes a profit of 8%. If the cost price is Rs. 500, find the marked price.","o":["Rs. 600","Rs. 580","Rs. 590","Rs. 620"],"a":0,"e":"Selling price=CP x 1.08=540. Marked price x 0.90 = 540, so marked price=540/0.90=Rs. 600.","section":"Arithmetical & Analytical Reasoning","id":630},{"q":"A alone can complete a task in 8 days, and B is 60% as efficient as A. In how many days can B alone complete the task?","o":["10 days","14 days","12 days","13.33 days"],"a":3,"e":"A's rate=1/8 per day. B's rate=0.60 x (1/8) = 0.075 per day = 3/40. Time=40/3=13.33 days.","section":"Arithmetical & Analytical Reasoning","id":631},{"q":"The population of a town increases by 10% in the first year and decreases by 10% in the second year. If the initial population was 20,000, find the population after 2 years.","o":["20,000","19,800","19,900","19,600"],"a":1,"e":"Population after year 1 = 20000x1.10=22000. After year 2=22000x0.90=19,800.","section":"Arithmetical & Analytical Reasoning","id":632},{"q":"A sum was divided among A, B, and C in the ratio 2:3:5. If C received Rs. 3,000 more than A, find the total sum.","o":["Rs. 8,000","Rs. 7,500","Rs. 10,000","Rs. 9,000"],"a":2,"e":"Let shares be 2x,3x,5x. C-A=5x-2x=3x=3000, so x=1000. Total=10x=Rs. 10,000.","section":"Arithmetical & Analytical Reasoning","id":633},{"q":"A train travels the first half of a journey at 40 km/h and the second half at 60 km/h. Find the average speed for the entire journey.","o":["48 km/h","52 km/h","50 km/h","45 km/h"],"a":0,"e":"For equal distances at two speeds, average speed = 2ab/(a+b) = 2x40x60/(40+60) = 4800/100 = 48 km/h.","section":"Arithmetical & Analytical Reasoning","id":634},{"q":"If 6 men and 8 boys can complete a piece of work in 10 days, and 26 men and 48 boys can complete the same work in 2 days, find how many days 15 men alone would take to complete the work, given a man's efficiency compared to a boy's.","o":["24 days","40 days","30 days","36 days"],"a":2,"e":"Using the work-rate equations from the two given scenarios and solving for individual man and boy efficiency rates leads to 15 men alone completing the work in 30 days.","section":"Arithmetical & Analytical Reasoning","id":635},{"q":"Five friends P, Q, R, S, and T are sitting in a row. P is to the immediate right of Q. R is at one of the ends. S is between R and T. If Q is second from the left, which of the following must be true?","o":["T is at the right end","P is at the right end","It cannot be determined without further information about which end R occupies","R is at the left end"],"a":2,"e":"Multiple valid seating arrangements satisfy the given constraints depending on which end R is on, so the exact position of each remaining person cannot be uniquely determined from the given clues alone.","section":"Arithmetical & Analytical Reasoning","id":636},{"q":"In a certain code, 'TRAIN' is written as 'UQBHO'. What pattern is being applied?","o":["Each letter alternately shifts +1 and -1 in the alphabet","The word is simply reversed","Each letter shifts backward by 1","Each letter shifts forward by 1"],"a":0,"e":"T->U(+1), R->Q(-1), A->B(+1), I->H(-1), N->O(+1): the pattern alternates shifting each letter forward and backward by one position.","section":"Arithmetical & Analytical Reasoning","id":637},{"q":"If in a certain language, 'BOOK' is coded as 'CPPL' and 'PAGE' is coded as 'QBHF', how would 'READ' be coded?","o":["SFBE","SFEB","RFBE","SEBF"],"a":0,"e":"Each letter is shifted forward by exactly 1 in the alphabet: R->S, E->F, A->B, D->E, giving SFBE.","section":"Arithmetical & Analytical Reasoning","id":638},{"q":"A is the son of B. C is the mother of A. D is the brother of C. How is D related to A?","o":["Brother","Father","Grandfather","Uncle"],"a":3,"e":"D is C's brother, and C is A's mother, making D the maternal uncle of A.","section":"Arithmetical & Analytical Reasoning","id":639},{"q":"P is the father of Q. Q is the sister of R. R is the son of S. How is S related to P?","o":["S is P's wife","S is P's sister","S is P's daughter","S is P's mother"],"a":0,"e":"Since P is the father of Q and R (both children of S based on the relationships given), S must be P's wife, the mother of their children.","section":"Arithmetical & Analytical Reasoning","id":640},{"q":"In a family, A and B are married. C is the son of A. D is the daughter of B. If C and D have the same parents, how is D related to A?","o":["Daughter","Sister","Cousin","Niece"],"a":0,"e":"Since A and B are married and both C and D share the same parents (A and B), D is A's daughter.","section":"Arithmetical & Analytical Reasoning","id":641},{"q":"If Monday falls on the 3rd of a month, what day of the week will fall on the 24th of the same month?","o":["Sunday","Monday","Wednesday","Tuesday"],"a":1,"e":"24-3=21 days later. 21 is exactly divisible by 7, so the 24th falls on the same day of the week as the 3rd: Monday.","section":"Arithmetical & Analytical Reasoning","id":642},{"q":"If the 1st of a month is a Thursday, what day will the 30th of that month be?","o":["Sunday","Thursday","Friday","Saturday"],"a":2,"e":"30-1=29 days later. 29 mod 7 = 1, so the 30th is one day after Thursday, which is Friday.","section":"Arithmetical & Analytical Reasoning","id":643},{"q":"A watch gains 15 minutes every 24 hours. It is set correctly at 12:00 noon on Monday. What will it show when the correct time is 12:00 noon on the following Wednesday (48 hours later)?","o":["12:45 PM","12:30 PM","12:15 PM","1:00 PM"],"a":1,"e":"The watch gains 15 minutes per 24 hours, so over 48 hours it gains 30 minutes, showing 12:30 PM when the actual time is 12:00 noon.","section":"Arithmetical & Analytical Reasoning","id":644},{"q":"Find the odd one out: Mercury, Venus, Earth, Sirius.","o":["Mercury","Venus","Earth","Sirius"],"a":3,"e":"Mercury, Venus, and Earth are planets in our solar system; Sirius is a star, not a planet.","section":"Arithmetical & Analytical Reasoning","id":645},{"q":"Find the odd one out: Guitar, Violin, Flute, Cello.","o":["Cello","Violin","Flute","Guitar"],"a":2,"e":"Guitar, Violin, and Cello are string instruments; Flute is a wind instrument.","section":"Arithmetical & Analytical Reasoning","id":646},{"q":"Find the odd one out: Kilogram, Metre, Litre, Second.","o":["Metre","Kilogram","Second","Litre"],"a":3,"e":"Kilogram, Metre, and Second are base SI units; Litre is a derived unit of volume, not a base SI unit.","section":"Arithmetical & Analytical Reasoning","id":647},{"q":"Find the missing number in the series: 3, 7, 15, 31, ___?","o":["64","62","63","61"],"a":2,"e":"Each term follows the pattern (previous x 2) + 1: 3x2+1=7, 7x2+1=15, 15x2+1=31, 31x2+1=63.","section":"Arithmetical & Analytical Reasoning","id":648},{"q":"Find the missing number in the series: 2, 5, 11, 23, 47, ___?","o":["93","96","95","94"],"a":2,"e":"Each term follows the pattern (previous x 2) + 1: 2x2+1=5, 5x2+1=11, 11x2+1=23, 23x2+1=47, 47x2+1=95.","section":"Arithmetical & Analytical Reasoning","id":649},{"q":"Find the missing number in the series: 10, 20, 40, 70, 110, ___?","o":["165","150","160","155"],"a":2,"e":"The differences between consecutive terms are 10, 20, 30, 40, 50 (increasing by 10 each time). Next difference is 50, giving 110+50=160.","section":"Arithmetical & Analytical Reasoning","id":650},{"q":"Find the missing number in the series: 1, 8, 27, 64, 125, ___?","o":["216","256","225","196"],"a":0,"e":"This is the series of perfect cubes: 1^3, 2^3, 3^3, 4^3, 5^3, 6^3=216.","section":"Arithmetical & Analytical Reasoning","id":651},{"q":"If P denotes '+', Q denotes '-', R denotes '×', and S denotes '÷', evaluate: 12 R 4 P 8 Q 2 S 1.","o":["50","48","54","58"],"a":2,"e":"Substituting symbols: 12 x 4 + 8 - (2 / 1). Following order of operations: 12x4=48, 2/1=2, so the expression becomes 48+8-2=54.","section":"Arithmetical & Analytical Reasoning","id":652},{"q":"If in a certain code language, 'A' = 1, 'B' = 2, and so on up to 'Z' = 26, what is the sum of the numerical values of the letters in the word 'CAT'?","o":["33","24","27","30"],"a":1,"e":"C=3, A=1, T=20. Sum=3+1+20=24.","section":"Arithmetical & Analytical Reasoning","id":653},{"q":"A is twice as efficient as B, and together they complete a task in 18 days. In how many days would B alone complete the task?","o":["45 days","54 days","36 days","48 days"],"a":1,"e":"If A is twice as efficient as B, let B's rate=x, A's rate=2x. Combined rate=3x=1/18, so x=1/54. B alone takes 54 days.","section":"Arithmetical & Analytical Reasoning","id":654},{"q":"A father's age is three times his son's age. After 12 years, the father's age will be twice the son's age. Find the son's present age.","o":["10 years","12 years","14 years","16 years"],"a":1,"e":"Let son=x, father=3x. After 12 years: 3x+12=2(x+12) => 3x+12=2x+24 => x=12.","section":"Arithmetical & Analytical Reasoning","id":655},{"q":"Consider the syllogism: All engineers are graduates. Some graduates are teachers. Which conclusion is logically valid?","o":["Some engineers are teachers","No engineers are teachers","No valid conclusion follows about engineers being teachers","All engineers are teachers"],"a":2,"e":"From the given premises, we cannot conclude a definite relationship between engineers and teachers since the 'some graduates' who are teachers may or may not include any engineers.","section":"Arithmetical & Analytical Reasoning","id":656},{"q":"Consider the syllogism: No fish are mammals. All whales are mammals. Which conclusion is logically valid?","o":["No whales are fish","All whales are fish","All fish are whales","Some whales are fish"],"a":0,"e":"Since no fish are mammals, and all whales are mammals, it logically follows that no whales are fish.","section":"Arithmetical & Analytical Reasoning","id":657},{"q":"Consider the syllogism: All squares are rectangles. All rectangles are quadrilaterals. Which conclusion is logically valid?","o":["All squares are quadrilaterals","All quadrilaterals are squares","No squares are quadrilaterals","Some quadrilaterals are not rectangles"],"a":0,"e":"By transitive logic, since all squares are rectangles and all rectangles are quadrilaterals, all squares must also be quadrilaterals.","section":"Arithmetical & Analytical Reasoning","id":658},{"q":"If 'RIVER' is coded as 'SJWFS', how would 'OCEAN' be coded using the same pattern?","o":["PDGBO","PDFCO","PDFBO","PEFBO"],"a":2,"e":"Each letter is shifted forward by exactly 1: O->P, C->D, E->F, A->B, N->O, giving PDFBO.","section":"Arithmetical & Analytical Reasoning","id":659},{"q":"Statement: All pens are pencils. All pencils are erasers. Conclusion I: All pens are erasers. Conclusion II: Some erasers are pens. Which is/are valid?","o":["Only Conclusion I follows","Only Conclusion II follows","Neither conclusion follows","Both conclusions follow"],"a":3,"e":"Since all pens are pencils and all pencils are erasers, all pens are erasers (Conclusion I) and consequently some erasers are indeed pens (Conclusion II).","section":"Arithmetical & Analytical Reasoning","id":660},{"q":"Four friends A, B, C, D have different heights. A is taller than B but shorter than C. D is the shortest of all. Who is the tallest?","o":["A","B","Cannot be determined","C"],"a":3,"e":"C > A > B, and D is shortest overall, so C, being taller than A who is already taller than B, and with D confirmed shortest, must be the tallest.","section":"Arithmetical & Analytical Reasoning","id":661},{"q":"In a row of children facing north, Rahul is 7th from the left and 12th from the right. How many children are there in total?","o":["20","17","18","19"],"a":2,"e":"Total = (Position from left) + (Position from right) - 1 = 7+12-1=18.","section":"Arithmetical & Analytical Reasoning","id":662},{"q":"In a queue, a man is 15th from the front and 22nd from the back. How many people are in the queue in total?","o":["35","37","36","38"],"a":2,"e":"Total = 15+22-1=36.","section":"Arithmetical & Analytical Reasoning","id":663},{"q":"Find the next term in the letter series: Z, X, V, T, ___?","o":["R","S","P","Q"],"a":0,"e":"The series skips one letter each time, moving backward: Z, X, V, T, R (each step goes back by 2 letters).","section":"Arithmetical & Analytical Reasoning","id":664},{"q":"Find the next term in the letter series: B, D, G, K, ___?","o":["N","P","O","Q"],"a":1,"e":"The gaps increase by 1 each time: B(+2)D(+3)G(+4)K(+5)P; so the next letter is P.","section":"Arithmetical & Analytical Reasoning","id":665},{"q":"A is the sister of B. B is the brother of C. C is the son of D. E is the mother of A. How is D related to E?","o":["D is E's husband","D is E's brother","D is E's son","D is E's father"],"a":0,"e":"Since A, B, and C are siblings sharing the same parents, and E is the mother of A while D is described as the father figure (parent of C), D must be E's husband.","section":"Arithmetical & Analytical Reasoning","id":666},{"q":"A company's revenue grew from Rs. 2.5 million to Rs. 3.75 million over one year. What was the percentage growth?","o":["35%","50%","40%","45%"],"a":1,"e":"Growth = (3.75-2.5)/2.5 x 100 = 1.25/2.5 x 100 = 50%.","section":"Arithmetical & Analytical Reasoning","id":667},{"q":"If a company's expenses increased from Rs. 800,000 to Rs. 920,000, what was the percentage increase?","o":["18%","12%","15%","20%"],"a":2,"e":"Increase = (920000-800000)/800000 x 100 = 120000/800000 x 100 = 15%.","section":"Arithmetical & Analytical Reasoning","id":668},{"q":"A survey of 400 people found that 65% preferred product A. How many people preferred a product other than A?","o":["130","140","260","150"],"a":1,"e":"35% preferred products other than A: 0.35 x 400 = 140 people.","section":"Arithmetical & Analytical Reasoning","id":669},{"q":"In an examination, 80% of students passed in Mathematics and 70% passed in English. If 60% passed in both subjects, what percentage failed in both subjects?","o":["5%","20%","15%","10%"],"a":3,"e":"Using inclusion-exclusion: Passed in at least one = 80+70-60=90%. Failed in both = 100-90=10%.","section":"Arithmetical & Analytical Reasoning","id":670},{"q":"A factory produces 1,200 units per day. If production increases by 25%, how many additional units are produced daily?","o":["250","300","350","275"],"a":1,"e":"25% of 1200 = 300 additional units per day.","section":"Arithmetical & Analytical Reasoning","id":671},{"q":"The cost price of 15 items equals the selling price of 12 items. Find the profit percentage.","o":["15%","30%","20%","25%"],"a":3,"e":"Let CP of each item=1. CP of 15=15=SP of 12. SP of 1 item=15/12=1.25. Profit%=25%.","section":"Arithmetical & Analytical Reasoning","id":672},{"q":"A retailer buys goods at a 20% discount on the list price and sells them at the list price. Find his profit percentage on the cost price.","o":["25%","24%","20%","22%"],"a":0,"e":"Let list price=100. Cost price=80 (after 20% discount). Selling price=100 (list price). Profit=100-80=20. Profit%=20/80x100=25%.","section":"Arithmetical & Analytical Reasoning","id":673},{"q":"If the marked price of an article is Rs. 800 and it is sold after two successive discounts of 10% and 5%, find the final selling price.","o":["Rs. 700","Rs. 690","Rs. 684","Rs. 680"],"a":2,"e":"After 10% discount: 800x0.90=720. After 5% discount: 720x0.95=Rs. 684.","section":"Arithmetical & Analytical Reasoning","id":674},{"q":"Two numbers are in the ratio 3:4. If their HCF is 4, find their LCM.","o":["44","36","40","48"],"a":3,"e":"If HCF=4 and ratio=3:4, the numbers are 12 and 16. LCM=(12x16)/HCF=192/4=48.","section":"Arithmetical & Analytical Reasoning","id":675},{"q":"The product of two numbers is 3600 and their HCF is 12. Find their LCM.","o":["280","300","320","250"],"a":1,"e":"LCM x HCF = product of numbers. LCM = 3600/12 = 300.","section":"Arithmetical & Analytical Reasoning","id":676},{"q":"A sum of Rs. 15,000 becomes Rs. 19,500 in 3 years at simple interest. Find the annual rate of interest.","o":["8%","10%","12%","9%"],"a":1,"e":"SI=19500-15000=4500. Rate=(100xSI)/(PxT)=(100x4500)/(15000x3)=10%.","section":"Arithmetical & Analytical Reasoning","id":677},{"q":"If x:y = 5:6 and y:z = 4:3, find the combined ratio x:y:z in its simplest form.","o":["20:18:12","12:10:9","15:12:10","10:12:9"],"a":3,"e":"Combining ratios: x:y=5:6=20:24, and y:z=4:3=24:18, giving x:y:z=20:24:18, which simplifies (dividing by 2) to 10:12:9.","section":"Arithmetical & Analytical Reasoning","id":678},{"q":"A sum of money is divided among A, B, and C such that A gets half of what B and C together get, and B gets one-third of what A and C together get. If the total sum is Rs. 24,000, find C's share.","o":["Rs. 9,000","Rs. 12,000","Rs. 11,000","Rs. 10,000"],"a":3,"e":"A=(B+C)/2 means A=Total/3=8,000. B=(A+C)/3 means 4B=Total, so B=6,000. C=24,000-8,000-6,000=Rs. 10,000.","section":"Arithmetical & Analytical Reasoning","id":679},{"q":"A shopkeeper sold an article at a loss of 15%. Had he sold it for Rs. 300 more, he would have made a profit of 10%. Find the cost price.","o":["Rs. 1,000","Rs. 1,200","Rs. 1,100","Rs. 1,300"],"a":1,"e":"Let CP=x. SP at 15% loss=0.85x. SP at 10% profit=1.10x. Difference=1.10x-0.85x=0.25x=300, so x=Rs. 1,200.","section":"Arithmetical & Analytical Reasoning","id":680},{"q":"A can complete a work in 18 days, B in 24 days, and C in 36 days. If all three work together, in how many days will the work be completed?","o":["7.2 days","8 days","9 days","6 days"],"a":1,"e":"Combined rate = 1/18+1/24+1/36. Using LCM 72: 4/72+3/72+2/72=9/72=1/8. Time=8 days.","section":"Arithmetical & Analytical Reasoning","id":681},{"q":"A alone can paint a wall in 6 hours, and B alone can paint it in 8 hours. If they work together but B leaves 2 hours before completion, find the approximate total time taken to paint the wall.","o":["4.3 hours (approximately)","6 hours","5 hours","4 hours"],"a":0,"e":"Let total time=T hours. A works T hours, B works (T-2) hours. Work done: T/6+(T-2)/8=1. Multiplying by 24: 4T+3(T-2)=24, giving 7T=30, so T is approximately 4.3 hours.","section":"Arithmetical & Analytical Reasoning","id":682},{"q":"A train covers a distance of 200 km at a uniform speed. If the speed had been 5 km/h more, it would have taken 2 hours less to cover the same distance. Find the original speed of the train.","o":["25 km/h","22 km/h","18 km/h","20 km/h"],"a":3,"e":"Let speed=x km/h. 200/x - 200/(x+5) = 2, giving 200x5 = 2x(x+5), i.e. 1000=2x^2+10x, so x^2+5x-500=0. Factoring gives (x-20)(x+25)=0, so x=20 km/h.","section":"Arithmetical & Analytical Reasoning","id":683},{"q":"Rs. 6,000 becomes Rs. 7,986 in 3 years at a certain rate of compound interest, compounded annually. Find the approximate annual rate of interest.","o":["8%","10%","11%","9%"],"a":1,"e":"Amount/Principal = (1+r)^3 = 7986/6000 = 1.331. Since 1.10^3=1.331, the rate is 10% per annum.","section":"Arithmetical & Analytical Reasoning","id":684},{"q":"A retailer marks up goods by 50% and then allows a discount, resulting in an overall profit of 20%. Find the discount percentage offered.","o":["15%","18%","20%","25%"],"a":2,"e":"Let CP=100. Marked price=150. Overall profit of 20% means SP=120. Discount=150-120=30. Discount%=30/150x100=20%.","section":"Arithmetical & Analytical Reasoning","id":685},{"q":"Two pipes A and B can fill a tank in 20 minutes and 30 minutes respectively, while a third pipe C can empty the full tank in 40 minutes. If all three pipes are opened together, find the approximate time to fill the tank.","o":["15 minutes","18 minutes","17.1 minutes (approximately)","20 minutes"],"a":2,"e":"Combined rate = 1/20+1/30-1/40. Using LCM 120: 6/120+4/120-3/120=7/120. Time=120/7, approximately 17.1 minutes.","section":"Arithmetical & Analytical Reasoning","id":686},{"q":"A sum of money invested at compound interest amounts to Rs. 4,840 in 2 years and Rs. 5,324 in 3 years. Find the rate of interest per annum.","o":["10%","9%","12%","8%"],"a":0,"e":"The interest earned in the third year alone = 5324-4840=484. Rate = (484/4840) x 100 = 10%.","section":"Arithmetical & Analytical Reasoning","id":687},{"q":"A container has 80 litres of a mixture of milk and water in the ratio 3:1. How much water must be added to make the ratio of milk to water 3:2?","o":["10 litres","25 litres","15 litres","20 litres"],"a":3,"e":"Milk=60 litres, water=20 litres. For ratio 3:2, water needed = (2/3)x60=40 litres. Additional water = 40-20=20 litres.","section":"Arithmetical & Analytical Reasoning","id":688},{"q":"The average of 20 numbers is 15. If each number is multiplied by 3, find the new average.","o":["30","45","18","60"],"a":1,"e":"When every number is multiplied by a constant k, the average is also multiplied by k. New average = 15 x 3 = 45.","section":"Arithmetical & Analytical Reasoning","id":689},{"q":"The average weight of 10 students is 42 kg. When one student leaves, the average becomes 41 kg. Find the weight of the student who left.","o":["51 kg","52 kg","49 kg","50 kg"],"a":0,"e":"Total weight of 10 students=420 kg. Total weight of 9 students=41x9=369 kg. Weight of the student who left=420-369=51 kg.","section":"Arithmetical & Analytical Reasoning","id":690},{"q":"If x + 1/x = 5, find the value of x^2 + 1/x^2.","o":["25","21","23","27"],"a":2,"e":"x^2+1/x^2 = (x+1/x)^2 - 2 = 5^2-2=25-2=23.","section":"Arithmetical & Analytical Reasoning","id":691},{"q":"If x - 1/x = 3, find the value of x^2 + 1/x^2.","o":["13","11","9","7"],"a":1,"e":"x^2+1/x^2 = (x-1/x)^2+2 = 3^2+2=9+2=11.","section":"Arithmetical & Analytical Reasoning","id":692},{"q":"Simplify: (a+b)^2 - (a-b)^2.","o":["4ab","2ab","2(a^2+b^2)","a^2+b^2"],"a":0,"e":"(a+b)^2-(a-b)^2 = [a^2+2ab+b^2] - [a^2-2ab+b^2] = 4ab.","section":"Arithmetical & Analytical Reasoning","id":693},{"q":"If the roots of the quadratic equation x^2 - 7x + 12 = 0 are p and q, find the value of p+q and pq.","o":["p+q=7, pq=-12","p+q=12, pq=7","p+q=-7, pq=12","p+q=7, pq=12"],"a":3,"e":"For a quadratic ax^2+bx+c=0, sum of roots=-b/a and product=c/a. Here sum=7, product=12.","section":"Arithmetical & Analytical Reasoning","id":694},{"q":"Solve for x: 2x^2 - 5x - 3 = 0.","o":["x=-3 or x=1/2","x=3 or x=-1/2","x=-3 or x=-1/2","x=3 or x=1/2"],"a":1,"e":"Using factoring: 2x^2-5x-3=(2x+1)(x-3)=0, giving x=-1/2 or x=3.","section":"Arithmetical & Analytical Reasoning","id":695},{"q":"If a triangle has sides 7, 24, and 25, what type of triangle is it?","o":["Right-angled triangle","Acute triangle","Equilateral triangle","Obtuse triangle"],"a":0,"e":"7^2+24^2=49+576=625=25^2, satisfying the Pythagorean theorem, confirming it is a right-angled triangle.","section":"Arithmetical & Analytical Reasoning","id":696},{"q":"Find the area of a triangle with sides 13, 14, and 15 using Heron's formula.","o":["84 sq units","91 sq units","78 sq units","88 sq units"],"a":0,"e":"Semi-perimeter s=(13+14+15)/2=21. Area=sqrt[s(s-a)(s-b)(s-c)]=sqrt[21x8x7x6]=sqrt[7056]=84 sq units.","section":"Arithmetical & Analytical Reasoning","id":697},{"q":"The angles of a triangle are in the ratio 2:3:4. Find the largest angle.","o":["60 degrees","90 degrees","80 degrees","70 degrees"],"a":2,"e":"Sum of ratios=2+3+4=9 parts=180 degrees, so 1 part=20 degrees. Largest angle=4x20=80 degrees.","section":"Arithmetical & Analytical Reasoning","id":698},{"q":"Find the value of x if the exterior angle of a regular polygon is 45 degrees, where x represents the number of sides.","o":["9","10","8","6"],"a":2,"e":"Exterior angle of a regular polygon = 360/n. So 45=360/n, giving n=8 sides.","section":"Arithmetical & Analytical Reasoning","id":699},{"q":"A circle has a radius of 14 cm. Find its circumference. (Use pi = 22/7)","o":["84 cm","92 cm","88 cm","90 cm"],"a":2,"e":"Circumference=2 x pi x r = 2 x (22/7) x 14 = 2 x 22 x 2 = 88 cm.","section":"Arithmetical & Analytical Reasoning","id":700},{"q":"Find the area of a circle with a diameter of 21 cm. (Use pi = 22/7)","o":["355 sq cm","346.5 sq cm","350 sq cm","340 sq cm"],"a":1,"e":"Radius=10.5 cm. Area=pi x r^2 = (22/7) x 10.5 x 10.5 = 346.5 sq cm.","section":"Arithmetical & Analytical Reasoning","id":701},{"q":"If the volume of a cube is 343 cubic cm, find the length of its edge.","o":["7 cm","8 cm","6 cm","9 cm"],"a":0,"e":"Edge length = cube root of 343 = 7 cm, since 7^3=343.","section":"Arithmetical & Analytical Reasoning","id":702},{"q":"A cone has a base radius of 3 cm and a height of 4 cm. Find its slant height.","o":["6 cm","5 cm","7 cm","4.5 cm"],"a":1,"e":"Slant height = sqrt(r^2+h^2) = sqrt(9+16) = sqrt(25) = 5 cm.","section":"Arithmetical & Analytical Reasoning","id":703},{"q":"Find the next number in the series: 2, 6, 12, 20, 30, ___?","o":["40","42","46","44"],"a":1,"e":"The differences are 4, 6, 8, 10 (increasing by 2). Next difference is 12: 30+12=42.","section":"Arithmetical & Analytical Reasoning","id":704},{"q":"Find the next number in the series: 5, 10, 20, 40, 80, ___?","o":["150","160","120","140"],"a":1,"e":"Each term is double the previous one: 80x2=160.","section":"Arithmetical & Analytical Reasoning","id":705},{"q":"Find the next number in the series: 1, 4, 9, 16, 25, ___?","o":["35","30","36","40"],"a":2,"e":"This is the series of perfect squares: 1^2,2^2,3^2,4^2,5^2,6^2=36.","section":"Arithmetical & Analytical Reasoning","id":706},{"q":"Find the missing term: 4, 9, 16, 25, ___, 49.","o":["30","36","40","35"],"a":1,"e":"This is the series of squares starting from 2^2: 2^2=4,3^2=9,4^2=16,5^2=25,6^2=36,7^2=49.","section":"Arithmetical & Analytical Reasoning","id":707},{"q":"Find the odd number out in the series: 3, 5, 11, 14, 17, 21.","o":["17","21","3","14"],"a":3,"e":"All other numbers (3, 5, 11, 17, 21) are odd; 14 is the only even number in the series.","section":"Arithmetical & Analytical Reasoning","id":708},{"q":"If A=1, B=2, C=3,...Z=26, find the value of the word 'GATE' (sum of letter values).","o":["33","32","35","34"],"a":0,"e":"G=7, A=1, T=20, E=5. Sum=7+1+20+5=33.","section":"Arithmetical & Analytical Reasoning","id":709},{"q":"In a certain code, if 'CAT' is written as '3120', with each letter represented by its alphabetical position, what would 'DOG' be written as?","o":["471","1547","4157","4715"],"a":2,"e":"D=4, O=15, G=7. Concatenating positions gives '4' + '15' + '7' = '4157'.","section":"Arithmetical & Analytical Reasoning","id":710},{"q":"A is facing north. He turns 90 degrees clockwise, then turns 90 degrees clockwise again. Which direction is he facing now?","o":["North","East","West","South"],"a":3,"e":"Starting at North. After the first 90-degree clockwise turn, he faces East. After a second 90-degree clockwise turn, he faces South.","section":"Arithmetical & Analytical Reasoning","id":711},{"q":"A person walks 10m north, then 6m east, then 10m south. How far is he from his starting point?","o":["6m","10m","16m","8m"],"a":0,"e":"The northward and southward movements cancel out (10m north then 10m south returns to the original latitude), leaving only the 6m eastward displacement.","section":"Arithmetical & Analytical Reasoning","id":712},{"q":"A person walks 8m south, then turns left and walks 6m, then turns left again and walks 8m. How far is he from the starting point, and in which direction?","o":["14m from the starting point","6m to the west of the starting point","6m to the east of the starting point","10m to the east of the starting point"],"a":2,"e":"After walking south, turning left (facing east) and walking 6m, then turning left again (facing north) and walking 8m returns to the original latitude, leaving a 6m eastward displacement from the start.","section":"Arithmetical & Analytical Reasoning","id":713},{"q":"Find the wrong number in the series: 2, 5, 10, 17, 26, 37, 50, 64.","o":["64","50","37","26"],"a":0,"e":"The pattern follows n^2+1 (2,5,10,17,26,37,50,65...), so the term after 50 should be 65, not 64, making 64 the incorrect term.","section":"Arithmetical & Analytical Reasoning","id":714},{"q":"Find the wrong number in the series: 1, 2, 6, 24, 96, 720.","o":["720","6","24","96"],"a":3,"e":"The pattern is each term multiplied by an increasing factor (x2, x3, x4, x5...): 1x2=2, 2x3=6, 6x4=24, 24x5=120 (not 96), so 96 is incorrect; the correct next term should have been 120.","section":"Arithmetical & Analytical Reasoning","id":715},{"q":"A father is 4 times as old as his son. After 5 years, the father will be 3 times as old as his son. Find the son's present age.","o":["8 years","9 years","12 years","10 years"],"a":3,"e":"Let son=x, father=4x. After 5 years: 4x+5=3(x+5) => 4x+5=3x+15 => x=10.","section":"Arithmetical & Analytical Reasoning","id":716},{"q":"The sum of the ages of a father and son is 60 years. Six years ago, the father's age was 5 times the son's age. Find the son's current age.","o":["12 years","18 years","16 years","14 years"],"a":3,"e":"Let the son's current age be x, so the father's current age is 60-x. Six years ago: (60-x-6) = 5(x-6). This gives 54-x = 5x-30, so 84=6x, meaning x=14.","section":"Arithmetical & Analytical Reasoning","id":717},{"q":"A sum of Rs. 5,000 is lent at simple interest for 4 years at a rate such that it amounts to Rs. 6,200. Find the rate of interest per annum.","o":["6%","7%","5%","8%"],"a":0,"e":"SI=6200-5000=1200. Rate=(100xSI)/(PxT)=(100x1200)/(5000x4)=6%.","section":"Arithmetical & Analytical Reasoning","id":718},{"q":"If 20% of a number is 50, find 60% of the same number.","o":["160","140","150","130"],"a":2,"e":"If 20% of the number=50, the number=250. 60% of 250=150.","section":"Arithmetical & Analytical Reasoning","id":719},{"q":"A number, when increased by 20%, becomes 180. Find the original number.","o":["160","140","144","150"],"a":3,"e":"Let the number be x. x x 1.20=180, so x=180/1.20=150.","section":"Arithmetical & Analytical Reasoning","id":720},{"q":"Two numbers are in the ratio 7:9. If the sum of the numbers is 128, find the larger number.","o":["68","70","72","74"],"a":2,"e":"Sum of ratio parts=7+9=16. Each part=128/16=8. Larger number=9x8=72.","section":"Arithmetical & Analytical Reasoning","id":721},{"q":"Divide Rs. 1,700 among A, B, and C so that A gets 2/3 of what B gets, and B gets 1/4 of what C gets. Find C's share.","o":["Rs. 1,200","Rs. 1,000","Rs. 1,100","Rs. 900"],"a":0,"e":"Let C=12k, then B=(1/4)(12k)=3k, and A=(2/3)(3k)=2k. Total=2k+3k+12k=17k=1700, so k=100. C's share=12k=Rs. 1,200.","section":"Arithmetical & Analytical Reasoning","id":722},{"q":"A can do a piece of work in 24 days which B can do in 16 days. B worked for 10 days and left. Find in how many days A can finish the remaining work.","o":["12 days","8 days","10 days","9 days"],"a":3,"e":"B's work in 10 days=10/16=5/8. Remaining work=3/8. A's rate=1/24 per day. Time=(3/8)/(1/24)=(3/8)x24=9 days.","section":"Arithmetical & Analytical Reasoning","id":723},{"q":"A sum of money at compound interest amounts to Rs. 2,420 in 2 years and Rs. 2,662 in 3 years. Find the rate of interest.","o":["12%","15%","8%","10%"],"a":3,"e":"Interest for the 3rd year alone=2662-2420=242. Rate=(242/2420)x100=10%.","section":"Arithmetical & Analytical Reasoning","id":724},{"q":"If the simple interest on a sum for 3 years at 8% per annum is Rs. 1,200, find the sum.","o":["Rs. 5,500","Rs. 4,500","Rs. 4,800","Rs. 5,000"],"a":3,"e":"Sum=(SIx100)/(RxT)=(1200x100)/(8x3)=Rs. 5,000.","section":"Arithmetical & Analytical Reasoning","id":725},{"q":"A shopkeeper sells an item at a profit of 20%. If he had bought it for 10% less and sold it for the same price, his profit would have been what percentage?","o":["30%","33.33%","35%","25%"],"a":1,"e":"Let original CP=100, SP=120 (20% profit). New CP=90. Profit=120-90=30. Profit%=(30/90)x100=33.33%.","section":"Arithmetical & Analytical Reasoning","id":726},{"q":"The average of the first 50 natural numbers is:","o":["26","25.5","24.5","25"],"a":1,"e":"Average of first n natural numbers = (n+1)/2 = 51/2 = 25.5.","section":"Arithmetical & Analytical Reasoning","id":727},{"q":"Find the sum of the first 20 natural numbers.","o":["220","210","200","190"],"a":1,"e":"Sum of first n natural numbers = n(n+1)/2 = 20x21/2 = 210.","section":"Arithmetical & Analytical Reasoning","id":728},{"q":"Find the value of 15% of 340 plus 25% of 160.","o":["93","87","91","89"],"a":2,"e":"15% of 340=51. 25% of 160=40. Sum=51+40=91.","section":"Arithmetical & Analytical Reasoning","id":729},{"q":"A alone can complete a task in 10 days, working at twice the efficiency of B. How many days would B alone take to complete the same task?","o":["20 days","25 days","15 days","18 days"],"a":0,"e":"If A is twice as efficient as B, and A takes 10 days, B would take twice as long: 20 days.","section":"Arithmetical & Analytical Reasoning","id":730},{"q":"A is 25% more efficient than B. If B takes 25 days to complete a task, how many days will A take?","o":["22 days","20 days","18 days","15 days"],"a":1,"e":"If A is 25% more efficient, A's time = B's time / 1.25 = 25/1.25 = 20 days.","section":"Arithmetical & Analytical Reasoning","id":731},{"q":"Find the compound interest on Rs. 25,000 for 2 years at 8% per annum, compounded annually.","o":["Rs. 4,160","Rs. 4,100","Rs. 4,200","Rs. 4,000"],"a":0,"e":"Amount=25000x(1.08)^2=25000x1.1664=29,160. CI=29160-25000=Rs. 4,160.","section":"Arithmetical & Analytical Reasoning","id":732},{"q":"A trader marks his goods 30% above cost price and allows a discount of 10%. Find his profit percentage.","o":["15%","20%","18%","17%"],"a":3,"e":"Let CP=100. Marked price=130. After 10% discount: 130x0.90=117. Profit=117-100=17%.","section":"Arithmetical & Analytical Reasoning","id":733},{"q":"If 8 workers can complete a task in 15 days, how many workers are needed to complete the same task in 10 days, assuming equal efficiency?","o":["16 workers","12 workers","14 workers","10 workers"],"a":1,"e":"Using the work formula (workers x days = constant): 8x15=120. For 10 days: workers=120/10=12.","section":"Arithmetical & Analytical Reasoning","id":734},{"q":"A tank can be filled by pipe A in 12 hours and emptied by pipe B in 20 hours. If both pipes are opened together, find the time to fill the tank.","o":["35 hours","25 hours","28 hours","30 hours"],"a":3,"e":"Combined rate=1/12-1/20. LCM=60. Rates: 5/60-3/60=2/60=1/30. Time=30 hours.","section":"Arithmetical & Analytical Reasoning","id":735},{"q":"A man buys a certain number of oranges at 3 for a rupee and an equal number at 2 for a rupee, then sells them all at 5 for 2 rupees. Find his overall profit or loss percentage.","o":["4% loss","4% profit","No profit no loss","8% loss"],"a":0,"e":"Let him buy 6 oranges of each kind (total 12). Cost=6/3+6/2=2+3=5 rupees. Selling 12 oranges at 5 for 2 rupees: 12/5x2=4.8 rupees. Loss=5-4.8=0.2. Loss%=(0.2/5)x100=4%.","section":"Arithmetical & Analytical Reasoning","id":736},{"q":"A merchant purchases an item for Rs. 2,400 and wants to make a 25% profit after allowing a 20% discount on the marked price. Find the marked price.","o":["Rs. 3,600","Rs. 3,500","Rs. 3,750","Rs. 3,800"],"a":2,"e":"Required SP for 25% profit = 2400x1.25=3000. Marked price x 0.80 = 3000, so marked price=3000/0.80=Rs. 3,750.","section":"Arithmetical & Analytical Reasoning","id":737},{"q":"A sum of money amounts to Rs. 9,800 after 5 years and Rs. 12,005 after 8 years at simple interest. Find the principal sum.","o":["Rs. 7,500","Rs. 6,125","Rs. 7,000","Rs. 6,500"],"a":1,"e":"Interest for 3 years (8-5) = 12005-9800 = 2205. Interest per year = 2205/3 = 735. Interest for 5 years = 735x5 = 3675. Principal = 9800-3675 = Rs. 6,125.","section":"Arithmetical & Analytical Reasoning","id":738},{"q":"A and B invest Rs. 15,000 and Rs. 25,000 respectively in a business. At the end of the year, they earn a profit of Rs. 12,000. Find B's share of the profit.","o":["Rs. 7,000","Rs. 6,500","Rs. 7,500","Rs. 8,000"],"a":2,"e":"Ratio of investments A:B = 15000:25000 = 3:5. Total parts=8. B's share = (5/8)x12000=Rs. 7,500.","section":"Arithmetical & Analytical Reasoning","id":739},{"q":"A, B, and C invest in a business in the ratio 2:3:5. If the total profit is Rs. 50,000, find A's share.","o":["Rs. 8,000","Rs. 12,000","Rs. 15,000","Rs. 10,000"],"a":3,"e":"Total ratio parts=2+3+5=10. A's share=(2/10)x50000=Rs. 10,000.","section":"Arithmetical & Analytical Reasoning","id":740},{"q":"A alone can do a piece of work in 20 days. He works for 4 days and then B joins him, and together they complete the remaining work in 8 days. In how many days could B alone complete the entire work?","o":["16 days","24 days","18 days","20 days"],"a":3,"e":"A's work in 4 days=4/20=1/5. Remaining work=4/5, completed by A and B together in 8 days. Combined rate for those 8 days = (4/5)/8=1/10. A's individual rate=1/20. B's rate=1/10-1/20=1/20. Time for B alone=20 days.","section":"Arithmetical & Analytical Reasoning","id":741},{"q":"If a=3 and b=4, find the value of a^2+2ab+b^2.","o":["48","50","47","49"],"a":3,"e":"a^2+2ab+b^2=(a+b)^2=(3+4)^2=7^2=49.","section":"Arithmetical & Analytical Reasoning","id":742},{"q":"Simplify: (x+5)(x-5).","o":["x^2+25","x^2-25","x^2-10x-25","x^2+10x-25"],"a":1,"e":"Using the difference of squares formula: (x+5)(x-5)=x^2-25.","section":"Arithmetical & Analytical Reasoning","id":743},{"q":"If 3x + 2y = 12 and x - y = 1, find the values of x and y.","o":["x=4, y=3","x=2.8, y=1.8","x=2, y=1","x=3, y=2"],"a":1,"e":"From x-y=1, x=y+1. Substituting: 3(y+1)+2y=12 => 3y+3+2y=12 => 5y=9 => y=1.8, x=2.8.","section":"Arithmetical & Analytical Reasoning","id":744},{"q":"The perimeter of a square is 64 cm. Find its area.","o":["260 sq cm","256 sq cm","250 sq cm","248 sq cm"],"a":1,"e":"Side=64/4=16 cm. Area=16^2=256 sq cm.","section":"Arithmetical & Analytical Reasoning","id":745},{"q":"The area of a square is 225 sq cm. Find its perimeter.","o":["58 cm","64 cm","60 cm","56 cm"],"a":2,"e":"Side=sqrt(225)=15 cm. Perimeter=4x15=60 cm.","section":"Arithmetical & Analytical Reasoning","id":746},{"q":"A ladder 25m long is placed against a wall such that its foot is 7m away from the base of the wall. Find the height at which the ladder touches the wall.","o":["18 m","22 m","24 m","20 m"],"a":2,"e":"Using the Pythagorean theorem: height=sqrt(25^2-7^2)=sqrt(625-49)=sqrt(576)=24 m.","section":"Arithmetical & Analytical Reasoning","id":747},{"q":"Find the value of sin(30°) + cos(60°).","o":["2","0.5","1","1.5"],"a":2,"e":"sin(30°)=0.5 and cos(60°)=0.5. Sum=0.5+0.5=1.","section":"Arithmetical & Analytical Reasoning","id":748},{"q":"Find the value of tan(45°).","o":["0.5","1","Undefined","0"],"a":1,"e":"tan(45°)=1, a standard trigonometric value.","section":"Arithmetical & Analytical Reasoning","id":749},{"q":"If the ratio of the radii of two circles is 3:5, find the ratio of their areas.","o":["9:25","6:10","3:5","9:15"],"a":0,"e":"Since area is proportional to the square of the radius, the ratio of areas = (3^2):(5^2) = 9:25.","section":"Arithmetical & Analytical Reasoning","id":750},{"q":"If the ratio of the radii of two spheres is 2:3, find the ratio of their volumes.","o":["2:3","4:6","4:9","8:27"],"a":3,"e":"Since volume is proportional to the cube of the radius, the ratio of volumes = (2^3):(3^3) = 8:27.","section":"Arithmetical & Analytical Reasoning","id":751},{"q":"A rectangular park is 60m long and 40m wide. Find the cost of fencing it at Rs. 15 per metre.","o":["Rs. 3,000","Rs. 2,800","Rs. 3,200","Rs. 2,900"],"a":0,"e":"Perimeter=2(60+40)=200m. Cost=200x15=Rs. 3,000.","section":"Arithmetical & Analytical Reasoning","id":752},{"q":"Find the length of the diagonal of a rectangle with length 12 cm and width 5 cm.","o":["15 cm","12.5 cm","14 cm","13 cm"],"a":3,"e":"Diagonal=sqrt(12^2+5^2)=sqrt(144+25)=sqrt(169)=13 cm.","section":"Arithmetical & Analytical Reasoning","id":753},{"q":"A sum of Rs. 8,000 is invested at 5% simple interest per annum for 6 years. Find the total amount at the end of the period.","o":["Rs. 10,400","Rs. 10,000","Rs. 10,200","Rs. 10,800"],"a":0,"e":"SI=8000x5x6/100=2400. Amount=8000+2400=Rs. 10,400.","section":"Arithmetical & Analytical Reasoning","id":754},{"q":"If the compound interest on a sum for 2 years at 5% per annum is Rs. 512.50, find the sum.","o":["Rs. 5,200","Rs. 4,800","Rs. 5,000","Rs. 4,900"],"a":2,"e":"CI factor for 2 years at 5% = (1.05)^2-1=0.1025. Sum=512.50/0.1025=Rs. 5,000.","section":"Arithmetical & Analytical Reasoning","id":755},{"q":"Find the missing number in the series: 100, 81, 64, 49, ___?","o":["35","40","36","38"],"a":2,"e":"This series represents descending perfect squares: 10^2, 9^2, 8^2, 7^2, 6^2=36.","section":"Arithmetical & Analytical Reasoning","id":756},{"q":"Find the missing number in the series: 7, 14, 28, 56, ___?","o":["108","120","112","110"],"a":2,"e":"Each term is double the previous one: 56x2=112.","section":"Arithmetical & Analytical Reasoning","id":757},{"q":"Find the missing letter in the series: A, C, F, J, ___?","o":["P","O","M","N"],"a":1,"e":"The gaps increase progressively: A(+2)C(+3)F(+4)J(+5)O, following an increasing skip pattern.","section":"Arithmetical & Analytical Reasoning","id":758},{"q":"A and B are twins. C is the son of A. D is the daughter of B. What is the relationship between C and D?","o":["Uncle and niece","Cousins","Siblings","Cannot be determined without further information, though typically considered cousins"],"a":3,"e":"Since A and B are twins (siblings), their children C and D would typically be considered cousins, though the exact terminology can sometimes require additional context depending on regional conventions.","section":"Arithmetical & Analytical Reasoning","id":759},{"q":"If South-East becomes North, North-East becomes West, then what will North become?","o":["North-East","South-West","South-East","East"],"a":1,"e":"Following the given 135-degree anticlockwise rotation pattern applied consistently, North transforms to South-West under the same rule.","section":"Arithmetical & Analytical Reasoning","id":760},{"q":"A shopkeeper bought 100 kg of rice at Rs. 40 per kg. He sold 60 kg at a profit of 20% and the remaining at a loss of 10%. Find his overall profit or loss percentage.","o":["4% profit","6% profit","10% profit","8% profit"],"a":1,"e":"Cost=100x40=4000. SP of 60kg at 20% profit=60x40x1.20=2880. SP of 40kg at 10% loss=40x40x0.90=1440. Total SP=2880+1440=4320. Profit=4320-4000=320. Profit%=(320/4000)x100=8%.","section":"Arithmetical & Analytical Reasoning","id":761},{"q":"Two candles of equal length burn at different rates such that one is consumed in 4 hours and the other in 6 hours. If both are lit at the same time, after how long will the slower-burning candle be exactly twice the length of the faster-burning one?","o":["2.4 hours","3 hours","2 hours","2.5 hours"],"a":1,"e":"Let initial length=1. After t hours, the 4-hour candle's remaining length=1-t/4, and the 6-hour candle's remaining length=1-t/6. Setting the slower candle (6-hour) equal to twice the faster candle (4-hour): 1-t/6 = 2(1-t/4). Multiplying by 12: 12-2t = 24-6t, giving 4t=12, so t=3 hours.","section":"Arithmetical & Analytical Reasoning","id":762},{"q":"A is twice as good a workman as B, and together they finish a piece of work in 14 days. In how many days can A alone finish the work?","o":["24 days","20 days","21 days","18 days"],"a":2,"e":"If A is twice as good as B, let B's rate=x, A's rate=2x. Combined=3x=1/14, so x=1/42. A's rate=2/42=1/21. A alone takes 21 days.","section":"Arithmetical & Analytical Reasoning","id":763},{"q":"The ratio of efficiency of A to B is 3:2. If A can complete a task in 20 days, in how many days can B complete it?","o":["25 days","30 days","35 days","28 days"],"a":1,"e":"Efficiency and time are inversely proportional. If A:B efficiency=3:2, then A:B time=2:3. If A takes 20 days, B takes (3/2)x20=30 days.","section":"Arithmetical & Analytical Reasoning","id":764},{"q":"A sum of Rs. 7,500 is divided into two parts such that the interest on the first part at 6% for 4 years equals the interest on the second part at 8% for 3 years. Find the first part.","o":["Rs. 3,600","Rs. 3,500","Rs. 3,900","Rs. 3,750"],"a":3,"e":"Let the first part be x, so the second part is 7500-x. Setting the interests equal: x times 6 times 4 equals (7500-x) times 8 times 3, i.e., 24x = 24(7500-x). This simplifies to x = 7500-x, giving 2x=7500, so x=Rs. 3,750.","section":"Arithmetical & Analytical Reasoning","id":765},{"q":"A boat covers 32 km upstream in 8 hours and returns downstream in 4 hours. Find the speed of the boat in still water.","o":["7 km/h","5 km/h","6 km/h","8 km/h"],"a":2,"e":"Upstream speed=32/8=4 km/h. Downstream speed=32/4=8 km/h. Speed in still water=(4+8)/2=6 km/h.","section":"Arithmetical & Analytical Reasoning","id":766},{"q":"A boat covers 32 km upstream in 8 hours and returns downstream in 4 hours. Find the speed of the stream.","o":["3 km/h","2.5 km/h","2 km/h","1.5 km/h"],"a":2,"e":"Upstream speed=4 km/h, downstream speed=8 km/h. Speed of stream=(8-4)/2=2 km/h.","section":"Arithmetical & Analytical Reasoning","id":767},{"q":"A sum of Rs. 4,000 becomes Rs. 5,324 in 3 years at compound interest, compounded annually. Find the rate of interest.","o":["11%","10%","8%","9%"],"a":1,"e":"Amount/Principal = (1+r)^3 = 5324/4000 = 1.331. Since 1.10^3 = 1.331, the rate of interest is 10% per annum.","section":"Arithmetical & Analytical Reasoning","id":768},{"q":"Find the least number that must be added to 1,056 to make it exactly divisible by 23.","o":["3","1","2","4"],"a":2,"e":"1056/23=45.9, 23x45=1035, remainder=1056-1035=21. Number to add=23-21=2.","section":"Arithmetical & Analytical Reasoning","id":769},{"q":"Find the greatest number that divides 285 and 1,249 leaving remainders 9 and 7 respectively.","o":["22","24","23","25"],"a":2,"e":"Subtracting the remainders: 285-9=276, and 1249-7=1242. The greatest common divisor of 276 and 1242 is 23, which is the required greatest number.","section":"Arithmetical & Analytical Reasoning","id":770},{"q":"Find the LCM of 12, 15, and 20.","o":["60","45","50","40"],"a":0,"e":"Prime factorization: 12=2^2x3, 15=3x5, 20=2^2x5. LCM=2^2x3x5=60.","section":"Arithmetical & Analytical Reasoning","id":771},{"q":"Find the HCF of 36, 60, and 84.","o":["12","24","6","18"],"a":0,"e":"36=2^2x3^2, 60=2^2x3x5, 84=2^2x3x7. Common factors=2^2x3=12.","section":"Arithmetical & Analytical Reasoning","id":772},{"q":"A number when divided by 899 gives a remainder of 63. Find the remainder when the same number is divided by 29.","o":["5","6","7","4"],"a":0,"e":"899=29x31, so 899 is a multiple of 29. The remainder when dividing by 29 depends only on the remainder 63 when divided by 29: 63=29x2+5, so remainder=5.","section":"Arithmetical & Analytical Reasoning","id":773},{"q":"What is the probability of drawing a red card from a standard deck of 52 playing cards?","o":["1/13","1/4","1/2","1/26"],"a":2,"e":"A standard deck has 26 red cards (hearts and diamonds) out of 52 total, giving a probability of 26/52=1/2.","section":"Arithmetical & Analytical Reasoning","id":774},{"q":"A bag contains 4 red, 5 blue, and 6 green balls. Find the probability of drawing a blue ball at random.","o":["2/5","1/4","1/3","1/2"],"a":2,"e":"Total balls=4+5+6=15. Blue balls=5. Probability=5/15=1/3.","section":"Arithmetical & Analytical Reasoning","id":775},{"q":"In how many ways can the letters of the word 'LEADER' be arranged?","o":["240","360","720","120"],"a":1,"e":"The word 'LEADER' has 6 letters with 'E' repeating twice. Arrangements=6!/2!=720/2=360.","section":"Arithmetical & Analytical Reasoning","id":776},{"q":"In how many ways can the letters of the word 'STATISTICS' be arranged?","o":["48,000","50,400","60,000","45,000"],"a":1,"e":"The word 'STATISTICS' has 10 letters: S(3), T(3), A(1), I(2), C(1). Arrangements=10!/(3!x3!x2!)=3628800/72=50,400.","section":"Arithmetical & Analytical Reasoning","id":777},{"q":"A committee of 4 people is to be selected from 6 men and 4 women, ensuring at least 2 women are included. In how many ways can this be done?","o":["125","110","120","115"],"a":3,"e":"Cases: exactly 2 women+2 men: C(4,2)xC(6,2)=6x15=90. Exactly 3 women+1 man: C(4,3)xC(6,1)=4x6=24. Exactly 4 women: C(4,4)=1. Total=90+24+1=115.","section":"Arithmetical & Analytical Reasoning","id":778},{"q":"A sum of Rs. 5,000 invested at simple interest grows to Rs. 5,800 in 2 years and Rs. 7,000 in 5 years. Find the rate of interest per annum.","o":["10%","9%","8%","12%"],"a":2,"e":"Interest for 3 years (5-2) = 7000-5800=1200. Interest per year=400. Rate=(400x100)/5000=8%.","section":"Arithmetical & Analytical Reasoning","id":779},{"q":"Two positive numbers differ by 3, and the difference of their reciprocals is 3/28. Find the two numbers.","o":["6 and 9","5 and 8","4 and 7","3 and 6"],"a":2,"e":"Let numbers be x and x+3. 1/x - 1/(x+3) = 3/28. This gives 3/[x(x+3)]=3/28, so x(x+3)=28, meaning x^2+3x-28=0. Factoring: (x+7)(x-4)=0, so x=4. The numbers are 4 and 7.","section":"Arithmetical & Analytical Reasoning","id":780},{"q":"The sum of three consecutive even numbers is 84. Find the largest number.","o":["30","32","26","28"],"a":0,"e":"Let the numbers be x, x+2, x+4. Sum=3x+6=84, so x=26. Largest number=x+4=30.","section":"Arithmetical & Analytical Reasoning","id":781},{"q":"The sum of three consecutive odd numbers is 63. Find the smallest number.","o":["19","23","17","21"],"a":0,"e":"Let the numbers be x, x+2, x+4. Sum=3x+6=63, so 3x=57, giving x=19, the smallest number.","section":"Arithmetical & Analytical Reasoning","id":782},{"q":"A number is increased by 25% and then decreased by 25%. Find the net percentage change.","o":["6.25% increase","6.25% decrease","No change","5% decrease"],"a":1,"e":"Net factor = 1.25 x 0.75 = 0.9375, representing a 6.25% decrease from the original number.","section":"Arithmetical & Analytical Reasoning","id":783},{"q":"If a number is decreased by 30% and then increased by 30%, find the net percentage change.","o":["9% increase","6% decrease","No change","9% decrease"],"a":3,"e":"Net factor = 0.70 x 1.30 = 0.91, representing a 9% decrease from the original number.","section":"Arithmetical & Analytical Reasoning","id":784},{"q":"A alone can complete a task in 15 days. After working for 5 days, he is joined by B, and they complete the remaining work together in 5 more days. Find the number of days B alone would take to complete the entire task.","o":["20 days","15 days","18 days","12 days"],"a":1,"e":"A's work in 5 days=5/15=1/3. Remaining work=2/3, completed by A and B together in 5 days. Combined rate for those 5 days=(2/3)/5=2/15. A's individual rate=1/15. B's rate=2/15-1/15=1/15. B alone takes 15 days.","section":"Arithmetical & Analytical Reasoning","id":785},{"q":"A shopkeeper has 3 different varieties of rice priced at Rs. 60, Rs. 80, and Rs. 100 per kg. He mixes them in the ratio 2:3:5 to create a blend. Find the price per kg of the blend.","o":["Rs. 85","Rs. 90","Rs. 82","Rs. 86"],"a":3,"e":"Total parts=2+3+5=10. Weighted cost=(2x60+3x80+5x100)/10=(120+240+500)/10=860/10=Rs. 86 per kg.","section":"Arithmetical & Analytical Reasoning","id":786},{"q":"If the cost price of 20 articles equals the selling price of 16 articles, find the profit percentage.","o":["30%","22%","20%","25%"],"a":3,"e":"Let CP of each article=1. CP of 20=20=SP of 16. SP of 1 article=20/16=1.25. Profit%=25%.","section":"Arithmetical & Analytical Reasoning","id":787},{"q":"A man's income increases from Rs. 40,000 to Rs. 46,000 per month. Find the percentage increase in his income.","o":["20%","18%","15%","12%"],"a":2,"e":"Increase=(46000-40000)/40000x100=6000/40000x100=15%.","section":"Arithmetical & Analytical Reasoning","id":788},{"q":"A retailer's profit margin is 20% on cost price. If he sells an item for Rs. 600, find the cost price.","o":["Rs. 520","Rs. 480","Rs. 450","Rs. 500"],"a":3,"e":"SP=CPx1.20=600, so CP=600/1.20=Rs. 500.","section":"Arithmetical & Analytical Reasoning","id":789},{"q":"Find the value of x if 40% of x equals 30% of 200.","o":["170","160","150","140"],"a":2,"e":"30% of 200=60. 40% of x=60, so x=60/0.40=150.","section":"Arithmetical & Analytical Reasoning","id":790},{"q":"A sum of Rs. 3,000 is lent at 5% simple interest per annum. Find the interest earned after 4 years.","o":["Rs. 500","Rs. 700","Rs. 600","Rs. 550"],"a":2,"e":"SI=Pxrxt/100=3000x5x4/100=Rs. 600.","section":"Arithmetical & Analytical Reasoning","id":791},{"q":"Find the compound interest on Rs. 10,000 for 1 year at 10% per annum, compounded half-yearly.","o":["Rs. 1,000","Rs. 1,050","Rs. 1,025","Rs. 1,100"],"a":2,"e":"Half-yearly rate=5%. Amount=10000x(1.05)^2=10000x1.1025=11,025. CI=11025-10000=Rs. 1,025.","section":"Arithmetical & Analytical Reasoning","id":792},{"q":"A sum of money triples itself in 8 years at simple interest. Find the annual rate of interest.","o":["25%","20%","15%","30%"],"a":0,"e":"If a sum triples, the interest earned equals twice the principal (2P) over 8 years. Rate = (2P x 100)/(P x 8) = 200/8 = 25%.","section":"Arithmetical & Analytical Reasoning","id":793},{"q":"A sum of Rs. 2,750 is divided between A and B such that the simple interest on A's share at 4% for 5 years equals the simple interest on B's share at 5% for 4 years. Find A's share.","o":["Rs. 1,300","Rs. 1,400","Rs. 1,350","Rs. 1,375"],"a":3,"e":"Let A's share=x, B's share=2750-x. Interest equality: x times 4 times 5 = (2750-x) times 5 times 4, i.e., 20x = 20(2750-x). This simplifies to x = 2750-x, giving 2x=2750, so x=Rs. 1,375.","section":"Arithmetical & Analytical Reasoning","id":794},{"q":"The average of 6 numbers is 20. If one number is excluded, the average of the remaining 5 numbers becomes 19. Find the excluded number.","o":["23","26","25","24"],"a":2,"e":"Total of 6 numbers=120. Total of 5 numbers=95. Excluded number=120-95=25.","section":"Arithmetical & Analytical Reasoning","id":795},{"q":"A train 150m long crosses a platform 250m long in 20 seconds. Find the speed of the train in km/h.","o":["68 km/h","75 km/h","72 km/h","70 km/h"],"a":2,"e":"Total distance=150+250=400m. Speed=400/20=20 m/s=20x18/5=72 km/h.","section":"Arithmetical & Analytical Reasoning","id":796},{"q":"Find the next term in the series: 1, 1, 2, 3, 5, 8, 13, ___?","o":["21","19","20","22"],"a":0,"e":"This is the Fibonacci sequence, where each term is the sum of the two preceding ones: 8+13=21.","section":"Arithmetical & Analytical Reasoning","id":797},{"q":"A man walks at a speed of 5 km/h and reaches his office 6 minutes late. If he walks at 6 km/h, he reaches 2 minutes early. Find the distance to his office.","o":["4.5 km","3.5 km","4 km","5 km"],"a":2,"e":"Let distance=d km. Time difference=8 minutes=8/60 hours. d/5 - d/6 = 8/60. Multiplying by 30: 6d-5d=4, so d=4 km.","section":"Arithmetical & Analytical Reasoning","id":798},{"q":"A sum of Rs. 6,400 is invested at compound interest for 2 years at 25% per annum. Find the compound interest.","o":["Rs. 3,400","Rs. 3,600","Rs. 3,200","Rs. 3,800"],"a":1,"e":"Amount=6400x(1.25)^2=6400x1.5625=10,000. CI=10000-6400=Rs. 3,600.","section":"Arithmetical & Analytical Reasoning","id":799},{"q":"Find the value of (0.75 x 0.75 x 0.75 - 0.25 x 0.25 x 0.25) / (0.75 x 0.75 + 0.75 x 0.25 + 0.25 x 0.25).","o":["0.4","0.5","0.7","0.6"],"a":1,"e":"This expression follows the algebraic identity (a^3-b^3)/(a^2+ab+b^2)=(a-b), where a=0.75 and b=0.25. So the answer is 0.75-0.25=0.5.","section":"Arithmetical & Analytical Reasoning","id":800},{"q":"A worker is paid Rs. 500 for each day he works and is fined Rs. 100 for each day he is absent. If he earns Rs. 7,600 over 20 days, find the number of
