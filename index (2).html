 as the 'Queen of Sufi music' for her devotional Sufi performances?","o":["Noor Jehan","Abida Parveen","Reshma","Farida Khanum"],"a":1,"e":"Abida Parveen is internationally recognized as the leading exponent of Sufi devotional music from Pakistan.","section":"Current Affairs & General Knowledge","id":183},{"q":"Which Pakistani feature film, directed by Sarmad Khoosat, dealt with themes around gender identity and society, gaining critical attention domestically and internationally?","o":["Zindagi Tamasha","Manto","Bol","Kamli"],"a":0,"e":"'Zindagi Tamasha' (Circus of Life), directed by Sarmad Khoosat, gained significant attention and controversy, exploring social hypocrisy.","section":"Current Affairs & General Knowledge","id":184},{"q":"Which of the following literary works by Bapsi Sidhwa is set against the backdrop of Partition and is narrated through a child's perspective?","o":["Home Fire","Ice-Candy-Man (Cracking India)","Moth Smoke","The Reluctant Fundamentalist"],"a":1,"e":"Bapsi Sidhwa's 'Ice-Candy-Man', also published as 'Cracking India', depicts the Partition of India through the eyes of a young Parsi girl in Lahore.","section":"Current Affairs & General Knowledge","id":185},{"q":"Which international organization publishes the 'Global Competitiveness Report', ranking countries on economic competitiveness factors?","o":["International Monetary Fund","OECD","World Bank","World Economic Forum"],"a":3,"e":"The World Economic Forum historically published the Global Competitiveness Report, assessing countries across various pillars of economic competitiveness.","section":"Current Affairs & General Knowledge","id":186},{"q":"Which Pakistani institution compiles and publishes the Pakistan Economic Survey ahead of the annual federal budget?","o":["Planning Commission of Pakistan","Pakistan Bureau of Statistics","State Bank of Pakistan","Ministry of Finance"],"a":3,"e":"The Finance Division of the Ministry of Finance compiles and releases the Pakistan Economic Survey each year, typically just before the federal budget announcement.","section":"Current Affairs & General Knowledge","id":187},{"q":"Which Pakistani city hosted the 2023 session of the Organisation of Islamic Cooperation's Council of Foreign Ministers?","o":["Karachi","Islamabad","Peshawar","Lahore"],"a":1,"e":"Islamabad has hosted various significant OIC-related and multilateral diplomatic engagements in recent years, reflecting Pakistan's active role in the organization.","section":"Current Affairs & General Knowledge","id":188},{"q":"Which Pakistani export product category has historically been the largest contributor to the country's total export earnings?","o":["Leather goods","Agricultural produce (excluding textiles)","Information technology services","Textiles and garments"],"a":3,"e":"Textiles and garments have long constituted the largest share of Pakistan's total export earnings, given the country's substantial cotton production and manufacturing base.","section":"Current Affairs & General Knowledge","id":189},{"q":"Which Pakistani city is often referred to as the country's 'City of Gardens' due to its historical landscaping and Mughal-era gardens?","o":["Faisalabad","Multan","Lahore","Peshawar"],"a":2,"e":"Lahore is often called the 'City of Gardens', reflecting its rich Mughal heritage, including sites like Shalimar Gardens.","section":"Current Affairs & General Knowledge","id":190},{"q":"Which Pakistani city is historically known as the 'City of Saints' due to its numerous Sufi shrines?","o":["Multan","Sialkot","Lahore","Karachi"],"a":0,"e":"Multan is traditionally known as the 'City of Saints' due to the presence of numerous historic Sufi shrines and mausoleums.","section":"Current Affairs & General Knowledge","id":191},{"q":"Which Pakistani mountain range is home to K2 and numerous other peaks exceeding 8,000 metres?","o":["Karakoram Range","Sulaiman Range","Hindu Kush Range","Himalayas (western extension)"],"a":0,"e":"The Karakoram Range, located in northern Pakistan, contains K2 and several other of the world's highest peaks.","section":"Current Affairs & General Knowledge","id":192},{"q":"Which Pakistani lake, located in Azad Jammu and Kashmir, is renowned for its clear blue waters and popular tourist appeal?","o":["Attabad Lake","Rawal Lake","Saif-ul-Malook Lake","Banjosa Lake"],"a":3,"e":"Banjosa Lake, located near Rawalakot in Azad Jammu and Kashmir, is a popular tourist destination known for its scenic surroundings.","section":"Current Affairs & General Knowledge","id":193},{"q":"Which high-altitude lake in Khyber Pakhtunkhwa's Kaghan Valley is associated with local folklore about a legendary prince?","o":["Attabad Lake","Shangrila Lake","Banjosa Lake","Saif-ul-Malook Lake"],"a":3,"e":"Saif-ul-Malook Lake, located in the Kaghan Valley, is associated with a well-known local folk legend involving a prince and a fairy princess.","section":"Current Affairs & General Knowledge","id":194},{"q":"Which lake was formed in Hunza Valley following a massive landslide that dammed the Hunza River in January 2010?","o":["Saif-ul-Malook Lake","Rawal Lake","Banjosa Lake","Attabad Lake"],"a":3,"e":"Attabad Lake was formed after a major landslide in January 2010 blocked the Hunza River, submerging the town of Attabad and creating a new lake.","section":"Current Affairs & General Knowledge","id":195},{"q":"Which Pakistani city hosts the annual 'Faisalabad International Textile and Garment Show', reflecting its significance in the textile sector?","o":["Karachi","Lahore","Sialkot","Faisalabad"],"a":3,"e":"Faisalabad, often called the 'Manchester of Pakistan', hosts significant textile and garment industry exhibitions reflecting the city's manufacturing base.","section":"Current Affairs & General Knowledge","id":196},{"q":"Which Pakistani international airport is the busiest in terms of passenger traffic?","o":["Allama Iqbal International Airport, Lahore","Bacha Khan International Airport, Peshawar","Islamabad International Airport","Jinnah International Airport, Karachi"],"a":3,"e":"Jinnah International Airport in Karachi has traditionally handled the highest passenger and cargo traffic among Pakistan's airports.","section":"Current Affairs & General Knowledge","id":197},{"q":"Which Pakistani international airport, opened in 2018, replaced Benazir Bhutto International Airport as the main airport serving the capital region?","o":["Jinnah International Airport","Bacha Khan International Airport","Islamabad International Airport (New Islamabad International Airport)","Allama Iqbal International Airport"],"a":2,"e":"The New Islamabad International Airport, opened in 2018, replaced the older Benazir Bhutto International Airport (Chaklala) as the primary airport serving Islamabad and Rawalpindi.","section":"Current Affairs & General Knowledge","id":198},{"q":"Which Pakistani seaport, developed with significant Chinese investment under CPEC, is envisioned as a key transshipment hub connecting Central Asia to global trade routes?","o":["Karachi Port","Ormara Port","Port Qasim","Gwadar Port"],"a":3,"e":"Gwadar Port, developed with substantial Chinese investment under CPEC, is envisioned as a strategic transshipment and trade hub linking Central Asia and beyond to international maritime routes.","section":"Current Affairs & General Knowledge","id":199},{"q":"Choose the option nearest in meaning to the word 'Ephemeral'.","o":["Everlasting","Fleeting","Robust","Ancient"],"a":1,"e":"'Ephemeral' means lasting for a very short time; 'fleeting' is its closest synonym.","section":"English (Language, Grammar & Comprehension)","id":200},{"q":"Choose the option nearest in meaning to the word 'Ubiquitous'.","o":["Omnipresent","Concealed","Rare","Isolated"],"a":0,"e":"'Ubiquitous' means present, appearing, or found everywhere; synonym is 'omnipresent'.","section":"English (Language, Grammar & Comprehension)","id":201},{"q":"Choose the option nearest in meaning to the word 'Pernicious'.","o":["Harmful","Beneficial","Neutral","Harmless"],"a":0,"e":"'Pernicious' means having a harmful effect, especially in a gradual or subtle way; synonym is 'harmful'.","section":"English (Language, Grammar & Comprehension)","id":202},{"q":"Choose the option nearest in meaning to the word 'Ostentatious'.","o":["Humble","Reserved","Showy","Modest"],"a":2,"e":"'Ostentatious' means characterized by pretentious or showy display; synonym is 'showy'.","section":"English (Language, Grammar & Comprehension)","id":203},{"q":"Choose the option nearest in meaning to the word 'Vindicate'.","o":["Clear of blame","Accuse","Punish","Ignore"],"a":0,"e":"'Vindicate' means to clear someone of blame or suspicion; it does not mean to punish.","section":"English (Language, Grammar & Comprehension)","id":204},{"q":"Choose the option nearest in meaning to the word 'Cacophony'.","o":["Silence","Melody","Harsh discordant sound","Harmony"],"a":2,"e":"'Cacophony' refers to a harsh, discordant mixture of sounds.","section":"English (Language, Grammar & Comprehension)","id":205},{"q":"Choose the option nearest in meaning to the word 'Precarious'.","o":["Predictable","Uncertain/unsafe","Comfortable","Stable"],"a":1,"e":"'Precarious' means not securely held or in position; dangerously likely to fall or collapse; synonym relates to being unsafe or uncertain.","section":"English (Language, Grammar & Comprehension)","id":206},{"q":"Choose the option nearest in meaning to the word 'Obfuscate'.","o":["Confuse deliberately","Illuminate","Simplify","Clarify"],"a":0,"e":"'Obfuscate' means to render obscure, unclear, or unintelligible, often deliberately.","section":"English (Language, Grammar & Comprehension)","id":207},{"q":"Choose the option nearest in meaning to the word 'Garrulous'.","o":["Silent","Talkative","Reserved","Shy"],"a":1,"e":"'Garrulous' describes someone excessively talkative, especially about trivial matters.","section":"English (Language, Grammar & Comprehension)","id":208},{"q":"Choose the option nearest in meaning to the word 'Nefarious'.","o":["Generous","Wicked","Virtuous","Cheerful"],"a":1,"e":"'Nefarious' means wicked or criminal in nature.","section":"English (Language, Grammar & Comprehension)","id":209},{"q":"Choose the option nearest in meaning to the word 'Sagacious'.","o":["Careless","Weak","Wise","Foolish"],"a":2,"e":"'Sagacious' means having or showing keen mental discernment and good judgement; synonym is 'wise'.","section":"English (Language, Grammar & Comprehension)","id":210},{"q":"Choose the option nearest in meaning to the word 'Taciturn'.","o":["Sociable","Aggressive","Reserved/reticent in speech","Talkative"],"a":2,"e":"'Taciturn' describes someone reserved or uncommunicative in speech.","section":"English (Language, Grammar & Comprehension)","id":211},{"q":"Choose the option nearest in meaning to the word 'Zealous'.","o":["Enthusiastic","Indifferent","Lazy","Doubtful"],"a":0,"e":"'Zealous' means having great energy or enthusiasm in pursuit of a cause or objective.","section":"English (Language, Grammar & Comprehension)","id":212},{"q":"Choose the option nearest in meaning to the word 'Ameliorate'.","o":["Maintain","Improve","Worsen","Ignore"],"a":1,"e":"'Ameliorate' means to make something bad or unsatisfactory better.","section":"English (Language, Grammar & Comprehension)","id":213},{"q":"Choose the option nearest in meaning to the word 'Diligent'.","o":["Careless","Lazy","Hardworking and careful","Distracted"],"a":2,"e":"'Diligent' means showing care and conscientiousness in one's work or duties.","section":"English (Language, Grammar & Comprehension)","id":214},{"q":"Choose the option opposite in meaning to the word 'Benevolent'.","o":["Charitable","Kind","Generous","Malevolent"],"a":3,"e":"'Benevolent' means well-meaning and kindly; its antonym is 'malevolent', meaning having harmful intent.","section":"English (Language, Grammar & Comprehension)","id":215},{"q":"Choose the option opposite in meaning to the word 'Frugal'.","o":["Careful","Extravagant","Economical","Thrifty"],"a":1,"e":"'Frugal' means sparing or economical in use of resources; its antonym is 'extravagant'.","section":"English (Language, Grammar & Comprehension)","id":216},{"q":"Choose the option opposite in meaning to the word 'Meticulous'.","o":["Careful","Careless","Thorough","Precise"],"a":1,"e":"'Meticulous' means showing great attention to detail; its antonym is 'careless'.","section":"English (Language, Grammar & Comprehension)","id":217},{"q":"Choose the option opposite in meaning to the word 'Verbose'.","o":["Talkative","Concise","Wordy","Lengthy"],"a":1,"e":"'Verbose' means using more words than needed; its antonym is 'concise'.","section":"English (Language, Grammar & Comprehension)","id":218},{"q":"Choose the option opposite in meaning to the word 'Altruistic'.","o":["Charitable","Generous","Selfless","Selfish"],"a":3,"e":"'Altruistic' means showing selfless concern for others; its antonym is 'selfish'.","section":"English (Language, Grammar & Comprehension)","id":219},{"q":"Choose the option opposite in meaning to the word 'Candor'.","o":["Honesty","Deception","Openness","Frankness"],"a":1,"e":"'Candor' means the quality of being open and honest; its antonym relates to 'deception'.","section":"English (Language, Grammar & Comprehension)","id":220},{"q":"Choose the option opposite in meaning to the word 'Lucid'.","o":["Clear","Coherent","Confusing","Transparent"],"a":2,"e":"'Lucid' means expressed clearly; easy to understand. Its antonym is 'confusing'.","section":"English (Language, Grammar & Comprehension)","id":221},{"q":"Choose the option opposite in meaning to the word 'Amicable'.","o":["Hostile","Peaceful","Cordial","Friendly"],"a":0,"e":"'Amicable' means characterized by friendliness and absence of discord; its antonym is 'hostile'.","section":"English (Language, Grammar & Comprehension)","id":222},{"q":"Choose the option opposite in meaning to the word 'Reticent'.","o":["Quiet","Outspoken","Shy","Reserved"],"a":1,"e":"'Reticent' means not revealing one's thoughts or feelings readily; its antonym is 'outspoken'.","section":"English (Language, Grammar & Comprehension)","id":223},{"q":"Choose the option opposite in meaning to the word 'Voluntary'.","o":["Compulsory","Willing","Optional","Free"],"a":0,"e":"'Voluntary' means done of one's own free will; its antonym is 'compulsory'.","section":"English (Language, Grammar & Comprehension)","id":224},{"q":"Fill in the blank with the correct preposition: The manager was not satisfied ___ the quality of the report.","o":["with","of","at","for"],"a":0,"e":"The correct idiomatic collocation is 'satisfied with' something.","section":"English (Language, Grammar & Comprehension)","id":225},{"q":"Fill in the blank with the correct preposition: Her success was largely attributable ___ her relentless hard work.","o":["to","with","for","on"],"a":0,"e":"'Attributable to' is the correct prepositional phrase.","section":"English (Language, Grammar & Comprehension)","id":226},{"q":"Fill in the blank with the correct preposition: The committee will look ___ the matter and report back next week.","o":["for","at","into","on"],"a":2,"e":"'Look into' means to investigate; it is the correct idiomatic phrase here.","section":"English (Language, Grammar & Comprehension)","id":227},{"q":"Fill in the blank with the correct preposition: He was deprived ___ his inheritance due to the legal dispute.","o":["of","off","by","from"],"a":0,"e":"'Deprived of' is the correct prepositional collocation.","section":"English (Language, Grammar & Comprehension)","id":228},{"q":"Fill in the blank with the correct preposition: The new policy will come ___ effect from the first of next month.","o":["into","in","with","at"],"a":0,"e":"'Come into effect' is the correct fixed phrase.","section":"English (Language, Grammar & Comprehension)","id":229},{"q":"Fill in the blank with the correct preposition: She is entitled ___ a full refund under the consumer protection law.","o":["for","to","with","on"],"a":1,"e":"'Entitled to' is the correct prepositional collocation.","section":"English (Language, Grammar & Comprehension)","id":230},{"q":"Fill in the blank with the correct preposition: The findings of the report are consistent ___ our earlier predictions.","o":["with","to","in","of"],"a":0,"e":"'Consistent with' is the correct idiomatic phrase.","section":"English (Language, Grammar & Comprehension)","id":231},{"q":"Fill in the blank with the correct preposition: He was reluctant ___ accept the terms of the settlement.","o":["to","at","for","on"],"a":0,"e":"'Reluctant to' followed by an infinitive verb is the correct construction.","section":"English (Language, Grammar & Comprehension)","id":232},{"q":"Fill in the blank with the correct preposition: The scientists were astonished ___ the unexpected results of the trial.","o":["for","Both 'by' and 'at' are acceptable in this context","by","with"],"a":1,"e":"'Astonished by' and 'astonished at' are both acceptable idiomatic prepositional phrases.","section":"English (Language, Grammar & Comprehension)","id":233},{"q":"Fill in the blank with the correct preposition: The proposal was met ___ strong resistance from stakeholders.","o":["with","for","by","at"],"a":0,"e":"'Met with resistance' is the correct idiomatic collocation.","section":"English (Language, Grammar & Comprehension)","id":234},{"q":"Identify the sentence with correct subject-verb agreement.","o":["The number of applicants were increasing significantly.","The number of applicants increasing significantly.","The number of applicants have increased significantly.","The number of applicants has increased significantly."],"a":3,"e":"'The number of' takes a singular verb ('has'), unlike 'a number of' which takes a plural verb.","section":"English (Language, Grammar & Comprehension)","id":235},{"q":"Identify the sentence with correct subject-verb agreement.","o":["A number of employees was absent yesterday.","A number of employees were absent yesterday.","A number of employee were absent yesterday.","A number of employees is absent yesterday."],"a":1,"e":"'A number of' takes a plural verb ('were'), the opposite rule from 'the number of'.","section":"English (Language, Grammar & Comprehension)","id":236},{"q":"Identify the sentence with correct subject-verb agreement.","o":["Neither the manager nor the employees is informed.","Neither the manager nor the employees were informed.","Neither the manager or the employees were informed.","Neither the manager nor the employees was informed."],"a":1,"e":"With 'neither...nor', the verb agrees with the subject nearer to it; 'employees' (plural) takes 'were'.","section":"English (Language, Grammar & Comprehension)","id":237},{"q":"Identify the sentence with correct subject-verb agreement.","o":["Either of the two proposal is acceptable.","Either of the two proposals are acceptable.","Either of the two proposals were acceptable.","Either of the two proposals is acceptable."],"a":3,"e":"'Either of' takes a singular verb, so 'is acceptable' is correct.","section":"English (Language, Grammar & Comprehension)","id":238},{"q":"Identify the sentence with correct subject-verb agreement.","o":["Mathematics is a difficult subject for many students.","Mathematics have been difficult subject.","Mathematics are a difficult subject for many students.","Mathematics were difficult subjects for many students."],"a":0,"e":"'Mathematics', though ending in -s, is treated as a singular subject and takes a singular verb.","section":"English (Language, Grammar & Comprehension)","id":239},{"q":"Choose the sentence that correctly uses the subjunctive mood.","o":["If I were rich, I would travel the world.","If I will be rich, I would travel the world.","If I was rich, I would travel the world.","If I am rich, I would travel the world."],"a":0,"e":"Hypothetical/unreal conditions in formal English use 'were' for all subjects in the subjunctive mood: 'If I were rich...'","section":"English (Language, Grammar & Comprehension)","id":240},{"q":"Choose the sentence that correctly uses the subjunctive mood.","o":["The committee insists that he attend the meeting.","The committee insists that he attends the meeting.","The committee insists that he is attending the meeting.","The committee insists that he attended the meeting."],"a":0,"e":"After verbs like 'insist', 'demand', 'recommend', the subjunctive base form ('attend') is used, not the third-person 's' form.","section":"English (Language, Grammar & Comprehension)","id":241},{"q":"Change the sentence to passive voice: 'The manager will announce the results tomorrow.'","o":["The results are announced by the manager tomorrow.","The results were announced by the manager tomorrow.","The results will be announced by the manager tomorrow.","The results have been announced by the manager tomorrow."],"a":2,"e":"Future simple active becomes 'will be + past participle' in passive voice.","section":"English (Language, Grammar & Comprehension)","id":242},{"q":"Change the sentence to passive voice: 'They have completed the project ahead of schedule.'","o":["The project is completed ahead of schedule by them.","The project had been completed ahead of schedule by them.","The project has been completed ahead of schedule by them.","The project was completed ahead of schedule by them."],"a":2,"e":"Present perfect active becomes 'has/have been + past participle' in passive voice.","section":"English (Language, Grammar & Comprehension)","id":243},{"q":"Change the sentence to passive voice: 'The board should review the policy annually.'","o":["The policy should review annually by the board.","The policy should be reviewed annually by the board.","The policy is reviewed annually by the board.","The policy was reviewed annually by the board."],"a":1,"e":"Modal verb constructions ('should review') become 'should be + past participle' in passive voice.","section":"English (Language, Grammar & Comprehension)","id":244},{"q":"Change the following sentence to indirect (reported) speech: The manager said, \"I have finished the report.\"","o":["The manager said that he is finishing the report.","The manager said that he finished the report.","The manager said that he has finished the report.","The manager said that he had finished the report."],"a":3,"e":"Present perfect in direct speech shifts to past perfect ('had finished') in indirect speech.","section":"English (Language, Grammar & Comprehension)","id":245},{"q":"Change the following sentence to indirect (reported) speech: She asked, \"Why are you late again?\"","o":["She asked why I am late again.","She asked why was I late again.","She asked that why I was late again.","She asked why I was late again."],"a":3,"e":"Indirect questions follow normal statement word order without inversion, and the tense shifts back.","section":"English (Language, Grammar & Comprehension)","id":246},{"q":"Choose the correctly punctuated sentence.","o":["Although he was tired he finished the assignment.","Although, he was tired, he finished the assignment.","Although he was tired, he finished the assignment.","Although he was tired; he finished the assignment."],"a":2,"e":"A comma is required after an introductory subordinate clause beginning with 'Although'.","section":"English (Language, Grammar & Comprehension)","id":247},{"q":"Choose the correctly punctuated sentence.","o":["The report which was submitted late contained, several errors.","The report; which was submitted late; contained several errors.","The report which was submitted late, contained several errors.","The report, which was submitted late, contained several errors."],"a":3,"e":"Non-restrictive relative clauses (providing extra, non-essential information) are set off with commas on both sides.","section":"English (Language, Grammar & Comprehension)","id":248},{"q":"Choose the correctly punctuated sentence.","o":["We need three things, patience, discipline, and hard work.","We need three things patience, discipline, and hard work.","We need three things; patience, discipline, and hard work.","We need three things: patience, discipline, and hard work."],"a":3,"e":"A colon is correctly used to introduce a list following an independent clause.","section":"English (Language, Grammar & Comprehension)","id":249},{"q":"Choose the correct meaning of the idiom 'To bite the bullet'.","o":["To avoid a problem entirely","To face a difficult situation with courage","To celebrate a victory","To criticize someone harshly"],"a":1,"e":"'To bite the bullet' means to endure a painful or unpleasant situation that is unavoidable.","section":"English (Language, Grammar & Comprehension)","id":250},{"q":"Choose the correct meaning of the idiom 'To read between the lines'.","o":["To read very slowly","To skip parts of a text","To understand a hidden or implied meaning","To read aloud"],"a":2,"e":"'To read between the lines' means to discern a meaning that is not directly stated.","section":"English (Language, Grammar & Comprehension)","id":251},{"q":"Choose the correct meaning of the idiom 'To throw in the towel'.","o":["To start a fight","To give up or admit defeat","To offer help","To clean up after a task"],"a":1,"e":"This idiom, derived from boxing, means to concede defeat or give up.","section":"English (Language, Grammar & Comprehension)","id":252},{"q":"Choose the correct meaning of the idiom 'To be on the same page'.","o":["To be in agreement about something","To be reading the same book","To finish a task simultaneously","To be in a disagreement"],"a":0,"e":"'To be on the same page' means to have a shared understanding or agreement about a matter.","section":"English (Language, Grammar & Comprehension)","id":253},{"q":"Choose the correct meaning of the idiom 'To go the extra mile'.","o":["To make additional effort beyond what is expected","To take a shortcut","To give up on a task","To travel a long distance"],"a":0,"e":"'To go the extra mile' means to make a special effort to achieve something.","section":"English (Language, Grammar & Comprehension)","id":254},{"q":"Choose the correct meaning of the idiom 'To cut corners'.","o":["To finish a project efficiently","To take shortcuts in a way that compromises quality","To reduce staff numbers","To move to a new location"],"a":1,"e":"'To cut corners' means doing something in the easiest or cheapest way, often at the cost of quality.","section":"English (Language, Grammar & Comprehension)","id":255},{"q":"Choose the correct meaning of the idiom 'A dime a dozen'.","o":["Illegal to sell","Expensive and hard to find","Very rare and valuable","Common and easily available"],"a":3,"e":"'A dime a dozen' describes something so common it has little value.","section":"English (Language, Grammar & Comprehension)","id":256},{"q":"Choose the correct meaning of the idiom 'To let the cat out of the bag'.","o":["To reveal a secret accidentally","To trap someone in a lie","To escape from a difficult situation","To adopt a pet"],"a":0,"e":"This idiom means to reveal information that was meant to be kept secret, usually inadvertently.","section":"English (Language, Grammar & Comprehension)","id":257},{"q":"Choose the correct meaning of the idiom 'To be in hot water'.","o":["To be in trouble","To be relaxing","To be very busy","To be extremely successful"],"a":0,"e":"'To be in hot water' means to be in trouble or a difficult situation.","section":"English (Language, Grammar & Comprehension)","id":258},{"q":"Choose the correct meaning of the idiom 'To turn a blind eye'.","o":["To lose one's eyesight","To criticize someone openly","To ignore something deliberately","To pay close attention"],"a":2,"e":"'To turn a blind eye' means to deliberately ignore something one knows is wrong.","section":"English (Language, Grammar & Comprehension)","id":259},{"q":"Choose the one-word substitute for: 'A person who is unable to read or write'.","o":["Illiterate","Illegible","Incompetent","Ignorant"],"a":0,"e":"'Illiterate' precisely describes a person unable to read or write.","section":"English (Language, Grammar & Comprehension)","id":260},{"q":"Choose the one-word substitute for: 'A statement that is obviously true and often unoriginal'.","o":["Paradox","Proverb","Platitude","Parable"],"a":2,"e":"A 'platitude' is a remark that is trite, overused, and lacking original thought, even if true.","section":"English (Language, Grammar & Comprehension)","id":261},{"q":"Choose the one-word substitute for: 'One who is indifferent to pleasure or pain'.","o":["Sadist","Stoic","Ascetic","Cynic"],"a":1,"e":"A 'stoic' person remains unaffected by pleasure or pain, showing emotional restraint.","section":"English (Language, Grammar & Comprehension)","id":262},{"q":"Choose the one-word substitute for: 'Government by a small, elite group'.","o":["Oligarchy","Autocracy","Democracy","Anarchy"],"a":0,"e":"'Oligarchy' refers to a form of government controlled by a small group of people.","section":"English (Language, Grammar & Comprehension)","id":263},{"q":"Choose the one-word substitute for: 'A person who eats too much'.","o":["Connoisseur","Glutton","Ascetic","Gourmet"],"a":1,"e":"A 'glutton' is someone who eats and drinks excessively.","section":"English (Language, Grammar & Comprehension)","id":264},{"q":"Choose the one-word substitute for: 'A word that sounds the same as another but has a different meaning'.","o":["Synonym","Antonym","Homonym","Homophone"],"a":3,"e":"A 'homophone' is a word pronounced the same as another but differing in meaning, and often spelling.","section":"English (Language, Grammar & Comprehension)","id":265},{"q":"Choose the one-word substitute for: 'A place where weapons and ammunition are stored'.","o":["Arsenal","Armistice","Barracks","Artillery"],"a":0,"e":"An 'arsenal' is a collection or place of storage for weapons and military equipment.","section":"English (Language, Grammar & Comprehension)","id":266},{"q":"Choose the one-word substitute for: 'One who is new to a profession or activity'.","o":["Expert","Veteran","Novice","Connoisseur"],"a":2,"e":"A 'novice' is a person new to or inexperienced in a field or activity.","section":"English (Language, Grammar & Comprehension)","id":267},{"q":"Choose the one-word substitute for: 'The study of the origin and history of words'.","o":["Etymology","Entomology","Ethnology","Epistemology"],"a":0,"e":"'Etymology' is the study of the origin and historical development of words, distinct from 'entomology' (study of insects).","section":"English (Language, Grammar & Comprehension)","id":268},{"q":"Choose the one-word substitute for: 'A person who leaves their native country to settle elsewhere'.","o":["Immigrant","Emigrant","Refugee","Migrant"],"a":1,"e":"An 'emigrant' is a person who leaves their own country to settle permanently in another.","section":"English (Language, Grammar & Comprehension)","id":269},{"q":"Identify the sentence that contains a grammatical error.","o":["He is one of those men who always keeps his promises.","He is one of those men who always keep their promises.","She is one of the best students in the class.","Neither of the two options is correct."],"a":0,"e":"The relative clause 'who always keep their promises' should agree with the plural antecedent 'men', not the singular 'one'; hence 'keeps' is incorrect.","section":"English (Language, Grammar & Comprehension)","id":270},{"q":"Identify the sentence that contains a grammatical error.","o":["Each of the boys has submitted his assignment.","Each of the boys have submitted their assignment.","Each of the boys has submitted his own assignment.","None of the above contains an error."],"a":1,"e":"'Each' is a singular pronoun and requires a singular verb ('has'), making 'have' incorrect in this sentence.","section":"English (Language, Grammar & Comprehension)","id":271},{"q":"Identify the sentence that contains a grammatical error.","o":["He is taller than I am.","None of these sentences contains an error.","He is taller than me.","He is more taller than me."],"a":3,"e":"'More taller' is a double comparative and is grammatically incorrect; only one comparative form ('taller' or 'more tall') should be used, not both together.","section":"English (Language, Grammar & Comprehension)","id":272},{"q":"Identify the sentence that contains a grammatical error.","o":["None of the above contains an error.","I would rather go alone than wait for him.","I would rather have gone alone.","I would rather to go alone than wait for him."],"a":3,"e":"'Would rather' is followed directly by a bare infinitive (without 'to'); 'would rather to go' is incorrect.","section":"English (Language, Grammar & Comprehension)","id":273},{"q":"Identify the sentence that contains a grammatical error.","o":["Between you and I, this plan will fail.","Between you and me, this plan will fail.","None of the above contains an error.","Between us, this plan will fail."],"a":0,"e":"'Between' is a preposition and must be followed by objective case pronouns; 'between you and I' incorrectly uses the subjective 'I' instead of 'me'.","section":"English (Language, Grammar & Comprehension)","id":274},{"q":"Choose the correctly spelled word.","o":["Questionaire","Questionair","Questionnair","Questionnaire"],"a":3,"e":"The correct spelling is 'Questionnaire' (double n).","section":"English (Language, Grammar & Comprehension)","id":275},{"q":"Choose the correctly spelled word.","o":["Laison","Liason","Liaison","Liaision"],"a":2,"e":"The correct spelling is 'Liaison'.","section":"English (Language, Grammar & Comprehension)","id":276},{"q":"Choose the correctly spelled word.","o":["Bureaucrasy","Beaurocracy","Bureaucracy","Beureaucracy"],"a":2,"e":"The correct spelling is 'Bureaucracy'.","section":"English (Language, Grammar & Comprehension)","id":277},{"q":"Choose the correctly spelled word.","o":["Millennium","Millenniumn","Millenium","Milennium"],"a":0,"e":"The correct spelling is 'Millennium' (double l, double n).","section":"English (Language, Grammar & Comprehension)","id":278},{"q":"Choose the correctly spelled word.","o":["Conscientious","Consciencious","Concientious","Consciensious"],"a":0,"e":"The correct spelling is 'Conscientious'.","section":"English (Language, Grammar & Comprehension)","id":279},{"q":"Choose the correctly spelled word.","o":["Occurence","Ocurrence","Occurrance","Occurrence"],"a":3,"e":"The correct spelling is 'Occurrence' (double c, double r).","section":"English (Language, Grammar & Comprehension)","id":280},{"q":"Choose the correctly spelled word.","o":["Rythm","Rhythm","Rhythem","Rhythim"],"a":1,"e":"The correct spelling is 'Rhythm'.","section":"English (Language, Grammar & Comprehension)","id":281},{"q":"Choose the sentence with correct use of 'lay' or 'lie'.","o":["I need to lied down for a while.","I need to laid down for a while.","I need to lie down for a while.","I need to lay down for a while."],"a":2,"e":"'Lie' (lie, lay, lain) means to recline and does not take an object; 'lay' (lay, laid, laid) requires an object, so 'lie down' is correct here.","section":"English (Language, Grammar & Comprehension)","id":282},{"q":"Choose the sentence with correct use of 'affect' or 'effect'.","o":["The new policy will effect several departments.","The new policy will affected several departments.","The new policy will affect several departments.","The new policy will affects several departments."],"a":2,"e":"'Affect' is generally used as a verb meaning to influence; 'effect' is generally a noun meaning result.","section":"English (Language, Grammar & Comprehension)","id":283},{"q":"Choose the sentence with the correct use of 'its' or \"it's\".","o":["The company announced its' quarterly results.","The company announced it is' quarterly results.","The company announced its quarterly results.","The company announced it's quarterly results."],"a":2,"e":"'Its' (no apostrophe) is the possessive form; \"it's\" is a contraction of 'it is', not appropriate here.","section":"English (Language, Grammar & Comprehension)","id":284},{"q":"Which of the following sentences uses 'who' and 'whom' correctly?","o":["Who did you give the report to, referring to the object of the preposition, should use whom: To whom did you give the report?","Whom is responsible for this decision?","Who is responsible for this decision?","Both B and C are correct in their respective contexts."],"a":3,"e":"'Who' is used as a subject ('Who is responsible'), while 'whom' is used as an object, especially after a preposition ('To whom...').","section":"English (Language, Grammar & Comprehension)","id":285},{"q":"Choose the correct comparative sentence.","o":["This is the most unique solution I have seen.","This is the uniquest solution.","This is the more unique solution.","This is a unique solution."],"a":3,"e":"'Unique' is generally considered an absolute adjective and is not typically modified with comparative or superlative forms in formal usage.","section":"English (Language, Grammar & Comprehension)","id":286},{"q":"Identify the correctly constructed conditional sentence (Third Conditional, expressing a hypothetical past).","o":["If she had studied harder, she would have passed the exam.","If she studies harder, she would have passed the exam.","If she studied harder, she will pass the exam.","If she had studied harder, she will pass the exam."],"a":0,"e":"The Third Conditional uses 'if + past perfect, would have + past participle' to describe a hypothetical past situation.","section":"English (Language, Grammar & Comprehension)","id":287},{"q":"Identify the correctly constructed conditional sentence (Second Conditional, expressing a hypothetical present/future).","o":["If I had won the lottery, I would buy a house.","If I won the lottery, I would buy a house.","If I win the lottery, I would have bought a house.","If I win the lottery, I will buy a house."],"a":1,"e":"The Second Conditional uses 'if + past simple, would + base verb' to describe hypothetical or unlikely present/future situations.","section":"English (Language, Grammar & Comprehension)","id":288},{"q":"Choose the sentence that correctly uses a gerund.","o":["I enjoy to read novels in my free time.","I enjoy read novels in my free time.","I enjoy reads novels in my free time.","I enjoy reading novels in my free time."],"a":3,"e":"'Enjoy' is followed by a gerund (verb + -ing), so 'enjoy reading' is correct.","section":"English (Language, Grammar & Comprehension)","id":289},{"q":"Choose the sentence that correctly uses an infinitive.","o":["She decided to postpone the meeting.","She decided postpone the meeting.","She decided postponing the meeting.","She decided postponed the meeting."],"a":0,"e":"'Decide' is typically followed by an infinitive ('to postpone'), not a gerund.","section":"English (Language, Grammar & Comprehension)","id":290},{"q":"Read the sentence: 'Despite of the heavy rain, the match continued.' Identify the correction needed.","o":["No correction needed","Remove 'of' — 'Despite the heavy rain'","Change 'continued' to 'continue'","Change 'despite' to 'inspite'"],"a":1,"e":"'Despite' is never followed by 'of'; 'in spite of' takes 'of', but 'despite' does not.","section":"English (Language, Grammar & Comprehension)","id":291},{"q":"Read the sentence: 'He is senior than me in the department.' Identify the correction needed.","o":["Change 'senior' to 'more senior'","Change 'senior than' to 'senior to'","No correction needed","Change 'me' to 'I'"],"a":1,"e":"'Senior' is a Latin comparative and is followed by 'to', not 'than' (similarly with 'junior to', 'prior to', 'superior to').","section":"English (Language, Grammar & Comprehension)","id":292},{"q":"Read the sentence: 'The data is showing a significant improvement this quarter.' Identify the correction needed.","o":["Change 'data' to 'datum'","Change 'improvement' to 'improvements'","Change 'is showing' to 'are showing' since data is plural in formal/scientific usage","No correction needed"],"a":2,"e":"In formal and scientific English, 'data' is traditionally treated as the plural of 'datum' and takes a plural verb, though informal usage often treats it as singular.","section":"English (Language, Grammar & Comprehension)","id":293},{"q":"Read the sentence: 'Each of the students have submitted their assignments on time.' Identify the correction needed.","o":["Change 'students' to 'student'","No correction needed","Change 'their' to 'his or her'","Change 'have' to 'has'"],"a":3,"e":"'Each' is singular and requires the singular verb 'has', regardless of the plural noun phrase following it.","section":"English (Language, Grammar & Comprehension)","id":294},{"q":"Read the sentence: 'Neither of the applicants were fully qualified for the position.' Identify the correction needed.","o":["Change 'were' to 'was'","Change 'applicants' to 'applicant'","No correction needed","Change 'neither' to 'either'"],"a":0,"e":"'Neither of' is grammatically singular and takes a singular verb in formal usage: 'Neither of the applicants was fully qualified.'","section":"English (Language, Grammar & Comprehension)","id":295},{"q":"Read the sentence: 'The jury have reached their verdict.' In British English, is this sentence acceptable?","o":["Yes, because 'jury' can be treated as a collective noun taking a plural verb in British usage","Yes, but only in American English","No, 'jury' must always take a singular verb","No, 'their' should be 'its' regardless of dialect"],"a":0,"e":"In British English, collective nouns like 'jury', 'team', and 'committee' can take plural verbs when emphasizing the individual members acting separately.","section":"English (Language, Grammar & Comprehension)","id":296},{"q":"Identify the sentence that correctly uses a semicolon.","o":["I have a meeting at noon; however I can, reschedule if needed.","I have a meeting at noon, however I can reschedule if needed.","I have a meeting at noon; however, I can reschedule if needed.","I have a meeting; at noon, however, I can reschedule."],"a":2,"e":"A semicolon correctly joins two independent clauses connected by a conjunctive adverb like 'however', followed by a comma.","section":"English (Language, Grammar & Comprehension)","id":297},{"q":"Identify the sentence that correctly uses an apostrophe for possession.","o":["The childrens toys were scattered across the room.","The childrens' toys were scattered across the room.","The childrens's toys were scattered across the room.","The children's toys were scattered across the room."],"a":3,"e":"'Children' is already plural (irregular), so the possessive is formed by adding 's, giving 'children's'.","section":"English (Language, Grammar & Comprehension)","id":298},{"q":"Identify the sentence that correctly uses an apostrophe for possession with a plural regular noun.","o":["The students union organized the event.","The studentss' union organized the event.","The students' union organized the event.","The student's union organized the event."],"a":2,"e":"For regular plural nouns ending in 's', the possessive is formed by adding only an apostrophe after the 's': 'students''.","section":"English (Language, Grammar & Comprehension)","id":299},{"q":"Choose the sentence that correctly uses parallel structure.","o":["She likes reading, to write, and painting.","She likes to read, writing, and paint.","She likes reading, writing, and painting.","She likes read, write, and paint."],"a":2,"e":"Parallel structure requires consistent grammatical forms in a list; all three verbs should be in the same form ('-ing').","section":"English (Language, Grammar & Comprehension)","id":300},{"q":"Choose the sentence that correctly uses parallel structure.","o":["The manager asked us completing the report, submitting it, and reviewing the findings.","The manager asked us to complete the report, submit it, and review the findings.","The manager asked us to complete the report, to submit it, and review the findings.","The manager asked us to complete the report, submit it, and to review the findings."],"a":1,"e":"Parallel structure requires the infinitive form to be used consistently across the list; only one instance of 'to' is needed before the first verb.","section":"English (Language, Grammar & Comprehension)","id":301},{"q":"Read the passage: 'Bureaucratic inertia often stems not from malice but from a structural incentive to avoid risk; officials who make no decisions rarely make mistakes.' What is the author's main point?","o":["Bureaucracy should be entirely abolished","Avoiding decisions is a rational response to risk-averse incentive structures","Bureaucrats are inherently malicious","Mistakes in bureaucracy are always intentional"],"a":1,"e":"The passage explains that inaction in bureaucracies often results from incentive structures that penalize risk-taking, not from ill intent.","section":"English (Language, Grammar & Comprehension)","id":302},{"q":"Read the passage: 'While automation has displaced certain categories of manual labor, it has simultaneously created demand for new technical skills, suggesting that the net effect on employment is more nuanced than either optimists or pessimists often claim.' What is the author's tone?","o":["Alarmist","Dismissive of automation's effects","Balanced and measured","Wholly optimistic"],"a":2,"e":"The passage explicitly rejects both extreme optimistic and pessimistic views, presenting a nuanced, balanced perspective.","section":"English (Language, Grammar & Comprehension)","id":303},{"q":"Read the passage: 'The committee's recommendations, though well-intentioned, failed to account for the significant implementation costs that smaller municipalities would bear disproportionately.' What criticism is being made?","o":["The recommendations lacked good intentions","The committee ignored implementation entirely","The recommendations did not consider unequal financial burdens on smaller municipalities","The recommendations were too costly for large cities only"],"a":2,"e":"The passage criticizes the committee for overlooking how implementation costs would disproportionately affect smaller municipalities, despite good intentions.","section":"English (Language, Grammar & Comprehension)","id":304},{"q":"Read the passage: 'Historians have long debated whether the fall of empires results primarily from external invasion or internal decay, though most contemporary scholarship suggests these forces are rarely mutually exclusive.' What does 'mutually exclusive' mean in this context?","o":["The two factors are irrelevant to historical analysis","The two factors cannot occur simultaneously or independently","The two factors are identical in effect","The two factors always occur together"],"a":1,"e":"'Mutually exclusive' means that two things cannot both be true or occur at the same time; the passage argues these causes often interact rather than being separate, isolated explanations.","section":"English (Language, Grammar & Comprehension)","id":305},{"q":"Read the passage: 'Skeptics argue that the proposed reform is little more than a cosmetic change, addressing symptoms rather than the systemic issues underlying the crisis.' What is the skeptics' main criticism?","o":["The reform will worsen the crisis directly","The reform is too radical","The reform addresses only superficial issues, not root causes","The reform has no critics"],"a":2,"e":"The skeptics argue the reform only deals with surface-level symptoms rather than tackling the deeper systemic problems.","section":"English (Language, Grammar & Comprehension)","id":306},{"q":"Choose the word that best completes the analogy: Doctor is to Patient as Teacher is to ___.","o":["Lesson","Classroom","Student","School"],"a":2,"e":"A doctor treats a patient, just as a teacher instructs a student; the relationship is professional-to-recipient.","section":"English (Language, Grammar & Comprehension)","id":307},{"q":"Choose the word that best completes the analogy: Ink is to Pen as Fuel is to ___.","o":["Road","Engine","Wheel","Tank"],"a":1,"e":"Ink powers/enables a pen's function, just as fuel powers an engine's function.","section":"English (Language, Grammar & Comprehension)","id":308},{"q":"Choose the word that best completes the analogy: Author is to Book as Composer is to ___.","o":["Symphony","Orchestra","Instrument","Audience"],"a":0,"e":"An author creates a book, just as a composer creates a symphony (a musical composition).","section":"English (Language, Grammar & Comprehension)","id":309},{"q":"Choose the word that best completes the analogy: Frugal is to Extravagant as Timid is to ___.","o":["Reserved","Bold","Shy","Quiet"],"a":1,"e":"'Frugal' and 'extravagant' are antonyms, just as 'timid' and 'bold' are antonyms.","section":"English (Language, Grammar & Comprehension)","id":310},{"q":"Choose the word that best completes the analogy: Library is to Books as Museum is to ___.","o":["Tickets","Visitors","Buildings","Artifacts"],"a":3,"e":"A library houses books, just as a museum houses artifacts/exhibits.","section":"English (Language, Grammar & Comprehension)","id":311},{"q":"Which sentence best demonstrates the correct use of the word 'notwithstanding'?","o":["The project, notwithstanding, was completed on budget despite delays.","The delays notwithstanding was completed on budget.","Notwithstanding of the delays, the project was completed on budget.","Notwithstanding the delays, the project was completed on budget."],"a":3,"e":"'Notwithstanding' functions like 'despite' and is correctly placed before the noun phrase it modifies without requiring 'of'.","section":"English (Language, Grammar & Comprehension)","id":312},{"q":"Which sentence best demonstrates the correct use of 'albeit'?","o":["The plan succeeded, albeit it was difficult.","The plan succeeded, albeit with significant difficulty.","Albeit the plan succeeded, it was difficult.","The plan, albeit succeeded, was difficult."],"a":1,"e":"'Albeit' means 'although' and is typically followed by an adjective, adverb, or prepositional phrase rather than a full clause.","section":"English (Language, Grammar & Comprehension)","id":313},{"q":"Choose the correctly constructed sentence using 'not only...but also'.","o":["She not only won the competition but she also a new record.","Not only she won the competition but also set a new record.","She not only won the competition but set also a new record.","She not only won the competition but also set a new record."],"a":3,"e":"'Not only...but also' requires parallel structure and correct placement immediately before the parallel elements being compared.","section":"English (Language, Grammar & Comprehension)","id":314},{"q":"Choose the correctly constructed sentence expressing a wish about the present.","o":["I wish I knew the answer.","I wish I know the answer.","I wish I have known the answer.","I wish I will know the answer."],"a":0,"e":"Wishes about present situations use the past simple form after 'wish': 'I wish I knew...'","section":"English (Language, Grammar & Comprehension)","id":315},{"q":"Choose the correctly constructed sentence expressing a wish about the past.","o":["I wish I would study harder for the exam.","I wish I have studied harder for the exam.","I wish I studied harder for the exam.","I wish I had studied harder for the exam."],"a":3,"e":"Wishes about past situations use the past perfect form after 'wish': 'I wish I had studied...'","section":"English (Language, Grammar & Comprehension)","id":316},{"q":"Which of the following best explains the difference between 'imply' and 'infer'?","o":["'Imply' means to suggest indirectly; 'infer' means to deduce from evidence","'Imply' and 'infer' are interchangeable synonyms","Neither word relates to indirect meaning","'Imply' means to deduce; 'infer' means to suggest"],"a":0,"e":"The speaker or writer 'implies' a meaning, while the listener or reader 'infers' a meaning from what is said or written.","section":"English (Language, Grammar & Comprehension)","id":317},{"q":"Which of the following best explects the difference between 'continual' and 'continuous'?","o":["Both words mean exactly the same thing","Neither word relates to time or repetition","'Continuous' refers to repeated action with breaks; 'continual' refers to unbroken action","'Continual' refers to repeated action with breaks; 'continuous' refers to unbroken, uninterrupted action"],"a":3,"e":"'Continual' implies recurring action with pauses in between, while 'continuous' implies action without any interruption.","section":"English (Language, Grammar & Comprehension)","id":318},{"q":"Which sentence correctly distinguishes 'fewer' and 'less' in formal usage?","o":["There are fewer opportunities and less funding available this year.","There are less opportunities and less funding available this year, both used for countable nouns incorrectly.","There are fewer opportunity and less funding available this year.","There are less opportunities and fewer funding available this year."],"a":0,"e":"'Fewer' is used with countable nouns (opportunities) and 'less' with uncountable nouns (funding).","section":"English (Language, Grammar & Comprehension)","id":319},{"q":"Choose the option nearest in meaning to the word 'Incorrigible'.","o":["Extremely polite","Easily corrected","Highly intelligent","Impossible to reform or correct"],"a":3,"e":"'Incorrigible' describes a person or habit not able to be corrected, improved, or reformed.","section":"English (Language, Grammar & Comprehension)","id":320},{"q":"Choose the option nearest in meaning to the word 'Fastidious'.","o":["Very attentive to detail and hard to please","Quick and hasty","Careless","Generous"],"a":0,"e":"'Fastidious' describes someone very attentive to accuracy and detail, often difficult to satisfy.","section":"English (Language, Grammar & Comprehension)","id":321},{"q":"Choose the option nearest in meaning to the word 'Placate'.","o":["Confuse","Appease or pacify","Provoke","Ignore"],"a":1,"e":"'Placate' means to make someone less angry or hostile, i.e., to appease them.","section":"English (Language, Grammar & Comprehension)","id":322},{"q":"Choose the option nearest in meaning to the word 'Belligerent'.","o":["Cheerful","Hostile and aggressive","Indifferent","Peaceful"],"a":1,"e":"'Belligerent' describes someone hostile and aggressive, often eager to engage in conflict.","section":"English (Language, Grammar & Comprehension)","id":323},{"q":"Choose the option nearest in meaning to the word 'Clandestine'.","o":["Obvious","Legal","Secret or concealed","Public"],"a":2,"e":"'Clandestine' means done secretively, especially to avoid discovery.","section":"English (Language, Grammar & Comprehension)","id":324},{"q":"Choose the option nearest in meaning to the word 'Enervate'.","o":["Excite","Energize","Weaken or drain of energy","Strengthen"],"a":2,"e":"'Enervate' means to cause someone to feel drained of energy or vitality, despite its similarity to 'energize'.","section":"English (Language, Grammar & Comprehension)","id":325},{"q":"Choose the option nearest in meaning to the word 'Iconoclast'.","o":["A person who attacks cherished beliefs or traditions","A traditionalist","An art collector","A religious devotee"],"a":0,"e":"An 'iconoclast' is someone who challenges or attacks established beliefs, traditions, or institutions.","section":"English (Language, Grammar & Comprehension)","id":326},{"q":"Choose the option nearest in meaning to the word 'Mercurial'.","o":["Extremely calm","Slow-moving","Stable and predictable","Subject to sudden or unpredictable changes in mood"],"a":3,"e":"'Mercurial' describes someone prone to sudden, unpredictable changes in mood or behavior.","section":"English (Language, Grammar & Comprehension)","id":327},{"q":"Choose the option nearest in meaning to the word 'Obdurate'.","o":["Easily persuaded","Stubbornly refusing to change one's opinion","Kind-hearted","Flexible"],"a":1,"e":"'Obdurate' describes someone stubbornly resistant to persuasion or moral influence.","section":"English (Language, Grammar & Comprehension)","id":328},{"q":"Choose the option nearest in meaning to the word 'Perfunctory'.","o":["Highly detailed","Done with great care and enthusiasm","Spontaneous","Done routinely with little interest or effort"],"a":3,"e":"'Perfunctory' describes an action carried out with minimal effort or reflection, as a mere routine.","section":"English (Language, Grammar & Comprehension)","id":329},{"q":"Choose the option nearest in meaning to the word 'Quixotic'.","o":["Practical and realistic","Cynical","Pessimistic","Extremely idealistic and impractical"],"a":3,"e":"'Quixotic' describes someone extremely idealistic to an unrealistic or impractical degree, derived from Don Quixote.","section":"English (Language, Grammar & Comprehension)","id":330},{"q":"Choose the option nearest in meaning to the word 'Recalcitrant'.","o":["Cheerful","Obedient","Stubbornly resistant to authority or control","Generous"],"a":2,"e":"'Recalcitrant' describes someone having an obstinately uncooperative attitude toward authority.","section":"English (Language, Grammar & Comprehension)","id":331},{"q":"Choose the option nearest in meaning to the word 'Surreptitious'.","o":["Loud and public","Open and honest","Done secretly to avoid notice","Confident"],"a":2,"e":"'Surreptitious' means done in a secretive way, kept hidden from others.","section":"English (Language, Grammar & Comprehension)","id":332},{"q":"Choose the option nearest in meaning to the word 'Tenacious'.","o":["Indifferent","Careless","Holding firmly to a course of action or belief","Weak and yielding"],"a":2,"e":"'Tenacious' describes someone persistent and determined, holding firmly onto something.","section":"English (Language, Grammar & Comprehension)","id":333},{"q":"Choose the option nearest in meaning to the word 'Vociferous'.","o":["Silent","Expressing opinions loudly and forcefully","Timid","Reserved"],"a":1,"e":"'Vociferous' describes someone who expresses their opinions or feelings in a loud and forceful manner.","section":"English (Language, Grammar & Comprehension)","id":334},{"q":"Choose the option opposite in meaning to the word 'Munificent'.","o":["Generous","Charitable","Stingy","Wealthy"],"a":2,"e":"'Munificent' means very generous; its antonym is 'stingy'.","section":"English (Language, Grammar & Comprehension)","id":335},{"q":"Choose the option opposite in meaning to the word 'Impetuous'.","o":["Hasty","Reckless","Sudden","Cautious and deliberate"],"a":3,"e":"'Impetuous' means acting quickly without thought; its antonym relates to being cautious and deliberate.","section":"English (Language, Grammar & Comprehension)","id":336},{"q":"Choose the option opposite in meaning to the word 'Ephemeral'.","o":["Temporary","Everlasting or permanent","Brief","Fleeting"],"a":1,"e":"'Ephemeral' means short-lived; its antonym is 'everlasting' or 'permanent'.","section":"English (Language, Grammar & Comprehension)","id":337},{"q":"Choose the option opposite in meaning to the word 'Gregarious'.","o":["Sociable","Solitary and reserved","Friendly","Outgoing"],"a":1,"e":"'Gregarious' means fond of company/sociable; its antonym is 'solitary' or 'reserved'.","section":"English (Language, Grammar & Comprehension)","id":338},{"q":"Choose the option opposite in meaning to the word 'Prudent'.","o":["Sensible","Reckless or careless","Cautious","Wise"],"a":1,"e":"'Prudent' means acting with careful judgment; its antonym is 'reckless' or 'careless'.","section":"English (Language, Grammar & Comprehension)","id":339},{"q":"Fill in the blank with the correct preposition: The findings were in stark contrast ___ what was previously believed.","o":["to","for","with","of"],"a":0,"e":"'In contrast to' is the correct idiomatic phrase.","section":"English (Language, Grammar & Comprehension)","id":340},{"q":"Fill in the blank with the correct preposition: She was oblivious ___ the growing tension in the room.","o":["with","of","to","for"],"a":2,"e":"'Oblivious to' is the correct prepositional collocation.","section":"English (Language, Grammar & Comprehension)","id":341},{"q":"Fill in the blank with the correct preposition: The new regulations are aimed ___ reducing carbon emissions.","o":["to","on","at","for"],"a":2,"e":"'Aimed at' is the correct prepositional phrase.","section":"English (Language, Grammar & Comprehension)","id":342},{"q":"Fill in the blank with the correct preposition: He is capable ___ handling much greater responsibility.","o":["to","of","with","for"],"a":1,"e":"'Capable of' is the correct prepositional collocation.","section":"English (Language, Grammar & Comprehension)","id":343},{"q":"Fill in the blank with the correct preposition: The professor's argument was grounded ___ decades of empirical research.","o":["on","at","Both 'in' and 'on' are acceptable depending on context, though 'in' is more common with 'grounded'","in"],"a":2,"e":"'Grounded in' is the more standard idiomatic phrase, though 'grounded on' also appears in some usage.","section":"English (Language, Grammar & Comprehension)","id":344},{"q":"Identify the sentence with correct subject-verb agreement.","o":["The team of scientists have conducting the experiment.","The team of scientists are conducting the experiment.","The team of scientists is conducting the experiment.","The team of scientists were conducting the experiment."],"a":2,"e":"'Team' is a collective noun treated as singular in standard American usage, taking the singular verb 'is'.","section":"English (Language, Grammar & Comprehension)","id":345},{"q":"Identify the sentence with correct subject-verb agreement.","o":["Physics is a fascinating subject.","Physics are a fascinating subject.","Physics have been a fascinating subject.","Physics were a fascinating subject."],"a":0,"e":"Like 'Mathematics', 'Physics' is treated as a singular subject despite ending in 's'.","section":"English (Language, Grammar & Comprehension)","id":346},{"q":"Choose the correctly punctuated sentence using a colon.","o":["He had only one goal to win the championship.","He had only one goal; to win the championship.","He had only one goal, to win the championship.","He had only one goal: to win the championship."],"a":3,"e":"A colon correctly introduces an explanation or elaboration following a complete independent clause.","section":"English (Language, Grammar & Comprehension)","id":347},{"q":"Choose the sentence that correctly uses an em dash for emphasis or interruption.","o":["The decision, despite all objections was finalized yesterday.","The decision: despite all objections, was finalized yesterday.","The decision—despite all objections—was finalized yesterday.","The decision (despite all objections) was finalized; yesterday."],"a":2,"e":"Em dashes correctly set off an interrupting phrase for emphasis, used in pairs around the inserted clause.","section":"English (Language, Grammar & Comprehension)","id":348},{"q":"Choose the correct use of the word 'whether' versus 'if' in formal writing.","o":["Please let me know if you will attend the meeting or not.","Please let me know whether if you will attend.","Please let me know if whether you will attend.","Please let me know whether you will attend the meeting or not."],"a":3,"e":"'Whether' is preferred in formal writing, especially when presenting alternatives (as in 'whether... or not').","section":"English (Language, Grammar & Comprehension)","id":349},{"q":"Choose the sentence that correctly demonstrates the use of a dangling modifier being avoided.","o":["The rain began to fall, walking to the station.","Walking to the station, I was caught in the rain.","Walking to the station, the rain began to fall.","Walking to the station, the rain fell on me."],"a":1,"e":"The modifying phrase 'Walking to the station' must logically refer to the subject of the main clause; only 'I' can walk, avoiding the dangling modifier error found in the other options.","section":"English (Language, Grammar & Comprehension)","id":350},{"q":"Identify the sentence containing a misplaced modifier.","o":["She almost drove her kids to school every day.","Almost every day, she drove her kids to school.","She drove her kids to school almost every day.","She drove almost her kids to school every day."],"a":0,"e":"'Almost drove' incorrectly suggests she nearly drove but didn't, when the intended meaning is that she drove on almost every day; the modifier is misplaced.","section":"English (Language, Grammar & Comprehension)","id":351},{"q":"Choose the sentence that correctly uses the word 'less' versus 'fewer'.","o":["There were fewer than fifty attendee at the seminar.","There was fewer than fifty attendees at the seminar.","There were less than fifty attendees at the seminar.","There were fewer than fifty attendees at the seminar."],"a":3,"e":"'Fewer' is used with countable nouns like 'attendees', making the first option grammatically correct.","section":"English (Language, Grammar & Comprehension)","id":352},{"q":"Choose the sentence that correctly demonstrates the past perfect continuous tense.","o":["She was working on the project for six months before it was cancelled.","She had work on the project for six months before it was cancelled.","She had been working on the project for six months before it was cancelled.","She has been working on the project for six months before it was cancelled."],"a":2,"e":"The past perfect continuous ('had been working') correctly describes an ongoing action that was happening before another past event (the cancellation).","section":"English (Language, Grammar & Comprehension)","id":353},{"q":"Choose the sentence that correctly demonstrates the future perfect tense.","o":["By next year, she completes her doctorate.","By next year, she will complete her doctorate.","By next year, she will have completed her doctorate.","By next year, she has completed her doctorate."],"a":2,"e":"The future perfect tense ('will have completed') describes an action that will be finished before a specified future point in time.","section":"English (Language, Grammar & Comprehension)","id":354},{"q":"Choose the sentence demonstrating correct use of the passive causative construction.","o":["I had my car repair last week.","I have my car repaired by last week.","I had repaired my car last week.","I had my car repaired last week."],"a":3,"e":"The causative construction 'have/get something done' correctly indicates that someone else performed the action for the subject: 'had my car repaired'.","section":"English (Language, Grammar & Comprehension)","id":355},{"q":"Read the passage: 'The efficacy of the new drug remains contested, as preliminary trials, though promising, involved sample sizes too small to draw statistically robust conclusions.' What is the main concern raised?","o":["The drug is entirely ineffective","The trials were fraudulent","The sample sizes in preliminary trials were insufficient to confirm reliable conclusions","The drug has already been approved for general use"],"a":2,"e":"The passage's central concern is about the statistical reliability of trial results due to small sample sizes, not about outright ineffectiveness or fraud.","section":"English (Language, Grammar & Comprehension)","id":356},{"q":"Read the passage: 'Critics contend that austerity measures, while reducing budget deficits in the short term, often exacerbate long-term economic stagnation by suppressing consumer demand.' What trade-off is being described?","o":["Short-term deficit reduction versus long-term economic stagnation risk","Short-term economic growth versus long-term deficit increase","Immediate consumer demand increase versus long-term deficit reduction","No trade-off is described in the passage"],"a":0,"e":"The passage outlines a trade-off between short-term fiscal benefits (deficit reduction) and potential long-term economic costs (stagnation due to suppressed demand).","section":"English (Language, Grammar & Comprehension)","id":357},{"q":"Read the passage: 'The proliferation of misinformation online is not merely a technological problem but a sociological one, rooted in confirmation bias and the human tendency to seek validation rather than truth.' According to the passage, what is the primary cause of misinformation's spread?","o":["Human psychological tendencies such as confirmation bias, alongside technology","Lack of internet access in developing countries","Government censorship policies","Purely technical failures in search algorithms"],"a":0,"e":"The passage attributes misinformation's spread to sociological/psychological factors like confirmation bias, in addition to (not purely) technological causes.","section":"English (Language, Grammar & Comprehension)","id":358},{"q":"Read the passage: 'Urban planners increasingly advocate for mixed-use development, arguing that segregating residential, commercial, and recreational zones—once considered progressive—has instead fostered car dependency and social isolation.' What critique is being made of traditional zoning?","o":["Mixed-use development has failed compared to traditional zoning","Traditional zoning, despite good intentions, has led to unintended negative consequences like car dependency","Traditional zoning has successfully reduced car dependency","Urban planners universally reject mixed-use development"],"a":1,"e":"The passage critiques traditional single-use zoning for producing unintended consequences such as car dependency and social isolation, despite its originally progressive intent.","section":"English (Language, Grammar & Comprehension)","id":359},{"q":"Read the passage: 'Behavioral economists have demonstrated that people often value avoiding losses more than acquiring equivalent gains, a phenomenon termed loss aversion, which challenges the assumption of purely rational decision-making in classical economic theory.' What does the passage suggest about classical economic theory?","o":["It only applies to large financial decisions","It fully accounts for loss aversion","It has been entirely disproven by behavioral economics","It is challenged by findings that show people are not purely rational decision-makers"],"a":3,"e":"The passage suggests classical economic assumptions of rationality are challenged, not entirely disproven, by findings like loss aversion.","section":"English (Language, Grammar & Comprehension)","id":360},{"q":"Choose the one-word substitute for: 'A person who loves and collects books'.","o":["Bibliophile","Bibliography","Bibliomania (this refers to the obsession, not the person)","Bookworm is informal; the precise formal term is Bibliophile"],"a":0,"e":"A 'bibliophile' is a person who loves or collects books, distinct from 'bibliomania' which refers to the obsessive condition itself.","section":"English (Language, Grammar & Comprehension)","id":361},{"q":"Choose the one-word substitute for: 'Handwriting that is difficult or impossible to read'.","o":["Illiterate","Indecipherable is close but the standard term for handwriting specifically is illegible","Illegible","Incomprehensible"],"a":2,"e":"'Illegible' specifically describes writing that is difficult to read due to poor formation of letters.","section":"English (Language, Grammar & Comprehension)","id":362},{"q":"Choose the one-word substitute for: 'A place where bees are kept'.","o":["Aquarium","Aviary","Vivarium","Apiary"],"a":3,"e":"An 'apiary' is a place where beehives are kept, distinct from an 'aviary' (birds) or 'aquarium' (fish).","section":"English (Language, Grammar & Comprehension)","id":363},{"q":"Choose the one-word substitute for: 'A person who has an extreme dislike or hatred of mankind'.","o":["Philanthropist","Xenophobe","Misanthrope","Anthropologist"],"a":2,"e":"A 'misanthrope' is someone who has a general distrust or hatred of humanity, opposite to a 'philanthropist' who helps others.","section":"English (Language, Grammar & Comprehension)","id":364},{"q":"Choose the one-word substitute for: 'Government by the wealthy'.","o":["Theocracy","Plutocracy","Meritocracy","Aristocracy"],"a":1,"e":"'Plutocracy' refers to a system of government controlled by the wealthy, distinct from 'aristocracy' (rule by nobility).","section":"English (Language, Grammar & Comprehension)","id":365},{"q":"Choose the one-word substitute for: 'One who can speak multiple languages'.","o":["Polyglot","Bilingual (only refers to two languages specifically)","Linguist","Translator"],"a":0,"e":"A 'polyglot' is a person who knows and can use several languages, more general than 'bilingual' which specifically means two.","section":"English (Language, Grammar & Comprehension)","id":366},{"q":"Choose the correct meaning of the idiom 'To burn the midnight oil'.","o":["To work late into the night","To waste resources carelessly","To start a fire accidentally","To celebrate late into the night"],"a":0,"e":"'To burn the midnight oil' means to work or study late into the night, referencing the historical use of oil lamps.","section":"English (Language, Grammar & Comprehension)","id":367},{"q":"Choose the correct meaning of the idiom 'To hit the nail on the head'.","o":["To describe exactly what is causing a situation or problem","To make a mistake","To work with tools","To argue unnecessarily"],"a":0,"e":"This idiom means to describe precisely and accurately the cause of a situation or problem.","section":"English (Language, Grammar & Comprehension)","id":368},{"q":"Choose the correct meaning of the idiom 'To add insult to injury'.","o":["To make a bad situation even worse","To apologize sincerely","To compliment someone unexpectedly","To resolve a conflict peacefully"],"a":0,"e":"'To add insult to injury' means to make a bad situation worse, often through a further offense or misfortune.","section":"English (Language, Grammar & Comprehension)","id":369},{"q":"Choose the correct meaning of the idiom 'To beat around the bush'.","o":["To argue aggressively","To search thoroughly for something","To avoid getting to the point directly","To work efficiently"],"a":2,"e":"'To beat around the bush' means to avoid talking about the main issue directly, often out of hesitation.","section":"English (Language, Grammar & Comprehension)","id":370},{"q":"Choose the correct meaning of the idiom 'A blessing in disguise'.","o":["A problem that turns out to have a positive result","A curse that remains harmful","A gift given secretly","An obvious advantage from the start"],"a":0,"e":"'A blessing in disguise' refers to something that seems bad or unlucky at first but eventually results in something good.","section":"English (Language, Grammar & Comprehension)","id":371},{"q":"Choose the correct meaning of the idiom 'To pull someone's leg'.","o":["To betray someone's trust","To physically assist someone","To help someone walk","To joke or tease someone playfully"],"a":3,"e":"'To pull someone's leg' means to tease or joke with someone in a playful, harmless way.","section":"English (Language, Grammar & Comprehension)","id":372},{"q":"Choose the correct meaning of the idiom 'To be caught red-handed'.","o":["To be found in the act of doing something wrong","To be injured accidentally","To be embarrassed publicly","To win a competition decisively"],"a":0,"e":"'Caught red-handed' means to be discovered in the act of committing a wrongdoing or crime.","section":"English (Language, Grammar & Comprehension)","id":373},{"q":"Choose the correct meaning of the idiom 'To spill the beans'.","o":["To organize an event poorly","To start an argument","To waste food carelessly","To reveal secret information"],"a":3,"e":"'To spill the beans' means to reveal secret or confidential information, often unintentionally.","section":"English (Language, Grammar & Comprehension)","id":374},{"q":"Choose the correct meaning of the idiom 'To be a piece of cake'.","o":["To celebrate a special occasion","To share something generously","To be very difficult","To be very easy to accomplish"],"a":3,"e":"'A piece of cake' describes a task that is very easy to accomplish.","section":"English (Language, Grammar & Comprehension)","id":375},{"q":"Choose the correct meaning of the idiom 'To go back to the drawing board'.","o":["To draw a picture for inspiration","To review previous drawings for reference","To finalize a project successfully","To start planning again from the beginning after a failure"],"a":3,"e":"'Back to the drawing board' means to start over with a plan or project after the initial attempt has failed.","section":"English (Language, Grammar & Comprehension)","id":376},{"q":"Choose the option nearest in meaning to the word 'Anomaly'.","o":["A precise measurement","A deviation from what is standard or expected","A common occurrence","Something that conforms to expectations"],"a":1,"e":"An 'anomaly' refers to something that deviates from what is standard, normal, or expected.","section":"English (Language, Grammar & Comprehension)","id":377},{"q":"Choose the option nearest in meaning to the word 'Conundrum'.","o":["An obvious fact","A clear explanation","A simple solution","A confusing or difficult problem"],"a":3,"e":"A 'conundrum' is a confusing or difficult problem or question, often with no easy solution.","section":"English (Language, Grammar & Comprehension)","id":378},{"q":"Choose the option nearest in meaning to the word 'Deleterious'.","o":["Harmful","Temporary","Neutral","Beneficial"],"a":0,"e":"'Deleterious' means causing harm or damage, similar in meaning to 'harmful'.","section":"English (Language, Grammar & Comprehension)","id":379},{"q":"Choose the option nearest in meaning to the word 'Esoteric'.","o":["Simple and clear","Publicly accessible","Widely understood","Intended for or understood by only a small group with specialized knowledge"],"a":3,"e":"'Esoteric' describes knowledge or ideas intended for or understood by only a small, specialized group.","section":"English (Language, Grammar & Comprehension)","id":380},{"q":"Choose the option nearest in meaning to the word 'Frivolous'.","o":["Well-reasoned","Serious and weighty","Extremely important","Not having any serious purpose or value"],"a":3,"e":"'Frivolous' describes something lacking seriousness or practical importance.","section":"English (Language, Grammar & Comprehension)","id":381},{"q":"Choose the option opposite in meaning to the word 'Congenial'.","o":["Unpleasant or disagreeable","Sociable","Friendly","Pleasant"],"a":0,"e":"'Congenial' means pleasant or friendly; its antonym relates to being unpleasant or disagreeable.","section":"English (Language, Grammar & Comprehension)","id":382},{"q":"Choose the option opposite in meaning to the word 'Dexterous'.","o":["Clumsy","Nimble","Skillful","Agile"],"a":0,"e":"'Dexterous' means showing skill, especially with the hands; its antonym is 'clumsy'.","section":"English (Language, Grammar & Comprehension)","id":383},{"q":"Choose the option opposite in meaning to the word 'Judicious'.","o":["Rash or imprudent","Wise","Careful","Sensible"],"a":0,"e":"'Judicious' means having good judgment; its antonym relates to being rash or imprudent.","section":"English (Language, Grammar & Comprehension)","id":384},{"q":"Fill in the blank with the correct preposition: The proposal has been subjected ___ intense scrutiny by the board.","o":["on","for","to","with"],"a":2,"e":"'Subjected to' is the correct prepositional collocation.","section":"English (Language, Grammar & Comprehension)","id":385},{"q":"Fill in the blank with the correct preposition: The report was compiled ___ several independent researchers.","o":["with","from","of","by"],"a":3,"e":"'Compiled by' correctly indicates the agent responsible for producing the report.","section":"English (Language, Grammar & Comprehension)","id":386},{"q":"Identify the correct statement regarding subject-verb agreement with the collective noun 'committee'.","o":["'Committee' must always take a singular verb in every English-speaking context.","'Commit
